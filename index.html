                                                    </div>
                                                    <div className="flex flex-col h-full bg-teal-50/50 dark:bg-teal-500/5 rounded-2xl border border-teal-100 dark:border-teal-500/20 p-5 md:p-6">
                                                        <label className="block text-base font-bold text-teal-800 dark:text-teal-400 mb-2 flex items-center"><i className="fa-solid fa-paste mr-2"></i>批量匯入 (覆寫/新增)</label>
                                                        <p className="text-xs text-slate-500 dark:text-slate-400 mb-4 leading-relaxed">請貼上 Excel 內容，格式需為：<br /><strong className="text-teal-600 dark:text-teal-500">「條碼 [Tab或逗號或空格] 品名」</strong>，每行一筆。</p>
                                                        <textarea className="w-full flex-1 px-4 py-4 border border-teal-200/60 dark:border-teal-500/30 rounded-xl outline-none min-h-[140px] text-sm font-mono whitespace-pre dark:bg-slate-900/80 dark:text-slate-200 focus:ring-2 focus:ring-teal-500 transition-shadow resize-none" placeholder={`6941313089877\tDIMOO 隱藏版\n6941313071988\tSKULLPANDA 盒玩...`} value={dictInput} onChange={(e) => setDictInput(e.target.value)}></textarea>
                                                        <div className="flex flex-wrap justify-end mt-5 gap-3">
                                                            <button onClick={() => { const backupMap = { ...settings.customNameMap }; updateCloudData('settings', { ...settings, customNameMap: {} }); setDictCurrentPage(1); triggerUndo('已清空翻譯字典', () => { updateCloudData('settings', { ...settings, customNameMap: backupMap }); }); }} className="px-4 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-sm font-bold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm">清空字典</button>
                                                            <button onClick={handleImportDict} className="flex-1 sm:flex-none px-6 py-2.5 bg-teal-500 text-white text-sm font-bold rounded-xl hover:bg-teal-600 shadow-lg shadow-teal-500/20 transition-all active:scale-95 flex items-center justify-center"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 同步至雲端</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border border-slate-200 dark:border-slate-700 shadow-2xl rounded-full p-2 flex items-center z-50 no-print transition-all duration-300">
                        <div className="flex items-center gap-2 sm:gap-3 px-2">
                            <button onClick={() => { setActiveTab('daily-report'); setIsMobileMenuOpen(false); }} className={`w-11 h-11 sm:w-11 sm:h-11 rounded-full flex items-center justify-center transition-all ${activeTab === 'daily-report' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`} title="銷售日報"><i className="fa-solid fa-file-invoice text-lg"></i></button>
                            <button onClick={() => { setActiveTab('damaged-box'); setIsMobileMenuOpen(false); }} className={`w-11 h-11 sm:w-11 sm:h-11 rounded-full flex items-center justify-center transition-all ${activeTab === 'damaged-box' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`} title="盒損登記"><i className="fa-solid fa-box-open text-lg"></i></button>
                            <button onClick={() => { setActiveTab('display-items'); setIsMobileMenuOpen(false); }} className={`w-11 h-11 sm:w-11 sm:h-11 rounded-full flex items-center justify-center transition-all ${activeTab === 'display-items' ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/30' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`} title="陳列品管理"><i className="fa-solid fa-gem text-lg"></i></button>
                            <button onClick={() => { setActiveTab('barcode-print'); setIsMobileMenuOpen(false); }} className={`w-11 h-11 sm:w-11 sm:h-11 rounded-full flex items-center justify-center transition-all ${activeTab === 'barcode-print' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`} title="條碼列印"><i className="fa-solid fa-barcode text-lg"></i></button>
                            <button onClick={() => { setActiveTab('settings'); setIsMobileMenuOpen(false); }} className={`w-11 h-11 sm:w-11 sm:h-11 rounded-full flex items-center justify-center transition-all ${activeTab === 'settings' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700'}`} title="系統設定"><i className="fa-solid fa-gear text-lg"></i></button>
                        </div>
                        <div className="hidden sm:block w-px h-8 bg-slate-200 dark:bg-slate-700 mx-2"></div>
                        <div className="hidden sm:flex items-center gap-3 pr-2">
                            <div className={`text-xs font-bold px-3 py-1.5 rounded-full ${dbStatus.includes('同步') ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400' : 'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-400'}`}>{dbStatus}</div>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-11 h-11 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-700 text-amber-500 hover:scale-110 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'}`}></i></button>
                            <button onClick={handleLogout} className="w-11 h-11 rounded-full flex items-center justify-center bg-rose-50 dark:bg-rose-500/20 text-rose-500 hover:scale-110 transition-transform" title="登出"><i className="fa-solid fa-arrow-right-from-bracket"></i></button>
                        </div>
                        <div className="sm:hidden relative ml-1 pr-1">
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className={`w-11 h-11 rounded-full flex items-center justify-center transition-all ${isMobileMenuOpen ? 'bg-slate-800 text-white dark:bg-slate-100 dark:text-slate-800' : 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-300'}`}><i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'} text-lg`}></i></button>
                            {isMobileMenuOpen && (
                                <div className="absolute bottom-16 right-0 mb-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-xl p-3 flex flex-col gap-3 min-w-[160px] animate-scale-in origin-bottom-right">
                                    <div className={`text-xs text-center font-bold px-3 py-2 rounded-full ${dbStatus.includes('同步') ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400' : 'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-400'}`}>{dbStatus}</div>
                                    <button onClick={() => { setIsDarkMode(!isDarkMode); setIsMobileMenuOpen(false); }} className="flex items-center justify-center gap-2 w-full py-2.5 bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-200 font-bold rounded-xl active:scale-95 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'} text-amber-500`}></i> {isDarkMode ? '深色模式' : '淺色模式'}</button>
                                    <button onClick={handleLogout} className="flex items-center justify-center gap-2 w-full py-2.5 bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 font-bold rounded-xl active:scale-95 transition-transform"><i className="fa-solid fa-arrow-right-from-bracket"></i> 安全登出</button>
                                </div>
                            )}
                        </div>
                    </nav>

                    {isQRCodeModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 no-print animate-scale-in">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                                <div className="p-6 text-center border-b border-slate-100 dark:border-slate-700 relative">
                                    <div className="w-12 h-12 bg-blue-50 dark:bg-blue-500/20 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3"><i className="fa-solid fa-qrcode text-2xl"></i></div>
                                    <h3 className="text-xl font-bold dark:text-white mb-1">掃碼複製文字</h3>
                                    <p className="text-sm text-slate-500 dark:text-slate-400">請掃描下方條碼，即可直接複製報表文字！</p>
                                    <button onClick={() => setIsQRCodeModalOpen(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-8 flex justify-center bg-slate-50 dark:bg-slate-900">
                                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                        {qrError ? <div className="text-red-500 text-xs p-4 whitespace-pre-wrap font-bold leading-relaxed">{qrError}</div> : <img src={qrDataUrl} className="mx-auto block w-full h-auto rounded-lg" />}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {scannerOpen && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[70] flex flex-col items-center justify-center animate-scale-in no-print">
                            <style>{`
                                #reader video { object-fit: cover; border-radius: 1.5rem; width: 100%; height: 100%; }
                                @keyframes scanline { 0% { transform: translateY(-100px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }
                                .animate-scanline { animation: scanline 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
                            `}</style>
                            <div className="absolute top-0 inset-x-0 p-6 flex justify-between items-center z-10 max-w-md mx-auto">
                                <div className="text-white font-bold text-sm flex items-center bg-white/10 px-4 py-2 rounded-full backdrop-blur-lg border border-white/10 shadow-lg">
                                    <i className="fa-solid fa-barcode text-blue-400 mr-2"></i>
                                    {scannerTarget === 'damaged' ? '自動登錄：盒損品' : scannerTarget === 'display' ? '自動登錄：陳列品' : '自動登錄：列印清單'}
                                </div>
                                <button onClick={() => setScannerOpen(false)} className="w-11 h-11 rounded-full bg-white/10 text-white hover:bg-white/20 flex items-center justify-center transition-colors backdrop-blur-lg border border-white/10"><i className="fa-solid fa-xmark text-lg"></i></button>
                            </div>
                            <div className="relative w-full max-w-sm px-6 mt-12">
                                <div className="relative overflow-hidden rounded-[1.5rem] border border-white/20 shadow-[0_0_50px_rgba(99,102,241,0.15)] bg-black/50 aspect-[3/4] flex items-center justify-center">
                                    <div id="reader" className="absolute inset-0 w-full h-full"></div>
                                    <div className="absolute inset-0 border-[40px] border-black/40 rounded-[1.5rem] pointer-events-none mix-blend-multiply"></div>
                                    <div className="absolute inset-x-0 top-1/2 h-0.5 bg-blue-500 shadow-[0_0_15px_2px_rgba(99,102,241,0.8)] animate-scanline pointer-events-none z-10"></div>
                                </div>
                                <p className="text-center text-slate-400 text-sm mt-8 font-medium tracking-wide">將條碼對準畫面中央<br />系統掃描後將<strong className="text-blue-400 font-bold ml-1">自動送出</strong></p>
                            </div>
                        </div>
                    )}

                    {undoData && (
                        <div className="fixed bottom-28 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] md:w-auto md:min-w-[360px] max-w-md bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 p-4 md:px-6 md:py-4 rounded-2xl shadow-2xl flex items-center justify-between gap-4 z-[80] overflow-hidden animate-slide-up-fade border border-slate-200 dark:border-slate-700 no-print transition-colors">
                            <span className="text-sm font-bold tracking-wide flex items-center flex-1 leading-snug min-w-0"><i className="fa-solid fa-circle-exclamation text-rose-500 mr-2.5 shrink-0"></i><span className="line-clamp-2">{undoData.message}</span></span>
                            <button onClick={handleUndoAction} className="shrink-0 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-xl font-bold text-sm active:scale-95 flex items-center gap-2 transition-all cursor-pointer shadow-sm border border-slate-200 dark:border-slate-600"><i className="fa-solid fa-rotate-left"></i> 復原</button>
                            <div className="absolute bottom-0 left-0 h-1.5 bg-rose-500 animate-shrink-x origin-left w-full shadow-[0_0_10px_rgba(244,63,94,0.5)]"></div>
                        </div>
                    )}

                    {toast && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] sm:w-auto max-w-md z-[60] bg-emerald-500 text-white px-6 py-3.5 rounded-2xl shadow-xl font-bold animate-slide-up-fade no-print flex items-center justify-center text-center text-sm md:text-base leading-snug">{toast}</div>
                    )}

                    <div className="print-only">
                        {printContext === 'damaged' && (
                            <div className="receipt-container">
                                <header className="receipt-header">
                                    <div className="receipt-type">盒損單</div>
                                    <div className="receipt-info">列印時間：{new Date().toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false })}</div>
                                </header>

                                {groupedDamagedItems.map(([category, items]) => (
                                    <section key={category} className="category-group">
                                        <h2 className="category-title">【 {category.replace(/[^\u4e00-\u9fa5a-zA-Z0-9 ]/g, '')} 】</h2>

                                        {items.map(item => (
                                            <div key={item.id} className="product-card">
                                                <div className="product-info-row">
                                                    <div className="name-col">
                                                        <div className="product-name">{item.name}</div>
                                                    </div>
                                                    <div className="action-col">
                                                        <div className="qty-badge">
                                                            <span className="qty-label">QTY</span>
                                                            <span className="qty-number">{item.quantity}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="barcode-row">
                                                    {/* 使用系統內建的條碼元件，開啟 mini 模式隱藏預設文字，由 CSS 控制大小 */}
                                                    <div className="barcode-img-wrapper">
                                                        <BarcodeImage value={item.barcode} mini={true} />
                                                    </div>
                                                    <div className="barcode-text">{item.barcode}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </section>
                                ))}

                                <div className="border-t-2 border-dashed border-black pt-3 mt-4 mb-10 text-center text-[12pt] font-bold">
                                    本次盤點總件數: {damagedItems.reduce((sum, item) => sum + item.quantity, 0)} 件
                                </div>
                            </div>
                        )}
                        {printContext === 'barcode-all' && (
                            <div id="print-area-barcode">{barcodeItems.map(item => (<BarcodeImage key={item.id} value={item.barcode} name={item.name} quantity={item.quantity} printMode={true} />))}</div>
                        )}
                        {printContext?.type === 'barcode-single' && (
                            <div id="print-area-barcode"><BarcodeImage value={printContext.item.barcode} name={printContext.item.name} quantity={printContext.item.quantity} printMode={true} /></div>
                        )}
                        {/* ✨ 新增：陳列品列表列印 (套用相同排版，並依據目前的 Filter 印出陳列中或撤下) */}
                        {printContext?.type === 'display-list' && (
                            <div id="print-area-barcode">
                                {displayItems
                                    .filter(item => item.status === printContext.filter)
                                    .map(item => (
                                        <BarcodeImage key={`print-${item.id}`} value={item.barcode} name={item.name} quantity={item.quantity} printMode={true} />
                                    ))
                                }
                            </div>
                        )}
                        {/* ✨ 新增：印出被勾選的陳列品 */}
                        {printContext?.type === 'display-selected' && (
                            <div id="print-area-barcode">
                                {displayItems
                                    .filter(item => selectedDisplayItems.has(item.id))
                                    .map(item => (
                                        <BarcodeImage key={`print-selected-${item.id}`} value={item.barcode} name={item.name} quantity={item.quantity} printMode={true} />
                                    ))
                                }
                            </div>
                        )}
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('SW 註冊成功，範圍：', registration.scope);
                    })
                    .catch(err => {
                        console.log('SW 註冊失敗：', err);
                    });
            });
        }
    </script>
</body>

</html>
