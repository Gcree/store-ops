                                                                    <div className={`w-7 h-7 shrink-0 rounded-full flex items-center justify-center text-xs font-black border ${currentRankColor} shadow-sm`}>
                                                                        {index + 1}
                                                                    </div>
                                                                    <div className="truncate text-sm font-bold text-slate-700 dark:text-slate-200 transition-colors group-hover:text-blue-600 dark:group-hover:text-blue-400" title={item.name}>
                                                                        {item.name}
                                                                    </div>
                                                                </div>
                                                                <div className="flex flex-col items-end shrink-0">
                                                                    <div className="text-sm md:text-base font-black text-slate-800 dark:text-slate-100">
                                                                        ${item.sales.toLocaleString()}
                                                                    </div>
                                                                    <div className="text-[11px] md:text-xs text-slate-500 font-medium mt-0.5 flex items-center gap-2">
                                                                        <span className="bg-white dark:bg-slate-800 px-1.5 py-0.5 rounded border border-slate-200 dark:border-slate-700">
                                                                            {item.quantity} 件
                                                                        </span>
                                                                        <span className="text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-500/10 px-1.5 py-0.5 rounded border border-blue-100 dark:border-blue-500/20 font-bold">
                                                                            {percent}%
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })()
                                )}

                                {/* 原本的報表預覽區塊 */}
                                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 sticky top-8 flex flex-col h-[calc(100vh-8rem)] transition-colors z-10">
                                    <div className="flex justify-between items-center mb-4 shrink-0">
                                        <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center"><i className="fa-solid fa-file-lines text-slate-400 mr-2"></i> 報表預覽</h2>
                                        <div className="flex gap-2">
                                            <button onClick={() => setIsQRCodeModalOpen(true)} className="px-3 md:px-4 py-2 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-500/30 transition-colors flex items-center text-sm font-medium shadow-sm border border-blue-100 dark:border-blue-500/20"><i className="fa-solid fa-qrcode mr-2"></i> <span className="hidden md:inline">產生條碼</span><span className="md:hidden">條碼</span></button>
                                            <button onClick={() => navigator.clipboard.writeText(reportContent).then(() => showToast('報表已複製！'))} className="px-3 md:px-4 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg hover:bg-slate-900 dark:hover:bg-slate-600 transition-colors flex items-center text-sm font-medium shadow-sm"><i className="fa-solid fa-copy md:mr-2"></i> <span className="hidden md:inline">複製</span></button>
                                        </div>
                                    </div>
                                    <div className="flex-1 bg-slate-50 dark:bg-slate-900 p-6 rounded-xl text-sm font-mono text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed overflow-y-auto border border-slate-200 dark:border-slate-700">{reportContent}</div>
                                </div>
                            </div>
                        </div>
                    )}

                            {/* =========================================
                        分頁 2: 盒損登記器 (120% 適配 + 響應式折疊版)
                    ========================================= */}
                            {activeTab === 'damaged-box' && (
                                <div className="w-full space-y-6 pb-10 animate-scale-in">

                                    {/* 頂部掃描輸入區 (標準尺寸) */}
                                    <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 relative overflow-hidden transition-colors">
                                        <div className="absolute top-0 right-0 bg-emerald-500 text-white text-[10px] px-3 py-1 font-bold rounded-bl-lg flex items-center shadow-sm">
                                            <i className="fa-solid fa-cloud-arrow-up mr-1"></i> 雲端同步開啟
                                        </div>
                                        <div className="mb-4 mt-1">
                                            <h3 className="text-lg font-bold flex items-center dark:text-slate-100 tracking-tight">
                                                <i className="fa-solid fa-barcode text-slate-400 mr-2"></i> 盒損條碼登錄
                                            </h3>
                                        </div>

                                        <form onSubmit={handleScanSubmit} className="relative group flex gap-2">
                                            <div className="relative flex-1">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-transform group-focus-within:scale-110">
                                                    <i className="fa-solid fa-barcode text-slate-400 text-lg"></i>
                                                </div>
                                                <input
                                                    ref={damagedInputRef} type="text" value={barcodeInput} onChange={(e) => setBarcodeInput(e.target.value)}
                                                    className="block w-full pl-12 pr-4 py-3 md:py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 dark:text-white text-base transition-all outline-none shadow-inner font-mono"
                                                    placeholder="請輸入或掃描條碼..." autoFocus
                                                />
                                            </div>
                                            <button type="button" onClick={() => { setScannerTarget('damaged'); setScannerOpen(true); }} className="px-5 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors shadow-sm flex items-center justify-center">
                                                <i className="fa-solid fa-camera text-xl"></i>
                                            </button>
                                            <button type="submit" className="px-6 bg-slate-800 dark:bg-blue-600 text-white hover:bg-slate-900 dark:hover:bg-blue-700 rounded-xl font-bold transition-colors shadow-sm">
                                                加入
                                            </button>
                                        </form>
                                    </div>

                                    {/* 內容區塊 */}
                                    {damagedItems.length === 0 ? (
                                        <div className="text-center py-20 bg-white/50 dark:bg-slate-800/30 rounded-2xl border border-slate-200 dark:border-slate-700 border-dashed transition-colors">
                                            <i className="fa-solid fa-box-open text-5xl text-slate-300 dark:text-slate-600 mb-4 block"></i>
                                            <p className="text-slate-500 font-medium">雲端資料庫尚未登記任何盒損商品</p>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2">

                                                {/* 👈 左側：盤點總覽表 (響應式折疊設計) */}
                                                <div className="lg:col-span-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 flex flex-col h-auto lg:h-[calc(100vh-16rem)] lg:sticky top-28 transition-colors">

                                                    {/* 標題區：在小螢幕時具有 cursor-pointer 可點擊折疊 */}
                                                    <div
                                                        className="bg-slate-50 dark:bg-slate-800/80 px-5 py-4 border-b border-slate-200 dark:border-slate-700 rounded-t-2xl shrink-0 cursor-pointer lg:cursor-auto"
                                                        onClick={() => { if (window.innerWidth < 1024) setIsDamagedOverviewExpanded(!isDamagedOverviewExpanded); }}
                                                    >
                                                        <div className="flex items-center justify-between lg:mb-3">
                                                            <div className="flex items-center">
                                                                <div className="w-9 h-9 rounded-lg bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 flex items-center justify-center mr-3 shadow-inner">
                                                                    <i className="fa-solid fa-list-check text-base"></i>
                                                                </div>
                                                                <div>
                                                                    <h4 className="font-bold text-slate-800 dark:text-slate-100 text-base leading-tight">盤點總覽</h4>
                                                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">總計 {damagedItems.reduce((sum, item) => sum + item.quantity, 0)} 件</p>
                                                                </div>
                                                            </div>
                                                            {/* 手機版專用折疊箭頭 */}
                                                            <div className="lg:hidden text-slate-400 p-2">
                                                                <i className={`fa-solid fa-chevron-${isDamagedOverviewExpanded ? 'up' : 'down'} transition-transform duration-300`}></i>
                                                            </div>
                                                        </div>

                                                        {/* 操作按鈕：大螢幕永遠顯示，小螢幕展開時才顯示 */}
                                                        <div className={`items-center gap-2 mt-3 lg:mt-0 ${isDamagedOverviewExpanded ? 'flex' : 'hidden lg:flex'}`}>
                                                            {/* ✨ 補回列印按鈕 */}
                                                            <button onClick={(e) => { e.stopPropagation(); executePrint('damaged'); }} className="flex-1 text-xs px-2 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 dark:bg-blue-500/20 dark:text-blue-400 rounded-lg transition-colors font-bold border border-blue-200 dark:border-blue-500/30 shadow-sm flex justify-center items-center">
                                                                <i className="fa-solid fa-print mr-1.5"></i>列印
                                                            </button>
                                                            <button onClick={(e) => { e.stopPropagation(); exportToExcel(damagedItems, '盒損盤點清單'); }} className="flex-1 text-xs px-2 py-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 dark:bg-emerald-500/20 dark:text-emerald-400 rounded-lg transition-colors font-bold border border-emerald-200 dark:border-emerald-500/30 shadow-sm flex justify-center items-center">
                                                                <i className="fa-solid fa-file-excel mr-1.5"></i>匯出 Excel
                                                            </button>
                                                            <button onClick={(e) => { e.stopPropagation(); clearAllDamagedItems(); }} className="flex-1 text-xs px-2 py-2 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-500/20 rounded-lg transition-colors font-bold border border-red-100 dark:border-red-500/20 shadow-sm flex justify-center items-center">
                                                                <i className="fa-solid fa-trash-can mr-1.5"></i>季末清空
                                                            </button>
                                                        </div>
                                                    </div>

                                                    {/* 滾動內容區：大螢幕永遠顯示，小螢幕展開時才顯示 */}
                                                    <div className={`flex-1 overflow-y-auto p-4 custom-scrollbar bg-slate-50/50 dark:bg-transparent rounded-b-2xl ${isDamagedOverviewExpanded ? 'block' : 'hidden lg:block'}`}>
                                                        <div className="flex flex-col gap-3">
                                                            {groupedDamagedItems.length === 0 ? (
                                                                <p className="text-center text-sm text-slate-400 py-4">無符合的資料</p>
                                                            ) : (
                                                                groupedDamagedItems.map(([category, items]) => (
                                                                    <div key={`overview-${category}`} className="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm animate-scale-in">
                                                                        <h5 className="font-bold text-slate-700 dark:text-slate-300 mb-3 border-b border-slate-100 dark:border-slate-700 pb-2 flex justify-between items-end">
                                                                            <span className="text-sm">{category}</span>
                                                                            <span className="text-blue-600 dark:text-blue-400 font-black text-sm">{items.reduce((s, i) => s + i.quantity, 0)} 件</span>
                                                                        </h5>
                                                                        <ul className="space-y-2">
                                                                            {items.map(item => (
                                                                                <li key={`overview-item-${item.id}`} className="flex justify-between items-start text-sm">
                                                                                    <span className="text-slate-600 dark:text-slate-400 pr-3 leading-snug flex-1 text-sm">{item.name}</span>
                                                                                    <span className="font-bold text-slate-800 dark:text-slate-200 whitespace-nowrap bg-slate-50 dark:bg-slate-800 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-600 shadow-sm text-xs">x {item.quantity}</span>
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                ))
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 👉 右側：分頁式分類與搜尋 (Col-span-8) */}
                                                <div className="lg:col-span-8 flex flex-col h-[500px] sm:h-[600px] lg:h-[calc(100vh-16rem)]">

                                                    {/* ✨ 優化版：頂部控制列 (上下排列，各自滿版，美化 Tab) */}
                                                    <div className="flex flex-col gap-3 mb-5 shrink-0">

                                                        {/* 分類 Tab (解決切邊問題，加入滑鼠拖曳與滾輪支援) */}
                                                        <div
                                                            className="flex overflow-x-auto gap-3 w-full py-2 px-1 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] select-none cursor-grab active:cursor-grabbing"
                                                            onMouseDown={(e) => {
                                                                e.currentTarget.dataset.isDown = "true";
                                                                e.currentTarget.dataset.startX = e.pageX - e.currentTarget.offsetLeft;
                                                                e.currentTarget.dataset.scrollLeft = e.currentTarget.scrollLeft;
                                                            }}
                                                            onMouseLeave={(e) => e.currentTarget.dataset.isDown = "false"}
                                                            onMouseUp={(e) => e.currentTarget.dataset.isDown = "false"}
                                                            onMouseMove={(e) => {
                                                                if (e.currentTarget.dataset.isDown !== "true") return;
                                                                e.preventDefault();
                                                                const x = e.pageX - e.currentTarget.offsetLeft;
                                                                const walk = (x - parseFloat(e.currentTarget.dataset.startX)) * 2; // 拖曳速度乘數
                                                                e.currentTarget.scrollLeft = parseFloat(e.currentTarget.dataset.scrollLeft) - walk;
                                                            }}
                                                            onWheel={(e) => {
                                                                if (e.deltaY !== 0) {
                                                                    e.currentTarget.scrollLeft += e.deltaY;
                                                                }
                                                            }}
                                                        >
                                                            <button
                                                                onClick={() => setActiveDamagedCategory('全部')}
                                                                className={`px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-300 ${activeDamagedCategory === '全部' ? 'bg-slate-800 text-white dark:bg-blue-500 shadow-md shadow-slate-400/30 dark:shadow-blue-500/20 transform scale-105' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}
                                                            >
                                                                全部顯示
                                                            </button>
                                                            {groupedDamagedItems.map(([category]) => (
                                                                <button
                                                                    key={`tab-${category}`}
                                                                    onClick={() => setActiveDamagedCategory(category)}
                                                                    className={`px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-300 ${activeDamagedCategory === category ? 'bg-slate-800 text-white dark:bg-blue-500 shadow-md shadow-slate-400/30 dark:shadow-blue-500/20 transform scale-105' : 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}
                                                                >
                                                                    {category}
                                                                </button>
                                                            ))}
                                                        </div>

                                                        {/* 搜尋過濾框 (改為滿版) */}
                                                        <div className="relative w-full group">
                                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors">
                                                                <i className="fa-solid fa-filter text-slate-400 text-sm group-focus-within:text-blue-500 transition-colors"></i>
                                                            </div>
                                                            <input
                                                                type="text" value={damagedSearch} onChange={(e) => setDamagedSearch(e.target.value)}
                                                                className="w-full pl-10 pr-4 py-3 text-sm bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm dark:text-white"
                                                                placeholder="過濾條碼或品名..."
                                                            />
                                                        </div>
                                                    </div>

                                                    {/* 右側明細清單 */}
                                                    <div className="flex-1 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-y-auto custom-scrollbar transition-colors">
                                                        <div className="flex flex-col divide-y divide-slate-100 dark:border-slate-700">
                                                            {groupedDamagedItems.filter(([cat]) => activeDamagedCategory === '全部' || cat === activeDamagedCategory).map(([category, items]) => (
                                                                <div key={category} className="animate-scale-in">

                                                                    {activeDamagedCategory === '全部' && (
                                                                        <div className="bg-slate-50 dark:bg-slate-800/90 px-6 py-3 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center sticky top-0 z-10 backdrop-blur-md">
                                                                            <h4 className="font-bold text-slate-700 dark:text-slate-200 text-sm">{category}</h4>
                                                                            <span className="bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 text-xs px-2 py-1 rounded-md font-bold shadow-sm">{items.reduce((sum, item) => sum + item.quantity, 0)} 件</span>
                                                                        </div>
                                                                    )}

                                                                    <div className="divide-y divide-slate-50 dark:divide-slate-700/50">
                                                                        {items.map((item) => (
                                                                            <div key={item.id} className="p-4 md:p-5 flex flex-col md:flex-row items-start md:items-center justify-between hover:bg-blue-50/30 dark:hover:bg-slate-700/30 transition-colors gap-3 md:gap-4 group">

                                                                                {/* 品名區塊 (永遠在最上/最左) */}
                                                                                <div className="flex-1 w-full min-w-0">
                                                                                    <div className="mb-1"><EditableItemName item={item} onSave={(id, bc, name) => handleUpdateItemName('damaged', id, bc, name)} /></div>
                                                                                    {/* 大螢幕時顯示的條碼 */}
                                                                                    <div className="hidden md:flex text-sm text-slate-400 dark:text-slate-500 font-mono items-center mt-1">
                                                                                        <i className="fa-solid fa-barcode mr-1.5 opacity-70"></i>{item.barcode}
                                                                                    </div>
                                                                                </div>

                                                                                {/* ✨ 空間魔法：手機版時，條碼與操作按鈕放在「同一排」填補空白 */}
                                                                                <div className="flex items-center justify-between w-full md:w-auto gap-3 shrink-0">
                                                                                    {/* 手機版時才顯示的縮小型條碼 */}
                                                                                    <div className="md:hidden text-xs text-slate-500 dark:text-slate-400 font-mono flex items-center bg-slate-50 dark:bg-slate-900/50 px-2.5 py-1.5 rounded-lg border border-slate-100 dark:border-slate-700">
                                                                                        <i className="fa-solid fa-barcode mr-1.5 opacity-70"></i>{item.barcode}
                                                                                    </div>

                                                                                    {/* 操作按鈕群 */}
                                                                                    <div className="flex items-center gap-3 ml-auto">
                                                                                        <div className="flex items-center bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm overflow-hidden p-1">
                                                                                            <button onClick={() => updateQuantity(item.id, -1)} className="w-11 h-11 rounded-lg flex items-center justify-center text-slate-500 hover:bg-white dark:hover:bg-slate-800 hover:text-slate-800 dark:hover:text-slate-100 transition-colors shadow-sm"><i className="fa-solid fa-minus text-xs"></i></button>
                                                                                            <div className="w-10 text-center font-bold text-slate-800 dark:text-slate-100 text-base">{item.quantity}</div>
                                                                                            <button onClick={() => updateQuantity(item.id, 1)} className="w-11 h-11 rounded-lg flex items-center justify-center text-slate-500 hover:bg-white dark:hover:bg-slate-800 hover:text-slate-800 dark:hover:text-slate-100 transition-colors shadow-sm"><i className="fa-solid fa-plus text-xs"></i></button>
                                                                                        </div>

                                                                                        <button onClick={() => removeDamagedItem(item.id)} className="w-11 h-11 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-colors shrink-0">
                                                                                            <i className="fa-solid fa-trash-can text-lg"></i>
                                                                                        </button>
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>

                                                        {/* 防呆：空狀態 */}
                                                        {groupedDamagedItems.filter(([cat]) => activeDamagedCategory === '全部' || cat === activeDamagedCategory).length === 0 && (
                                                            <div className="p-10 text-center text-slate-400 font-medium flex flex-col items-center justify-center h-48 animate-scale-in">
                                                                <i className={`fa-solid ${damagedSearch ? 'fa-magnifying-glass-minus text-blue-200 dark:text-blue-900' : 'fa-folder-open'} text-4xl mb-4`}></i>
                                                                {damagedSearch ? (
                                                                    <span>找不到包含 <span className="text-blue-500 mx-1">{damagedSearch}</span> 的商品</span>
                                                                ) : (
                                                                    '此分類目前沒有商品'
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {/* =========================================
                        分頁 3: 陳列品典藏庫 (120% 螢幕縮放適配版)
                    ========================================= */}
                            {activeTab === 'display-items' && (
                                <div className="w-full space-y-6 pb-10 animate-scale-in">

                                    {/* 頂部掃描與控制區 (縮回精緻尺寸) */}
                                    <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 relative overflow-hidden transition-colors">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-bl-full -z-10"></div>

                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5">
                                            <div>
                                                <h2 className="text-lg font-bold flex items-center dark:text-slate-100 tracking-tight">
                                                    <i className="fa-solid fa-gem text-amber-500 mr-2.5"></i>陳列品紀錄
                                                </h2>
                                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1.5 leading-relaxed hidden sm:block">
                                                    陳列品建檔，輕鬆管理櫃上陳列中與撤下的品項。
                                                </p>
                                            </div>

                                            <div className="flex items-center gap-2.5 w-full md:w-auto">
                                                {/* 匯出按鈕縮小為適中尺寸 */}

                                                    <i className="fa-solid fa-file-excel mr-1.5"></i>匯出 Excel

                                                        <i className="fa-solid fa-box-archive mr-1.5"></i>已撤下
                                                    </button>
                                                    <button onClick={() => setDisplayFilter('displayed')} className={`flex-1 md:w-28 py-1.5 text-xs font-bold rounded-md transition-all duration-300 ${displayFilter === 'displayed' ? 'bg-amber-500 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>
                                                        <i className="fa-solid fa-lightbulb mr-1.5"></i>陳列中
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 輸入框表單 */}
                                        <form onSubmit={handleDisplayScanSubmit} className="relative group flex gap-2">
                                            <div className="relative flex-1">
                                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-transform group-focus-within:scale-110">
                                                    <i className="fa-solid fa-barcode text-amber-500/70 text-lg"></i>
                                                </div>
                                                <input
                                                    ref={displayInputRef} type="text" value={displayBarcodeInput} onChange={(e) => setDisplayBarcodeInput(e.target.value)}
                                                    className="block w-full pl-12 pr-4 py-3 md:py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500/50 dark:text-white text-base transition-all outline-none shadow-inner font-mono"
                                                    placeholder="掃描陳列品建檔..." autoFocus
                                                />
                                            </div>
                                            <button type="button" onClick={() => { setScannerTarget('display'); setScannerOpen(true); }} className="px-5 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-amber-500 dark:hover:text-amber-400 rounded-xl transition-colors shadow-sm flex items-center justify-center">
                                                <i className="fa-solid fa-camera text-xl"></i>
                                            </button>
                                            <button type="submit" className="px-6 bg-slate-800 dark:bg-slate-700 text-white hover:bg-amber-500 dark:hover:bg-amber-500 rounded-xl font-bold transition-colors shadow-sm">
                                                登錄
                                            </button>
                                        </form>
                                    </div>

                                    {/* 典藏品網格呈現 (全寬度版：增加 xl:grid-cols-4) */}
                                    {displayItems.filter(item => item.status === displayFilter).length === 0 ? (
                                        <div className="text-center py-20 bg-white/50 dark:bg-slate-800/30 rounded-2xl border border-slate-200 dark:border-slate-700 border-dashed transition-colors">
                                            <i className={`fa-solid ${displayFilter === 'stored' ? 'fa-box-open text-slate-300' : 'fa-store-slash text-amber-500/30'} text-5xl mb-4 block`}></i>
                                            <p className="text-slate-500 font-medium">目前沒有{displayFilter === 'stored' ? '撤下' : '展示中'}的品項</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                            {displayItems.filter(item => item.status === displayFilter).map((item) => (
                                                <div key={item.id} className={`group relative bg-white dark:bg-slate-800 rounded-2xl p-5 border transition-all duration-300 hover:-translate-y-1 hover:shadow-lg ${item.status === 'displayed' ? 'border-amber-200 dark:border-amber-500/30 shadow-amber-500/5' : 'border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500/50'}`}>

                                                    <button onClick={() => toggleDisplayStatus(item.id, item.status)} className={`absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center transition-all shadow-sm ${item.status === 'displayed' ? 'bg-amber-100 text-amber-600 dark:bg-amber-500/20 dark:text-amber-400 hover:bg-amber-200' : 'bg-slate-100 text-slate-400 dark:bg-slate-700 dark:text-slate-400 hover:bg-blue-100 hover:text-blue-600'}`} title={item.status === 'displayed' ? '收回典藏' : '轉為陳列'}>
                                                        <i className={`fa-solid ${item.status === 'displayed' ? 'fa-boxes-packing' : 'fa-lightbulb'} text-xs`}></i>
                                                    </button>

                                                    <div className="pr-10 mb-4">
                                                        <div className="text-xs font-bold text-slate-400 dark:text-slate-500 mb-1 flex items-center gap-1.5">
                                                            <i className="fa-solid fa-tag"></i>
                                                            <span>數量: <strong className={`text-base ${item.status === 'displayed' ? 'text-amber-500' : 'text-blue-500'}`}>{item.quantity}</strong></span>
                                                        </div>
                                                        <div className="mb-2"><EditableItemName item={item} onSave={(id, bc, name) => handleUpdateItemName('display', id, bc, name)} /></div>

                                                        <div className="mt-1.5">
                                                            <button onClick={() => toggleBarcodeVisibility(item.id)} className="text-xs font-mono text-slate-400 hover:text-blue-500 dark:hover:text-blue-400 flex items-center transition-colors bg-slate-50 dark:bg-slate-900 px-2 py-1 rounded border border-slate-200 dark:border-slate-700">
                                                                <i className={`fa-solid ${revealedBarcodes[item.id] ? 'fa-eye-slash' : 'fa-barcode'} mr-1.5`}></i>
                                                                {revealedBarcodes[item.id] ? item.barcode : '顯示條碼'}
                                                            </button>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center justify-between pt-3 border-t border-slate-100 dark:border-slate-700/50">
                                                        <div className="flex items-center bg-slate-50 dark:bg-slate-900 rounded-lg p-1 border border-slate-200 dark:border-slate-700">
                                                            <button onClick={() => updateDisplayQuantity(item.id, -1)} className="w-7 h-7 rounded flex items-center justify-center text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-slate-700 transition-colors shadow-sm"><i className="fa-solid fa-minus text-[10px]"></i></button>
                                                            <div className="w-8 text-center font-bold text-slate-700 dark:text-slate-200 text-sm">{item.quantity}</div>
                                                            <button onClick={() => updateDisplayQuantity(item.id, 1)} className="w-7 h-7 rounded flex items-center justify-center text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-slate-700 transition-colors shadow-sm"><i className="fa-solid fa-plus text-[10px]"></i></button>
                                                        </div>

                                                        <div className="flex items-center gap-1.5">
                                                            <button onClick={() => {
                                                                const textToCopy = `${item.barcode}\t${item.name}`;
                                                                if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(textToCopy).then(() => showToast('📋 已複製條碼與品名！')).catch(fallbackCopy); } else { fallbackCopy(); }
                                                                function fallbackCopy() { const textArea = document.createElement("textarea"); textArea.value = textToCopy; textArea.style.position = "fixed"; textArea.style.opacity = "0"; document.body.appendChild(textArea); textArea.focus(); textArea.select(); try { document.execCommand('copy'); showToast('📋 已複製條碼與品名！'); } catch (err) { showToast('❌ 複製失敗，請手手動複製'); } document.body.removeChild(textArea); }
                                                            }} className="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-500/10 rounded-lg transition-colors" title="複製條碼與品名">
                                                                <i className="fa-solid fa-copy"></i>
                                                            </button>

                                                            <button onClick={() => removeDisplayItem(item.id)} className="w-9 h-9 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors" title="移除此陳列品">
                                                                <i className="fa-solid fa-trash-can"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* =========================================
                        分頁 4: 條碼列印中心 (統一 4:8 雙欄佈局)
                    ========================================= */}
                            {activeTab === 'barcode-print' && (
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full pb-10 animate-scale-in mt-2 w-full">

                                    {/* 👈 左側：輸入與控制區 (Col-span-4) */}
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                                            <div className="mb-5">
                                                <div className="w-11 h-11 bg-blue-50 dark:bg-blue-500/20 text-blue-500 dark:text-blue-400 rounded-lg flex items-center justify-center mb-3">
                                                    <i className="fa-solid fa-barcode text-xl"></i>
                                                </div>
                                                <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100">連續條碼掃描</h3>
                                            </div>
                                            <form onSubmit={handleBarcodePrintScan} className="relative mb-2 flex gap-2">
                                                <div className="relative flex-1 group">
                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-transform group-focus-within:scale-110">
                                                        <i className="fa-solid fa-magnifying-glass text-slate-400"></i>
                                                    </div>
                                                    <input
                                                        ref={barcodeInputRef} type="text" value={barcodePrintInput} onChange={(e) => setBarcodePrintInput(e.target.value)}

                                                        placeholder="掃描或輸入..." autoFocus
                                                    />
                                                </div>
                                                <button type="button" onClick={() => { setScannerTarget('print'); setScannerOpen(true); }} className="px-4 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors shadow-sm flex items-center justify-center">
                                                    <i className="fa-solid fa-camera text-xl"></i>
                                                </button>
                                                <button type="submit" className="px-5 bg-slate-800 dark:bg-blue-600 text-white hover:bg-slate-900 dark:hover:bg-blue-700 rounded-xl font-bold transition-colors shadow-sm">
                                                    加入
                                                </button>
                                            </form>
                                        </div>
                                    </div>

                                    {/* 👉 右側：待印清單明細 (Col-span-8) */}
                                    <div className="lg:col-span-8 relative flex flex-col h-[calc(100vh-16rem)]">
                                        <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col h-full transition-colors">
                                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-5 shrink-0 gap-4 border-b border-slate-100 dark:border-slate-700 pb-4">
                                                <h2 className="text-base font-bold text-slate-800 dark:text-slate-100 flex items-center whitespace-nowrap">
                                                    <i className="fa-solid fa-list-check text-blue-400 mr-2"></i>待印清單
                                                    <span className="ml-3 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 text-xs px-2 py-0.5 rounded font-medium">{barcodeItems.length} 筆</span>
                                                </h2>
                                                <div className="flex items-center gap-2.5 w-full sm:w-auto">
                                                    {barcodeItems.length > 0 && (
                                                        <button onClick={() => executePrint('barcode-all')} className="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors shadow-sm flex items-center whitespace-nowrap">
                                                            <i className="fa-solid fa-print mr-1.5"></i>全部列印
                                                        </button>
                                                    )}
                                                    {barcodeItems.length > 0 && (
                                                        <div className="relative flex-1 sm:w-48 group">
                                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fa-solid fa-filter text-slate-400 text-xs group-focus-within:text-blue-500"></i></div>
                                                            <input type="text" value={barcodeSearch} onChange={e => setBarcodeSearch(e.target.value)} className="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-1 focus:ring-blue-500 transition-shadow" placeholder="過濾清單..." />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                                {barcodeItems.length === 0 ? (
                                                    <div className="h-full flex flex-col items-center justify-center border-2 border-slate-100 dark:border-slate-700 border-dashed rounded-xl bg-slate-50/50 dark:bg-slate-900/50">
                                                        <i className="fa-solid fa-print text-4xl text-slate-300 mb-3"></i>
                                                        <p className="text-slate-500 dark:text-slate-400 text-sm font-medium">待印清單為空</p>
                                                    </div>
                                                ) : filteredBarcodeItems.length === 0 ? (
                                                    <div className="text-center py-10"><p className="text-slate-500 dark:text-slate-400 font-medium">無符合的過濾結果</p></div>
                                                ) : (
                                                    <div className="flex flex-col gap-3">
                                                        {filteredBarcodeItems.map(item => (
                                                            <div key={item.id} className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 group hover:border-blue-200 dark:hover:border-blue-500/50 transition-colors">
                                                                <div className="flex-1 flex items-center gap-4 w-full">
                                                                    <div className="bg-slate-50 dark:bg-slate-900 p-2 rounded border border-slate-100 dark:border-slate-700 hidden md:block shrink-0">
                                                                        <BarcodeImage value={item.barcode} printMode={false} mini={true} />
                                                                    </div>
                                                                    <div className="flex-1 w-full">
                                                                        <EditableItemName item={item} onSave={(id, bc, name) => handleUpdateItemName('barcode', id, bc, name)} />
                                                                        <div className="text-xs text-slate-400 font-mono mt-1 flex items-center"><i className="fa-solid fa-barcode mr-1 opacity-50"></i>{item.barcode}</div>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center gap-3 self-end sm:self-auto w-full sm:w-auto justify-between sm:justify-end shrink-0">
                                                                    <div className="flex items-center bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg shadow-sm overflow-hidden p-1">
                                                                        <button onClick={() => updateBarcodeItemQuantity(item.id, -1)} className="p-1.5 text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700 rounded"><i className="fa-solid fa-minus w-3"></i></button>
                                                                        <div className="w-8 text-center font-bold text-slate-700 dark:text-slate-200 text-sm">{item.quantity}</div>
                                                                        <button onClick={() => updateBarcodeItemQuantity(item.id, 1)} className="p-1.5 text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700 rounded"><i className="fa-solid fa-plus w-3"></i></button>
                                                                    </div>
                                                                    <div className="flex gap-1.5">
                                                                        <button onClick={() => executePrint({ type: 'barcode-single', item })} className="px-3 py-1.5 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 hover:bg-blue-100 rounded-lg text-xs font-bold transition-colors">單獨印</button>
                                                                        <button onClick={() => removeBarcodeItem(item.id)} className="w-8 h-8 flex items-center justify-center bg-slate-50 dark:bg-slate-700 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors"><i className="fa-solid fa-xmark"></i></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* =========================================
                        分頁 5: 系統設定
                    ========================================= */}
                            {activeTab === 'settings' && (
                                <div className="max-w-4xl mx-auto space-y-6 pb-10 animate-scale-in">

                                    {/* 區塊 1：系統資料備份與還原 */}
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors">
                                        <div className="flex items-center gap-3 mb-6 border-b border-slate-100 dark:border-slate-700 pb-6">
                                            <div className="p-3 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-xl flex-shrink-0">
                                                <i className="fa-solid fa-cloud-arrow-down text-2xl"></i>
                                            </div>
                                            <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100">系統資料備份與還原</h3>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                            <div className="p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700 flex flex-col items-start">
                                                <button onClick={handleExportData} className="w-full px-4 py-2 bg-slate-800 dark:bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-slate-900 dark:hover:bg-blue-700 transition-colors shadow-sm">
                                                    <i className="fa-solid fa-box-archive mr-2"></i> 下載備份檔
                                                </button>
                                            </div>
                                            <div className="p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700 flex flex-col items-start">
                                                <label className="w-full px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 text-sm font-medium rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors shadow-sm cursor-pointer text-center">
                                                    <i className="fa-solid fa-folder-open mr-2"></i> 選擇備份檔並還原
                                                    <input type="file" className="hidden" accept=".json" onChange={handleImportData} />
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 區塊 2：自動分類規則 (支援點擊編輯與大小寫脫勾) */}
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors">
                                        <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-2 flex items-center"><i className="fa-solid fa-layer-group text-blue-500 mr-2"></i>自動分類規則</h3>
                                        <p className="text-xs text-slate-500 dark:text-slate-400 mb-5 leading-relaxed">
                                            系統會自動忽略大小寫。點擊下方已有規則可直接<strong className="text-blue-500 ml-1">修改名稱或關鍵字</strong>。
                                        </p>

                                        <div className="flex flex-col sm:flex-row gap-3 mb-6 bg-blue-50/50 dark:bg-blue-500/5 p-4 rounded-xl border border-blue-100 dark:border-blue-500/20">
                                            <input type="text" className="w-full sm:w-1/3 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 font-bold" placeholder="新分類名稱" value={newCatName} onChange={(e) => setNewCatName(e.target.value)} />
                                            <input type="text" className="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="關鍵字 (請用半形逗號 , 分隔)" value={newCatKeys} onChange={(e) => setNewCatKeys(e.target.value)} />
                                            <button onClick={handleAddCategory} className="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 shadow-sm font-bold flex items-center justify-center"><i className="fa-solid fa-plus mr-2"></i>新增</button>
                                        </div>

                                        <div className="space-y-3">
                                            {settings.customCategories.map(cat => (
                                                <EditableCategoryItem
                                                    key={cat.id}
                                                    cat={cat}
                                                    onSave={(id, newName, newKeywords) => {
                                                        const updatedCategories = settings.customCategories.map(c =>
                                                            c.id === id ? { ...c, name: newName, keywords: newKeywords } : c
                                                        );
                                                        updateCloudData('settings', { ...settings, customCategories: updatedCategories }, `已更新分類：${newName}`);
                                                    }}
                                                    onDelete={(id) => {
                                                        const catToDelete = settings.customCategories.find(c => c.id === id);
                                                        const newCategories = settings.customCategories.filter(c => c.id !== id);
                                                        updateCloudData('settings', { ...settings, customCategories: newCategories });
                                                        if (catToDelete) triggerUndo(`已刪除分類規則：${catToDelete.name}`, () => {
                                                            updateCloudData('settings', { ...settings, customCategories: [...newCategories, catToDelete] });
                                                        });
                                                    }}
                                                />
                                            ))}
                                        </div>
                                    </div>

                                    {/* =========================================
                            區塊 3：整合版共用字典庫管理 (折疊 + 分頁)

                                        <div
                                            className={`flex items-center justify-between cursor-pointer group transition-all ${isDictExpanded ? 'mb-6 border-b border-slate-100 dark:border-slate-700 pb-6' : ''}`}
