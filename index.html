        tailwind.config = {
            darkMode: 'class',
            theme: {
                fontFamily: {
                    sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                },
                extend: {
                    fontSize: {
                        'xs': ['12px', { lineHeight: '16px', letterSpacing: '0em' }],
                        'sm': ['14px', { lineHeight: '18px', letterSpacing: '-0.006em' }],
                        'base': ['17px', { lineHeight: '22px', letterSpacing: '-0.022em' }],
                        'lg': ['19px', { lineHeight: '24px', letterSpacing: '-0.021em' }],

                        '2xl': ['22px', { lineHeight: '28px', letterSpacing: '-0.026em' }],

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        html.dark ::-webkit-scrollbar-thumb { background: #475569; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        body {
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent; 
        }

        button {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important;
            touch-action: manipulation; 
        }
        button:active { transform: scale(0.95) !important; }

        .sticky.top-0 {
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            background-color: rgba(248, 250, 252, 0.85) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8) !important;

        .dark .sticky.top-0 {
            background-color: rgba(30, 41, 59, 0.85) !important;
            border-bottom: 1px solid rgba(51, 65, 85, 0.8) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2) !important;
        }

        @media print {
            html, body, html.dark, html.dark body { height: auto !important; min-height: auto !important; overflow: visible !important; background: white !important; color: black !important; margin: 0; padding: 0 !important; -webkit-print-color-adjust: exact; }
            .h-screen, .h-full { height: auto !important; min-height: auto !important; }
            .overflow-hidden, .overflow-auto, .overflow-y-auto { overflow: visible !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; position: static !important; width: 100%; height: auto !important; overflow: visible !important; }
            #print-area-barcode { border: none; width: 80mm !important; max-width: 80mm !important; margin: 0 auto; box-sizing: border-box; overflow: hidden; }
            .label-item { width: 80mm; padding: 6mm 4mm; display: flex; flex-direction: column; align-items: center; justify-content: center; page-break-inside: avoid; page-break-after: auto; border-bottom: 1px dashed #ccc; margin-bottom: 4mm; box-sizing: border-box; background: white !important; color: black !important; }
            .label-item:last-child { border-bottom: none; margin-bottom: 0; }
            .label-item svg { max-width: 100%; height: auto; }
            #print-area-damaged { width: 80mm !important; max-width: 80mm !important; padding: 4mm !important; color: black !important; font-size: 12px !important; font-family: sans-serif; background: white !important; box-sizing: border-box; overflow: hidden; }

        #reader select { padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 1rem; }

<body class="antialiased text-base bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        // ==========================================
        // Firebase 初始化與安全連線
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDzqfgGPpbiXFO7DJVG-GIn1MKnDEVtSHw",
            authDomain: "retail-ops-90129.firebaseapp.com",
            projectId: "retail-ops-90129",
            storageBucket: "retail-ops-90129.firebasestorage.app",
            messagingSenderId: "123533342597",
            appId: "1:123533342597:web:b75e0f8100f9381cfff6ec",
            measurementId: "G-F6PTTYE35G"
        };

        if (typeof window.firebase !== 'undefined' && !window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
            window.firebase.firestore().enablePersistence({ synchronizeTabs: true })
                .catch(function (err) { console.warn("快取啟用失敗:", err.code); });
        }
        const db = window.firebase ? window.firebase.firestore() : null;
        const auth = window.firebase ? window.firebase.auth() : null;

        const defaultCategories = [
            { id: 1, name: '✨ 星星人系列', keywords: '星星人' },
            { id: 2, name: '🧸 模型/盲盒', keywords: '公仔,一番賞,盲盒' },
            { id: 3, name: '🃏 卡牌遊戲', keywords: '卡牌' },
            { id: 4, name: '☁️ 絨毛玩具', keywords: '娃娃,絨毛,毛絨' }
        ];

        const defaultSettings = { targetAmount: 1150, newBarcodes: [], barcodeMap: {}, customNameMap: {}, boxSizeMap: {}, customCategories: defaultCategories };

        const { useState, useEffect, useMemo, useRef } = React;

        const parseCSV = (text) => {
            const lines = text.split('\n'); const result = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim(); if (!line) continue;
                const row = []; let insideQuotes = false, value = '';
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') insideQuotes = !insideQuotes;
                    else if (char === ',' && !insideQuotes) { row.push(value.trim()); value = ''; }
                    else value += char;
                }
                row.push(value.trim()); result.push(row);
            }
            return result;
        };

        const formatMoney = (num) => new Intl.NumberFormat('en-US').format(Math.round(num));
        const getWeekday = (dateStr) => ['日', '一', '二', '三', '四', '五', '六'][new Date(dateStr).getDay()];
        const formatDateStr = (dateStr) => {
            const date = new Date(dateStr);
            return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
        };
        const determineCategory = (productName, categories) => {
            const lowerProductName = (productName || '').toLowerCase();
            for (let cat of categories) {
                const keywords = cat.keywords.split(',').map(k => k.trim().toLowerCase()).filter(k => k);
                if (keywords.some(k => lowerProductName.includes(k))) return cat.name;
            }
            return '📦 其他 IP';
        };

        // ✨ 輔助尋找中文字典 (具備 Excel 吃 0 容錯能力)
        const findNameInDict = (barcode, dict) => {
            if (!barcode || !dict) return null;
            const safeBarcode = String(barcode).trim();
            // 1. 精準比對
            if (dict[safeBarcode]) return dict[safeBarcode];
            // 2. 去零比對 (對應 Excel 匯出時少掉開頭 0 的狀況)
            const stripped = safeBarcode.replace(/^0+/, '');
            const key = Object.keys(dict).find(k => String(k).trim().replace(/^0+/, '') === stripped);
            return key ? dict[key] : null;
        };

        function BarcodeImage({ value, name, printMode = false, mini = false, hideName = false, quantity = 1 }) {
            const svgRef = useRef(null);
            useEffect(() => {
                if (svgRef.current && value && typeof window.JsBarcode !== 'undefined') {
                    try { window.JsBarcode(svgRef.current, value, { format: "CODE128", width: mini ? 1.5 : 2.2, height: mini ? 30 : 60, displayValue: !mini, fontSize: 16, margin: 0, background: "transparent", lineColor: printMode ? "#000" : "currentColor" }); }
                    catch (e) { console.error("無法產生條碼:", e); }
                }
            }, [value, printMode, mini]);

            if (mini) return <svg ref={svgRef} className="dark:invert"></svg>;
            return (
                <div className={printMode ? 'label-item' : 'flex flex-col items-center justify-center w-full'}>
                    {!hideName && (
                        <div className={printMode ? 'text-[18px] font-bold mb-2 text-center text-black leading-tight' : 'font-bold text-center text-sm mb-2 text-slate-700 dark:text-slate-200'}>
                            <div>{name || '（無品名）'}</div>
                            {printMode && quantity > 1 && <div className="mt-1 text-[16px] font-black border-2 border-black rounded px-2 py-1 inline-block text-black">數量: {quantity}</div>}
                        </div>
                    )}
                    <svg ref={svgRef} className={!printMode ? "dark:invert" : ""}></svg>
                </div>
            );
        }

        function EditableItemName({ item, onSave }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(item.name);
            const inputRef = useRef(null);
            useEffect(() => { if (isEditing) inputRef.current?.focus(); }, [isEditing]);
            const save = () => { if (tempName.trim() && tempName !== item.name) onSave(item.id, item.barcode, tempName.trim()); setIsEditing(false); };

            if (isEditing) return <input ref={inputRef} type="text" value={tempName} onChange={e => setTempName(e.target.value)} onBlur={save} onKeyDown={e => e.key === 'Enter' && save()} className="w-full px-2 py-1 text-sm border border-blue-300 rounded dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />;
            return (
                <div className={`font-bold text-lg cursor-pointer group flex items-center gap-2 transition-colors ${item.name.includes('未知商品') ? 'text-rose-500 hover:text-rose-600' : 'hover:text-blue-500'}`} onClick={() => setIsEditing(true)}>
                    <span>{item.name}</span><i className="fa-solid fa-pen text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
            );
        }

        function EditableCategoryItem({ cat, onSave, onDelete }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(cat.name);
            const [tempKeys, setTempKeys] = useState(cat.keywords);

            const handleSave = () => {
                if (tempName.trim() && tempKeys.trim()) {
                    onSave(cat.id, tempName.trim(), tempKeys.trim());
                }
                setIsEditing(false);
            };

            if (isEditing) {
                return (
                    <div className="flex flex-col sm:flex-row gap-3 bg-blue-50 dark:bg-slate-800/80 p-4 rounded-xl border border-blue-200 dark:border-blue-500/50 shadow-sm animate-scale-in">
                        <input type="text" value={tempName} onChange={e => setTempName(e.target.value)} className="flex-1 px-3 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="分類名稱 (例: 星星人系列)" />
                        <input type="text" value={tempKeys} onChange={e => setTempKeys(e.target.value)} className="flex-2 px-3 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="關鍵字 (逗號分隔)" />
                        <div className="flex gap-2 justify-end sm:items-center">
                            <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-sm text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors font-medium">取消</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-bold shadow-sm flex items-center"><i className="fa-solid fa-check mr-1.5"></i>儲存</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 px-5 py-4 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-blue-200 dark:hover:border-blue-500/30 transition-colors group cursor-pointer" onClick={() => setIsEditing(true)}>
                    <div className="flex-1 pr-4">
                        <div className="font-bold text-slate-700 dark:text-slate-200 flex items-center text-base">
                            {cat.name}
                            <i className="fa-solid fa-pen ml-3 text-xs text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity" title="點擊編輯"></i>
                        </div>
                        <div className="text-sm text-slate-500 dark:text-slate-400 mt-1.5 leading-relaxed font-mono bg-white dark:bg-slate-800 inline-block px-2 py-0.5 rounded border border-slate-100 dark:border-slate-700">
                            {cat.keywords}
                        </div>
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); onDelete(cat.id); }} className="w-11 h-11 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-colors shrink-0 shadow-sm border border-transparent hover:border-red-100 dark:hover:border-red-500/20" title="刪除規則">
                        <i className="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            );
        }

        function App() {
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [passcodeError, setPasscodeError] = useState(false);

            useEffect(() => {
                if (!auth) { setAuthLoading(false); return; }
                const unsubscribe = auth.onAuthStateChanged((currentUser) => { setUser(currentUser); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);

            const [activeTab, setActiveTab] = useState('daily-report');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState('');
            const [printContext, setPrintContext] = useState(null);

            const executePrint = (context) => {
                setPrintContext(context);
                setTimeout(() => { window.print(); }, 150);
            };
            const [undoData, setUndoData] = useState(null);
            const [isQRCodeModalOpen, setIsQRCodeModalOpen] = useState(false);
            const [qrDataUrl, setQrDataUrl] = useState('');
            const [qrError, setQrError] = useState('');

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };

            const exportToExcel = (data, filename) => {
                if (data.length === 0) return showToast('⚠️ 匯出失敗：沒有資料可以匯出');
                const exportData = data.map(item => ({
                    '條碼': item.barcode,
                    '品名': item.name,
                    '數量': item.quantity,
                    '狀態': item.status ? (item.status === 'displayed' ? '陳列中' : '已撤下') : '盒損'
                }));
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "品項清單");
                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                window.XLSX.writeFile(workbook, `${filename}_${dateStr}.xlsx`);
            };

            useEffect(() => {
                const afterPrint = () => setPrintContext(null);
                window.addEventListener('afterprint', afterPrint);
                return () => window.removeEventListener('afterprint', afterPrint);
            }, []);

            const [dailyRecords, setDailyRecords] = useState([]);
            const [settings, setSettings] = useState(defaultSettings);
            const [damagedItems, setDamagedItems] = useState([]);
            const [displayItems, setDisplayItems] = useState([]); 
            const [dbStatus, setDbStatus] = useState('連線中...');
            const [dataLoaded, setDataLoaded] = useState({ records: false, settings: false, damaged: false, display: false });
            const isDataReady = dataLoaded.records && dataLoaded.settings && dataLoaded.damaged && dataLoaded.display;

            useEffect(() => {
                if (!user || !db) return;

                const options = { includeMetadataChanges: true };

                const unsubRecords = db.collection('retailOps').doc('dailyRecords').onSnapshot(options, doc => {
                    if (doc.exists) setDailyRecords(doc.data().data || []);
                    if (!doc.metadata.fromCache) { setDataLoaded(prev => ({ ...prev, records: true })); }
                    setDbStatus(doc.metadata.fromCache ? '🟡 連線中...' : '🟢 已同步');
                }, err => { setDbStatus('🔴 權限不足或連線失敗'); });

                const unsubSettings = db.collection('retailOps').doc('settings').onSnapshot(options, doc => {
                    if (doc.exists) setSettings(doc.data().data || defaultSettings);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, settings: true }));
                });

                const unsubDamaged = db.collection('retailOps').doc('damagedItems').onSnapshot(options, doc => {
                    if (doc.exists) setDamagedItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, damaged: true }));
                });

                const unsubDisplay = db.collection('retailOps').doc('displayItems').onSnapshot(options, doc => {
                    if (doc.exists) setDisplayItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, display: true }));
                });

                return () => { unsubRecords(); unsubSettings(); unsubDamaged(); unsubDisplay(); };
            }, [user]);

            const updateCloudData = (docName, newData, successMsg) => {
                if (!db || !user) return showToast('權限不足，無法寫入資料');
                db.collection('retailOps').doc(docName).set({ data: newData })
                    .then(() => { if (successMsg) showToast(successMsg); })
                    .catch(err => showToast('同步失敗：' + err.message));
            };

            const handleUpdateItemName = (listType, id, barcode, newName) => {
                if (listType === 'damaged') {
                    updateCloudData('damagedItems', damagedItems.map(i => i.id === id ? { ...i, name: newName } : i));
                } else if (listType === 'display') {
                    updateCloudData('displayItems', displayItems.map(i => i.id === id ? { ...i, name: newName } : i));
                } else {
                    setBarcodeItems(prev => prev.map(i => i.id === id ? { ...i, name: newName } : i));
                }
                updateCloudData('settings', { ...settings, customNameMap: { ...settings.customNameMap, [barcode]: newName } }, `已更新字典！`);
            };

            const triggerUndo = (message, onUndoCallback) => {
                if (undoData && undoData.timerId) clearTimeout(undoData.timerId);
                const timerId = setTimeout(() => setUndoData(null), 5000); 
                setUndoData({ message, onUndo: onUndoCallback, timerId });
            };

            const handleUndoAction = () => {
                if (!undoData) return;
                clearTimeout(undoData.timerId);
                if (typeof undoData.onUndo === 'function') undoData.onUndo();
                setUndoData(null);
                showToast('✅ 已成功復原操作！');
            };

            const [barcodeInput, setBarcodeInput] = useState('');
            const [lastAction, setLastAction] = useState(null);
            const [isDamagedOverviewExpanded, setIsDamagedOverviewExpanded] = useState(false);
            const [damagedSearch, setDamagedSearch] = useState('');
            const [activeDamagedCategory, setActiveDamagedCategory] = useState('全部');
            const damagedInputRef = useRef(null);

            const handleScanSubmit = (e) => {
                e.preventDefault(); const barcode = barcodeInput.trim(); if (!barcode) return;
                
                // ✨ 防呆找尋機制，確保掃描槍刷出來的條碼也能正確去 0 找尋
                let dictName = findNameInDict(barcode, settings.customNameMap);

            // ==========================================

            // ==========================================
            const processData = (rows) => {
                if (rows.length < 2) return showToast('檔案格式錯誤');
                const headers = rows[0];
                const idxDate = headers.indexOf('CREATED_DATE');
                const idxType = headers.indexOf('TYPE');
                const idxStore = headers.indexOf('STORE');
                const idxBarcode = headers.indexOf('BARCODE');
                const idxDesc = headers.indexOf('DESCRIPTION_CN');
                const idxQty = headers.indexOf('SOLD_QTY');
                const idxAmt = headers.indexOf('AMT_WITH_TAX');

                let todaySales = 0, pointsRedeemed = 0, firstDate = null, storeName = '未知店鋪';
                let mega1000 = { amt: 0, qty: 0, giftQty: 0 }, mega400 = { amt: 0, qty: 0, giftQty: 0 };
                let itemStats = {}, updatedBarcodeMap = { ...settings.barcodeMap };

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i]; if (row.length < 5) continue;
                    if (idxType !== -1 && !['sale', 'return', 'refund', 'exchange'].includes(String(row[idxType] || '').trim().toLowerCase())) continue;

                    const barcode = String(row[idxBarcode] || '').trim();

                    if (barcode && desc && !dictName) updatedBarcodeMap[barcode] = desc;
                    todaySales += amt; if (disc === 330) pointsRedeemed += 330;

                    if (rawDesc.includes('400%') || desc.includes('400%')) { amt === 0 ? (mega400.giftQty += qty) : (mega400.qty += qty, mega400.amt += amt); }

                        const boxSize = settings.boxSizeMap[barcode] || 6;
                        if (qty >= boxSize) { itemStats[barcode].boxes += Math.floor(qty / boxSize); itemStats[barcode].singles += (qty % boxSize); }
                        else { itemStats[barcode].singles += qty; }
                    }

                try {
                    const utf8Content = unescape(encodeURIComponent(reportContent));
                    const qr = new window.QRious({ value: utf8Content, size: 350, level: 'L', background: 'white', foreground: '#000000' });
                    const dataUrl = qr.toDataURL();
                    if (dataUrl && dataUrl.length > 100) setQrDataUrl(dataUrl); else throw new Error("圖片異常");
                } catch (err) {
                    setQrError('⚠️ 條碼轉換失敗，報表文字可能包含無法解析的特殊字元，建議改用「複製」按鈕。');
                }
            }, [reportContent, isQRCodeModalOpen]);

            // ==========================================
            // 相機掃描器狀態與邏輯
            // ==========================================
            const [scannerOpen, setScannerOpen] = useState(false);
            const [scannerTarget, setScannerTarget] = useState(''); // 'damaged' | 'display' | 'print'
            const [dictSearch, setDictSearch] = useState('');
            const [isDictExpanded, setIsDictExpanded] = useState(true);
            const [dictCurrentPage, setDictCurrentPage] = useState(1);

            const scanLockRef = useRef(false);
            const latestStateRef = useRef({});
            latestStateRef.current = { settings, displayFilter };

            useEffect(() => {
                if (!scannerOpen) {
                    scanLockRef.current = false; 
                    return;
                }

                const html5QrCode = new window.Html5Qrcode("reader");

                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 120 } },
                    (decodedText) => {
                        if (scanLockRef.current) return;
                        scanLockRef.current = true; 

                        if (typeof navigator.vibrate === 'function') navigator.vibrate(100);

                        html5QrCode.stop().then(() => {
                            setScannerOpen(false);

                            const barcode = decodedText.replace(/[^a-zA-Z0-9-]/g, '').trim();

                            const currentSettings = latestStateRef.current.settings;
                            const currentFilter = latestStateRef.current.displayFilter;
                            let dictName = findNameInDict(barcode, currentSettings.customNameMap);
                            const productName = dictName || currentSettings.barcodeMap[barcode] || `未知商品 (${barcode})`;

                            if (scannerTarget === 'damaged') {
                                setDamagedItems(prev => {
                                    const existing = prev.findIndex(item => item.barcode === barcode);
                                    const newData = existing >= 0
                                        ? prev.map(item => item.barcode === barcode ? { ...item, quantity: item.quantity + 1 } : item)
                                        : [...prev, { id: Date.now(), barcode, name: productName, quantity: 1 }];
                                    updateCloudData('damagedItems', newData);
                                    return newData;
                                });
                                showToast(`📦 盒損已自動加入：${productName}`);
                            } else if (scannerTarget === 'display') {
                                setDisplayItems(prev => {
                                    const existing = prev.findIndex(item => item.barcode === barcode && item.status === currentFilter);
                                    const newData = existing >= 0
                                        ? prev.map(item => (item.barcode === barcode && item.status === currentFilter) ? { ...item, quantity: item.quantity + 1 } : item)
                                        : [...prev, { id: Date.now(), barcode, name: productName, quantity: 1, status: currentFilter }];
                                    updateCloudData('displayItems', newData);
                                    return newData;
                                });
                                showToast(`✨ 陳列品已自動登錄：${productName}`);
                            } else if (scannerTarget === 'print') {
                                setBarcodeItems(prev => {
                                    const existing = prev.find(i => i.barcode === barcode);
                                    if (existing) {
                                        showToast(`✅ 列印數量 +1：${productName}`);
                                        return prev.map(i => i.barcode === barcode ? { ...i, quantity: i.quantity + 1 } : i);
                                    } else {
                                        showToast(`🖨️ 已加入待印清單：${productName}`);
                                        return [{ id: Date.now(), barcode, name: productName, quantity: 1 }, ...prev];
                                    }
                                });
                            }
                        }).catch(() => { setScannerOpen(false); });
                    },
                    (error) => { }
                ).catch(err => {
                    showToast('⚠️ 無法啟動相機，請確認瀏覽器權限');
                    setScannerOpen(false);
                });

                return () => {
                    if (html5QrCode.isScanning) html5QrCode.stop().catch(console.error);
                };
            }, [scannerOpen, scannerTarget]);

            // ==========================================
            // Auth 登入畫面處理
            // ==========================================
            const handleLogin = (e) => {
                e.preventDefault();
                if (!emailInput || !passwordInput) return showToast('請填寫帳號與密碼');
                setAuthError('');
                auth.signInWithEmailAndPassword(emailInput, passwordInput)
                    .then(() => showToast('✅ 登入成功！'))
                    .catch(() => { setAuthError('帳號或密碼錯誤'); setPasscodeError(true); setTimeout(() => setPasscodeError(false), 500); });
            };

            const handleLogout = () => { auth.signOut().then(() => showToast('👋 已登出系統')); };

            if (authLoading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white"><i className="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-6 transition-colors duration-300 no-print">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="absolute top-6 right-6 w-12 h-12 rounded-full flex items-center justify-center bg-white dark:bg-slate-800 text-amber-500 shadow-sm hover:scale-110 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'} text-xl`}></i></button>
                        <div className={`w-full max-w-sm bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col items-center ${passcodeError ? 'animate-shake' : 'animate-scale-in'}`}>
                            <div className="w-20 h-20 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-3xl flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-shield-halved text-4xl"></i></div>
                            <h1 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">P-ops 懶人系統</h1>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-8 text-center">請輸入帳號密碼登入</p>
                            <form onSubmit={handleLogin} className="w-full flex flex-col gap-4">
                                <div className="relative"><i className="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} placeholder="員工 Email" className="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white font-medium transition-colors" /></div>
                                <div className="relative"><i className="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="密碼" className={`w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white font-medium transition-colors ${authError ? 'border-red-500 focus:ring-red-500' : 'border-slate-200 dark:border-slate-700'}`} /></div>
                                {authError && <p className="text-red-500 text-sm font-bold text-center">{authError}</p>}
                                <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/30 transition-all active:scale-95 mt-2">安全登入</button>
                            </form>
                        </div>
                        {toast && <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[60] bg-rose-500 text-white px-6 py-2 rounded-full shadow-lg font-bold animate-slide-up-fade">{toast}</div>}
                    </div>
                );
            }



            // ==========================================
            // 主要 UI 渲染區塊 
            // ==========================================

            return (
                <div className="flex flex-col min-h-screen w-full font-sans overflow-x-hidden">

                    {user && !isDataReady && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center transition-all">
                            <div className="bg-white dark:bg-slate-800 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-scale-in border border-slate-200 dark:border-slate-700">
                                <i className="fa-solid fa-circle-notch fa-spin text-2xl text-blue-500"></i>
                                <div>
                                    <div className="font-bold text-slate-800 dark:text-slate-100 text-sm">正在安全同步雲端資料...</div>
                                    <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">為避免資料覆寫，請稍候</div>
                                </div>
                            </div>
                        </div>
                    )}

              <div className="pt-8 pb-32 px-6 md:px-8 lg:px-12 max-w-7xl mx-auto min-h-screen w-full no-print">
                <div className="space-y-6 md:space-y-8">

                           {/* =========================================
                        分頁 1: 銷售日報表
                    ========================================= */}
                    {activeTab === 'daily-report' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full pb-10 animate-scale-in">
                            <div className="lg:col-span-7 space-y-6">
                                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                                    <h2 className="text-xl font-semibold mb-4 flex items-center dark:text-slate-100"><i className="fa-solid fa-cloud-arrow-up text-blue-500 mr-2"></i>上傳今日報表</h2>
                                    <div className="flex items-center justify-center w-full">
                                        <label className={`flex flex-col items-center justify-center w-full h-32 border-2 ${isProcessing ? 'border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800' : 'border-blue-200 dark:border-blue-500/30 border-dashed bg-blue-50 dark:bg-blue-500/5 hover:bg-blue-100 dark:hover:bg-blue-500/10 cursor-pointer'} rounded-xl transition-colors`}>
                                            <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                                <i className={`fa-solid fa-cloud-arrow-up text-3xl ${isProcessing ? 'text-slate-400' : 'text-blue-500'} mb-2`}></i>
                                                <p className="mb-2 text-sm text-slate-600 dark:text-slate-300">{isProcessing ? '處理檔案中...' : <><span className="font-semibold">點擊上傳</span> 或拖曳 Excel 檔案至此</>}</p>
                                            </div>
                                            <input type="file" className="hidden" accept=".csv, .xlsx, .xls" onChange={handleFileUpload} disabled={isProcessing} />
                                        </label>
                                    </div>
                                    {todayStats && (
                                        <div className="mt-4 p-5 bg-emerald-50 dark:bg-emerald-500/10 rounded-2xl flex justify-between items-center transition-colors border border-emerald-200 dark:border-emerald-500/30 shadow-sm">
                                            <div>
                                                <span className="block text-sm text-emerald-600 dark:text-emerald-400 font-bold mb-1">
                                                    <i className="fa-solid fa-check-circle mr-1.5"></i>今日報表已自動同步 ({todayStats.dateStr})
                                                </span>
                                                <span className="block text-3xl font-black text-emerald-700 dark:text-emerald-100">${formatMoney(todayStats.sales)}</span>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                                        <div className="flex items-center">
                                            <h2 className="text-xl font-semibold flex items-center whitespace-nowrap dark:text-slate-100"><i className="fa-solid fa-cloud text-blue-500 mr-2"></i> 歷史業績</h2>
                                            {availableMonths.length > 0 && (
                                                <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="ml-3 px-2 py-1 text-sm bg-blue-50 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 font-medium border border-blue-100 dark:border-blue-500/30 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                                                    {availableMonths.map(m => <option key={m} value={m}>{parseInt(m, 10)} 月份</option>)}
                                                </select>
                                            )}
                                        </div>
                                        <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                                            {currentMonthRecords.length > 3 && (
                                                <button onClick={() => setIsHistoryExpanded(!isHistoryExpanded)} className={`flex-1 sm:flex-none justify-center text-sm px-3 py-1.5 rounded-lg flex items-center transition-colors ${isHistoryExpanded ? 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300' : 'bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300'}`}><i className={`fa-solid ${isHistoryExpanded ? 'fa-compress' : 'fa-expand'} mr-1`}></i> {isHistoryExpanded ? '收起' : `展開全部(${currentMonthRecords.length})`}</button>
                                            )}
                                            <button onClick={() => { setIsBulkImportOpen(!isBulkImportOpen); }} className={`flex-1 sm:flex-none justify-center text-sm px-3 py-1.5 rounded-lg flex items-center transition-colors ${isBulkImportOpen ? 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300' : 'bg-emerald-50 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-300 hover:bg-emerald-100 dark:hover:bg-emerald-500/30'}`}><i className={`fa-solid ${isBulkImportOpen ? 'fa-xmark' : 'fa-table'} mr-1`}></i> {isBulkImportOpen ? '取消' : '批量匯入'}</button>
                                        </div>
                                    </div>
                                    {isBulkImportOpen && (
                                        <div className="mb-6 p-4 bg-emerald-50/50 dark:bg-emerald-500/10 rounded-xl border border-emerald-100 dark:border-emerald-500/20">
                                            <p className="text-xs text-slate-600 dark:text-slate-400 mb-3 leading-relaxed">請在 Excel 總表中依序選取並複製以下欄位：<br />日期、總業績、點數兌換、1000%數量、1000%金額、400%數量、400%金額</p>
                                            <textarea className="w-full px-4 py-3 border border-emerald-200 dark:border-emerald-500/30 rounded-lg outline-none h-32 text-sm font-mono whitespace-pre dark:bg-slate-800 dark:text-slate-200" placeholder="貼上 Excel 內容..." value={bulkInput} onChange={(e) => setBulkInput(e.target.value)}></textarea>
                                            <div className="flex justify-end mt-3"><button onClick={handleBulkImport} className="px-4 py-1.5 bg-emerald-500 text-white text-sm font-medium rounded-lg hover:bg-emerald-600"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 同步至雲端</button></div>
                                        </div>
                                    )}
                                    {visibleRecords.length === 0 ? (
                                        <p className="text-slate-400 dark:text-slate-500 text-sm">雲端無此月份紀錄，請上傳檔案或匯入。</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {visibleRecords.map(record => (
                                                <div key={record.date} className="flex justify-between items-start p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-blue-100 dark:hover:border-blue-500/50 transition-colors">
                                                    <div className="flex-1">
                                                        <div className="flex items-center mb-2">
                                                            <span className="font-bold text-slate-800 dark:text-slate-200 mr-3">{record.date} ({record.weekday})</span>
                                                            <span className="text-blue-600 dark:text-blue-300 font-bold bg-blue-50 dark:bg-blue-500/20 px-2 py-0.5 rounded text-sm">業績: ${formatMoney(record.sales)}</span>
                                                        </div>
                                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm text-slate-500 dark:text-slate-400 mt-3">
                                                            <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                                                <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">點數兌換</span>
                                                                <span className="font-medium text-slate-700 dark:text-slate-200">${formatMoney(record.points || 0)}</span>
                                                            </div>
                                                            <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                                                <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">400% MEGA</span>
                                                                <span className="font-medium text-slate-700 dark:text-slate-200">{record.bigToys?.['400']?.qty || 0}隻 / ${formatMoney(record.bigToys?.['400']?.amt || 0)}</span>
                                                            </div>
                                                            <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                                                <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">1000% MEGA</span>
                                                                <span className="font-medium text-slate-700 dark:text-slate-200">{record.bigToys?.['1000']?.qty || 0}隻 / ${formatMoney(record.bigToys?.['1000']?.amt || 0)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deleteRecord(record.date)} className="p-2 ml-4 mt-1 text-slate-400 hover:text-red-500 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/20"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                                    <h2 className="text-xl font-semibold mb-4 flex items-center dark:text-slate-100"><i className="fa-solid fa-sliders text-emerald-500 mr-2"></i>月目標/新品/小作文</h2>
                                    <div className="mb-6 w-full md:w-1/2">
                                        <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">選定月份業績目標 (萬)</label>
                                        <div className="relative">
                                            <input type="number" className="w-full pl-4 pr-10 py-2 border border-slate-200 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none dark:bg-slate-900 dark:text-white" value={settings.targetAmount} onChange={(e) => updateCloudData('settings', { ...settings, targetAmount: Number(e.target.value) })} />
                                            <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><span className="text-slate-500">萬</span></div>
                                        </div>
                                    </div>
                                    <div className="mb-6 pt-6 border-t border-slate-100 dark:border-slate-700/50">
                                        <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">追蹤的新品 Barcode</label>
                                        <div className="flex flex-col sm:flex-row gap-2 mb-3">
                                            <input type="text" className="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white" placeholder="輸入條碼..." value={newBarcodeStr} onChange={(e) => setNewBarcodeStr(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addNewBarcode()} />
                                            <div className="relative w-full sm:w-32"><input type="number" className="w-full pl-3 pr-10 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white" placeholder="端盒數量" value={newBoxSize} onChange={(e) => setNewBoxSize(Number(e.target.value))} min="1" /><div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><span className="text-slate-500 text-xs">入/盒</span></div></div>
                                            <button onClick={addNewBarcode} className="px-4 py-2 bg-slate-800 dark:bg-blue-600 text-white rounded-lg hover:bg-slate-900 dark:hover:bg-blue-700 transition-colors"><i className="fa-solid fa-plus mr-1"></i> 新增</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {settings.newBarcodes.map(code => (
                                                <span key={code} className="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 text-sm font-medium">{code} <span className="text-xs ml-1 opacity-60 font-normal">({settings.boxSizeMap[code] || 6}入)</span><button onClick={() => removeBarcode(code)} className="ml-2 hover:text-red-500"><i className="fa-solid fa-xmark"></i></button></span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-slate-100 dark:border-slate-700/50">
                                        <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">賣場狀況分享（小作文）</label>
                                        <textarea className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-lg outline-none h-24 resize-none dark:bg-slate-900 dark:text-white" placeholder="例如：今天是週五，人潮明顯增加..." value={story} onChange={(e) => setStory(e.target.value)}></textarea>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-5 relative">
                                
                               {/* ✨ 新增：今日熱銷 Top 5 儀表板 (直接從 itemStats 讀取乾淨資料) */}
                                {todayStats && todayStats.itemStats && (
                                    (() => {
                                        const rawArray = Object.values(todayStats.itemStats).filter(item => item.top5Amt > 0);
                                            
                                        // 統一使用：數量優先，業績次之
                                        const statsArray = rawArray.map(item => ({
                                            name: item.desc,
                                            quantity: item.top5Qty || item.qty || item.quantity || item.count || 0,
                                            sales: item.top5Amt || 0
                                        }));

                                        const top5Items = statsArray.sort((a, b) => b.quantity - a.quantity || b.sales - a.sales).slice(0, 5);

                                        if (top5Items.length === 0) return null;

                                        return (
                                            <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors animate-scale-in mb-6">
                                                <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4 flex items-center">
                                                    <i className="fa-solid fa-trophy text-amber-500 mr-2.5"></i> 今日熱銷 Top 5
                                                </h3>
                                                <div className="space-y-2.5">
                                                    {top5Items.map((item, index) => {
                                                        const percent = todayStats.sales > 0 ? ((item.sales / todayStats.sales) * 100).toFixed(1) : 0;
                                                        
                                                        const rankColors = [
                                                            'bg-amber-100 text-amber-600 border-amber-200 dark:bg-amber-500/20 dark:text-amber-400 dark:border-amber-500/30',
                                                            'bg-slate-200 text-slate-600 border-slate-300 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-600',
                                                            'bg-orange-100 text-orange-600 border-orange-200 dark:bg-orange-500/20 dark:text-orange-400 dark:border-orange-500/30'
                                                        ];
                                                        const currentRankColor = index < 3 ? rankColors[index] : 'bg-slate-50 text-slate-400 border-slate-200 dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700';

                                                        return (
                                                            <div key={`top-${index}`} className="flex items-center justify-between p-3 md:p-3.5 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-100 dark:border-slate-700/50 hover:border-blue-200 dark:hover:border-blue-500/30 transition-colors group">
