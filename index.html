<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>門市營運整合系統 (企業驗證版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'shrink-x': 'shrinkX 5s linear forwards',
                        'slide-up-fade': 'slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shrinkX: { '0%': { width: '100%' }, '100%': { width: '0%' } },
                        slideUpFade: { '0%': { transform: 'translate(-50%, 100%)', opacity: 0 }, '100%': { transform: 'translate(-50%, 0)', opacity: 1 } },
                        scaleIn: { '0%': { transform: 'scale(0.95)', opacity: 0 }, '100%': { transform: 'scale(1)', opacity: 1 } },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

    <style>
        html.dark ::-webkit-scrollbar-thumb { background: #475569; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* 列印專用 CSS */
        @media print {
            html, body, html.dark, html.dark body { height: auto !important; min-height: auto !important; overflow: visible !important; background: white !important; color: black !important; margin: 0; padding: 0 !important; -webkit-print-color-adjust: exact; }
            .h-screen, .h-full { height: auto !important; min-height: auto !important; }
            .overflow-hidden, .overflow-auto, .overflow-y-auto { overflow: visible !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; position: static !important; width: 100%; height: auto !important; overflow: visible !important; }
            
            #print-area-barcode { border: none; width: 80mm; margin: 0 auto; }
            .label-item { width: 80mm; padding: 6mm 4mm; display: flex; flex-direction: column; align-items: center; justify-content: center; page-break-inside: avoid; page-break-after: auto; border-bottom: 1px dashed #ccc; margin-bottom: 4mm; box-sizing: border-box; background: white !important; color: black !important; }
            .label-item:last-child { border-bottom: none; margin-bottom: 0; }
            .label-item svg { max-width: 100%; height: auto; }
            
            #print-area-damaged { width: 80mm !important; padding: 4mm !important; color: black !important; font-size: 12px !important; font-family: sans-serif; background: white !important; }
            .damaged-print-item { margin-bottom: 5mm; padding-bottom: 5mm; border-bottom: 1px dashed #ccc; page-break-inside: avoid; }
            @page { size: 80mm auto; margin: 0; }
        }
        .print-only { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { padding-bottom: 80px; transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        // ==========================================
        // Firebase 初始化與安全連線
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDzqfgGPpbiXFO7DJVG-GIn1MKnDEVtSHw",
            authDomain: "retail-ops-90129.firebaseapp.com",
            projectId: "retail-ops-90129",
            storageBucket: "retail-ops-90129.firebasestorage.app",
            messagingSenderId: "123533342597",
            appId: "1:123533342597:web:b75e0f8100f9381cfff6ec",
            measurementId: "G-F6PTTYE35G"
        };

        if (typeof window.firebase !== 'undefined' && !window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const db = window.firebase ? window.firebase.firestore() : null;
        const auth = window.firebase ? window.firebase.auth() : null;

        const defaultCategories = [
            { id: 1, name: '✨ 星星人系列', keywords: '星星人' },
            { id: 2, name: '🧸 模型/盲盒', keywords: '公仔,一番賞,盲盒' },
            { id: 3, name: '🃏 卡牌遊戲', keywords: '卡牌' },
            { id: 4, name: '☁️ 絨毛玩具', keywords: '娃娃,絨毛,毛絨' }
        ];

        const defaultSettings = { targetAmount: 1150, newBarcodes: [], barcodeMap: {}, customNameMap: {}, boxSizeMap: {}, customCategories: defaultCategories };

        const { useState, useEffect, useMemo, useRef } = React;

        const parseCSV = (text) => {
          const lines = text.split('\n'); const result = [];
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim(); if (!line) continue;
            const row = []; let insideQuotes = false, value = '';
            for (let j = 0; j < line.length; j++) {
              const char = line[j];
              if (char === '"') insideQuotes = !insideQuotes;
              else if (char === ',' && !insideQuotes) { row.push(value.trim()); value = ''; }
              else value += char;
            }
            row.push(value.trim()); result.push(row);
          }
          return result;
        };

        const formatMoney = (num) => new Intl.NumberFormat('en-US').format(Math.round(num));
        const getWeekday = (dateStr) => ['日', '一', '二', '三', '四', '五', '六'][new Date(dateStr).getDay()];
        const formatDateStr = (dateStr) => {
          const date = new Date(dateStr);
          return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
        };
        const determineCategory = (productName, categories) => {
            for (let cat of categories) {
                const keywords = cat.keywords.split(',').map(k => k.trim()).filter(k => k);
                if (keywords.some(k => productName.includes(k))) return cat.name;
            }
            return '📦 其他未分類';
        };

        function BarcodeImage({ value, name, printMode = false, mini = false, hideName = false, quantity = 1 }) {
            const svgRef = useRef(null);
            useEffect(() => {
                if (svgRef.current && value && typeof window.JsBarcode !== 'undefined') {
                    try { window.JsBarcode(svgRef.current, value, { format: "CODE128", width: mini ? 1.5 : 2.2, height: mini ? 30 : 60, displayValue: !mini, fontSize: 16, margin: 0, background: "transparent", lineColor: printMode ? "#000" : "currentColor" }); } 
                    catch (e) { console.error("無法產生條碼:", e); }
                }
            }, [value, printMode, mini]);

            if (mini) return <svg ref={svgRef} className="dark:invert"></svg>;
            return (
                <div className={printMode ? 'label-item' : 'flex flex-col items-center justify-center w-full'}>
                    {!hideName && (
                        <div className={printMode ? 'text-[18px] font-bold mb-2 text-center text-black leading-tight' : 'font-bold text-center text-sm mb-2 text-slate-700 dark:text-slate-200'}>
                            <div>{name || '（無品名）'}</div>
                            {printMode && quantity > 1 && <div className="mt-1 text-[16px] font-black border-2 border-black rounded px-2 py-1 inline-block">數量: {quantity}</div>}
                        </div>
                    )}
                    <svg ref={svgRef} className={!printMode ? "dark:invert" : ""}></svg>
                </div>
            );
        }

        function EditableItemName({ item, onSave }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(item.name);
            const inputRef = useRef(null);
            useEffect(() => { if(isEditing) inputRef.current?.focus(); }, [isEditing]);
            const save = () => { if(tempName.trim() && tempName !== item.name) onSave(item.id, item.barcode, tempName.trim()); setIsEditing(false); };
            
            if(isEditing) return <input ref={inputRef} type="text" value={tempName} onChange={e => setTempName(e.target.value)} onBlur={save} onKeyDown={e => e.key === 'Enter' && save()} className="w-full px-2 py-1 text-sm border border-indigo-300 rounded dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500" />;
            return (
                <div className={`font-bold text-lg cursor-pointer group flex items-center gap-2 transition-colors ${item.name.includes('未知商品') ? 'text-rose-500 hover:text-rose-600' : 'hover:text-indigo-500'}`} onClick={() => setIsEditing(true)}>
                    <span>{item.name}</span><i className="fa-solid fa-pen text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
                </div>
            );
        }

        function App() {
          const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [emailInput, setEmailInput] = useState('');
          const [passwordInput, setPasswordInput] = useState('');
          const [authError, setAuthError] = useState('');
          const [passcodeError, setPasscodeError] = useState(false);

          useEffect(() => {
              if (!auth) { setAuthLoading(false); return; }
              const unsubscribe = auth.onAuthStateChanged((currentUser) => { setUser(currentUser); setAuthLoading(false); });
              return () => unsubscribe();
          }, []);

          useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);

          const [activeTab, setActiveTab] = useState('daily-report');
          const [toast, setToast] = useState('');
          const [printContext, setPrintContext] = useState(null);
          const [undoData, setUndoData] = useState(null);
          const [isQRCodeModalOpen, setIsQRCodeModalOpen] = useState(false);
          const [qrDataUrl, setQrDataUrl] = useState('');
          const [qrError, setQrError] = useState('');

          const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };
          
          const executePrint = (context) => { 
              setPrintContext(context); 
              setTimeout(() => { window.print(); }, 200); 
          };

          useEffect(() => {
              const afterPrint = () => setPrintContext(null);
              window.addEventListener('afterprint', afterPrint);
              return () => window.removeEventListener('afterprint', afterPrint);
          }, []);

          // ==========================================
          // Firestore 雲端同步
          // ==========================================
          const [dailyRecords, setDailyRecords] = useState([]);
          const [settings, setSettings] = useState(defaultSettings);
          const [damagedItems, setDamagedItems] = useState([]);
          const [dbStatus, setDbStatus] = useState('連線中...');

          useEffect(() => {
              if (!user || !db) return;
              const unsubRecords = db.collection('retailOps').doc('dailyRecords').onSnapshot(doc => {
                  if (doc.exists) setDailyRecords(doc.data().data || []);
                  setDbStatus('🟢 雲端已同步');
              }, err => { setDbStatus('🔴 權限不足或連線失敗'); });

              const unsubSettings = db.collection('retailOps').doc('settings').onSnapshot(doc => {
                  if (doc.exists) setSettings(doc.data().data || defaultSettings);
              });

              const unsubDamaged = db.collection('retailOps').doc('damagedItems').onSnapshot(doc => {
                  if (doc.exists) setDamagedItems(doc.data().data || []);
              });

              return () => { unsubRecords(); unsubSettings(); unsubDamaged(); };
          }, [user]);

          const updateCloudData = (docName, newData, successMsg) => {
              if (!db || !user) return showToast('權限不足，無法寫入資料');
              db.collection('retailOps').doc(docName).set({ data: newData })
                .then(() => { if (successMsg) showToast(successMsg); })
                .catch(err => showToast('同步失敗：' + err.message));
          };

          const handleUpdateItemName = (listType, id, barcode, newName) => {
              if (listType === 'damaged') updateCloudData('damagedItems', damagedItems.map(i => i.id === id ? { ...i, name: newName } : i));
              else setBarcodeItems(prev => prev.map(i => i.id === id ? { ...i, name: newName } : i));
              updateCloudData('settings', { ...settings, customNameMap: { ...settings.customNameMap, [barcode]: newName } }, `已更新字典！`);
          };

          const triggerUndo = (listType, itemToDelete, currentList) => {
              if (undoData && undoData.timerId) clearTimeout(undoData.timerId);
              const timerId = setTimeout(() => setUndoData(null), 5000);
              setUndoData({ listType, item: itemToDelete, timerId, previousState: currentList });
          };

          const handleUndoAction = () => {
              if (!undoData) return;
              clearTimeout(undoData.timerId);
              if (undoData.listType === 'damaged') updateCloudData('damagedItems', undoData.previousState);
              else if (undoData.listType === 'barcode') setBarcodeItems(prev => [undoData.item, ...prev]);
              setUndoData(null);
          };

          // ==========================================
          // 盒損登記模組
          // ==========================================
          const [barcodeInput, setBarcodeInput] = useState('');
          const [lastAction, setLastAction] = useState(null);
          const [isDamagedOverviewExpanded, setIsDamagedOverviewExpanded] = useState(false);
          const [damagedSearch, setDamagedSearch] = useState(''); 
          const damagedInputRef = useRef(null);

          const handleScanSubmit = (e) => {
            e.preventDefault(); const barcode = barcodeInput.trim(); if (!barcode) return;
            let productName = settings.customNameMap[barcode] || settings.barcodeMap[barcode] || `未知商品 (條碼: ${barcode})`;
            const existing = damagedItems.findIndex(item => item.barcode === barcode);
            let newData;
            if (existing >= 0) {
              newData = [...damagedItems]; newData[existing].quantity += 1;
              setLastAction(`已增加數量：${productName}`);
            } else {
              newData = [...damagedItems, { id: Date.now(), barcode, name: productName, quantity: 1 }];
              setLastAction(`已新增：${productName}`);
            }
            updateCloudData('damagedItems', newData);
            setBarcodeInput(''); setTimeout(() => damagedInputRef.current?.focus(), 10);
          };

          const updateQuantity = (id, delta) => updateCloudData('damagedItems', damagedItems.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item));
          const removeDamagedItem = (id) => {
              const item = damagedItems.find(i => i.id === id); if(item) triggerUndo('damaged', item, damagedItems);
              updateCloudData('damagedItems', damagedItems.filter(i => i.id !== id));
          };
          const clearAllDamagedItems = () => { if (window.confirm("確定清空所有紀錄嗎？")) { updateCloudData('damagedItems', []); setLastAction(null); } };

          const filteredDamagedItems = useMemo(() => {
              if (!damagedSearch.trim()) return damagedItems; const q = damagedSearch.toLowerCase();
              return damagedItems.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
          }, [damagedItems, damagedSearch]);

          const groupedDamagedItems = useMemo(() => {
            const groups = {};
            filteredDamagedItems.forEach(item => {
              const cat = determineCategory(item.name, settings.customCategories);
              if (!groups[cat]) groups[cat] = []; groups[cat].push(item);
            });
            return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
          }, [filteredDamagedItems, settings.customCategories]);

          const handleExportData = () => {
              const backupData = { dailyRecords, reportSettings: settings, damagedItems };
              const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
              a.download = `系統備份_${new Date().getTime()}.json`; a.click(); URL.revokeObjectURL(url);
          };
          const handleImportData = (e) => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = (event) => {
                  try {
                      const data = JSON.parse(event.target.result);
                      if (window.confirm('確定要匯入此備份並覆蓋雲端資料？')) {
                          if (data.dailyRecords) updateCloudData('dailyRecords', data.dailyRecords);
                          if (data.reportSettings) updateCloudData('settings', data.reportSettings);
                          if (data.damagedItems) updateCloudData('damagedItems', data.damagedItems);
                          showToast('還原成功！雲端已同步。');
                      }
                  } catch (error) { showToast('匯入失敗：檔案無法解析'); }
              };
              reader.readAsText(file); e.target.value = null; 
          };

          // ==========================================
          // 條碼列印模組
          // ==========================================
          const [barcodeItems, setBarcodeItems] = useState([]);
          const [barcodePrintInput, setBarcodePrintInput] = useState('');
          const [barcodeSearch, setBarcodeSearch] = useState(''); 
          const barcodeInputRef = useRef(null);

          const handleBarcodePrintScan = (e) => {
            e.preventDefault(); const barcode = barcodePrintInput.trim(); if (!barcode) return;
            let name = settings.customNameMap[barcode] || settings.barcodeMap[barcode] || `未知商品 (${barcode})`;
            setBarcodeItems(prev => {
                const ex = prev.find(i => i.barcode === barcode);
                if (ex) { showToast(`增加數量：${name}`); return prev.map(i => i.barcode === barcode ? {...i, quantity: i.quantity + 1} : i); }
                return [{ id: Date.now(), barcode, name, quantity: 1 }, ...prev];
            });
            setBarcodePrintInput(''); setTimeout(() => barcodeInputRef.current?.focus(), 10);
          };

          const updateBarcodeItemQuantity = (id, delta) => setBarcodeItems(prev => prev.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item));
          const removeBarcodeItem = (id) => {
              const item = barcodeItems.find(i => i.id === id); if(item) triggerUndo('barcode', item);
              setBarcodeItems(prev => prev.filter(i => i.id !== id));
          };
          const clearAllBarcodeItems = () => { if (window.confirm("確定清空預覽列表嗎？")) setBarcodeItems([]); };

          const filteredBarcodeItems = useMemo(() => {
              if (!barcodeSearch.trim()) return barcodeItems; const q = barcodeSearch.toLowerCase();
              return barcodeItems.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
          }, [barcodeItems, barcodeSearch]);

          // ==========================================
          // 日報表與系統設定
          // ==========================================
          const [newCatName, setNewCatName] = useState('');
          const [newCatKeys, setNewCatKeys] = useState('');
          const handleAddCategory = () => {
              if(!newCatName.trim() || !newCatKeys.trim()) return showToast('請填寫完整');
              updateCloudData('settings', { ...settings, customCategories: [...settings.customCategories, { id: Date.now(), name: newCatName, keywords: newCatKeys }] });
              setNewCatName(''); setNewCatKeys('');
          };
          const handleRemoveCategory = (id) => updateCloudData('settings', { ...settings, customCategories: settings.customCategories.filter(c => c.id !== id) });

          const [story, setStory] = useState('');
          const [currentStore, setCurrentStore] = useState('未知店鋪');
          const [todayStats, setTodayStats] = useState(null);
          const [isProcessing, setIsProcessing] = useState(false);
          const [selectedMonth, setSelectedMonth] = useState('');
          const [isBulkImportOpen, setIsBulkImportOpen] = useState(false);
          const [bulkInput, setBulkInput] = useState('');
          const [isHistoryExpanded, setIsHistoryExpanded] = useState(false);
          const [newBarcodeStr, setNewBarcodeStr] = useState('');
          const [newBoxSize, setNewBoxSize] = useState(6);
          const [dictInput, setDictInput] = useState('');

          const availableMonths = useMemo(() => {
            let months = dailyRecords.map(r => r.date.split('/')[0]);
            if (todayStats) months.push(formatDateStr(todayStats.dateStr).split('/')[0]);
            return [...new Set(months)].sort((a, b) => b.localeCompare(a)); 
          }, [dailyRecords, todayStats]);
          
          useEffect(() => { if (availableMonths.length > 0 && !availableMonths.includes(selectedMonth)) setSelectedMonth(availableMonths[0]); }, [availableMonths]);

          const processData = (rows) => {
            if (rows.length < 2) return showToast('檔案格式錯誤');
            const headers = rows[0];
            const idxDate = headers.indexOf('CREATED_DATE');
            const idxType = headers.indexOf('TYPE');
            const idxStore = headers.indexOf('STORE');
            const idxBarcode = headers.indexOf('BARCODE');
            const idxDesc = headers.indexOf('DESCRIPTION_CN');
            const idxQty = headers.indexOf('SOLD_QTY');
            const idxAmt = headers.indexOf('AMT_WITH_TAX');
            const idxDisc = headers.indexOf('DISC_AMT');

            let todaySales = 0, pointsRedeemed = 0, firstDate = null, storeName = '未知店鋪';
            let mega1000 = { amt: 0, qty: 0, giftQty: 0 }, mega400 = { amt: 0, qty: 0, giftQty: 0 };
            let itemStats = {}, updatedBarcodeMap = { ...settings.barcodeMap };

            for (let i = 1; i < rows.length; i++) {
              const row = rows[i]; if (row.length < 5) continue;
              if (idxType !== -1 && !['sale', 'return', 'refund', 'exchange'].includes(String(row[idxType] || '').trim().toLowerCase())) continue; 

              const barcode = String(row[idxBarcode] || '').trim(); const rawDesc = String(row[idxDesc] || '').trim();
              if (!barcode && !rawDesc) continue;
              if (!firstDate && row[idxDate]) firstDate = row[idxDate].toString().split(' ')[0]; 
              if (storeName === '未知店鋪' && row[idxStore]) storeName = row[idxStore].toString().replace(/\[.*?\]/, '').trim();
              
              const desc = settings.customNameMap[barcode] || rawDesc;
              const qty = parseFloat(row[idxQty]) || 0; const amt = parseFloat(row[idxAmt]) || 0; const disc = parseFloat(row[idxDisc]) || 0;

              if (barcode && desc) updatedBarcodeMap[barcode] = desc;
              todaySales += amt; if (disc === 330) pointsRedeemed += 330; 

              if (rawDesc.includes('1000%') || desc.includes('1000%')) { amt === 0 ? (mega1000.giftQty += qty) : (mega1000.qty += qty, mega1000.amt += amt); }
              if (rawDesc.includes('400%') || desc.includes('400%')) { amt === 0 ? (mega400.giftQty += qty) : (mega400.qty += qty, mega400.amt += amt); }

              if (barcode) {
                if (!itemStats[barcode]) itemStats[barcode] = { barcode, desc, top5Qty: 0, top5Amt: 0, singles: 0, boxes: 0 };
                if (amt > 0) { itemStats[barcode].top5Qty += qty; itemStats[barcode].top5Amt += amt; }
                const boxSize = settings.boxSizeMap[barcode] || 6;
                if (qty >= boxSize) { itemStats[barcode].boxes += Math.floor(qty / boxSize); itemStats[barcode].singles += (qty % boxSize); } 
                else { itemStats[barcode].singles += qty; }
              }
            }
            updateCloudData('settings', { ...settings, barcodeMap: updatedBarcodeMap }); setCurrentStore(storeName);
            const newDateStr = firstDate || new Date().toISOString().split('T')[0];
            setTodayStats({ dateStr: newDateStr, sales: todaySales, points: pointsRedeemed, itemStats, bigToys: { '1000': mega1000, '400': mega400 }});
            setSelectedMonth(formatDateStr(newDateStr).split('/')[0]); showToast('報表解析成功！已同步字典至雲端。');
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0]; if (!file) return; setIsProcessing(true); const reader = new FileReader();
            if (file.name.toLowerCase().endsWith('.csv')) {
              reader.onload = (event) => { processData(parseCSV(event.target.result)); setIsProcessing(false); }; reader.readAsText(file);
            } else {
              reader.onload = (event) => {
                try { const workbook = window.XLSX.read(new Uint8Array(event.target.result), { type: 'array' }); processData(window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 })); } 
                catch (error) { showToast('讀取失敗，請確認檔案格式'); } finally { setIsProcessing(false); }
              };
              reader.readAsArrayBuffer(file);
            }
            e.target.value = null;
          };

          const saveRecord = () => {
            if (!todayStats) return;
            const formattedDate = formatDateStr(todayStats.dateStr);
            const filtered = dailyRecords.filter(r => r.date !== formattedDate);
            updateCloudData('dailyRecords', [...filtered, { date: formattedDate, weekday: getWeekday(todayStats.dateStr), sales: todayStats.sales, points: todayStats.points, bigToys: todayStats.bigToys }].sort((a, b) => a.date.localeCompare(b.date)), '已同步儲存今日業績至雲端！');
          };

          const deleteRecord = (dateToRemove) => updateCloudData('dailyRecords', dailyRecords.filter(r => r.date !== dateToRemove));

          const handleBulkImport = () => {
            if (!bulkInput.trim()) return;
            let newRecords = [...dailyRecords]; let count = 0;
            bulkInput.trim().split('\n').forEach(line => {
                let cols = line.includes('\t') ? line.split('\t').map(c => c.trim()) : line.replace(/\s*(週|星期)[一二三四五六日]\s*/g, ' ').split(/\s+/).filter(c => c);
                if (cols.length >= 2 && cols[0]) {
                    let cleanDateStr = cols[0].replace(/(週|星期)[一二三四五六日]/g, '').trim().replace(/[年月日.-]/g, '/').replace(/\/+$/, '');
                    if (cleanDateStr.split('/').length === 2) cleanDateStr = new Date().getFullYear() + '/' + cleanDateStr;
                    const parseNum = (val) => parseFloat((val || '').replace(/[^0-9.-]+/g, '')) || 0;
                    if (!isNaN(new Date(cleanDateStr).getTime())) {
                        const fd = formatDateStr(cleanDateStr); newRecords = newRecords.filter(r => r.date !== fd);
                        newRecords.push({ date: fd, weekday: getWeekday(cleanDateStr), sales: parseNum(cols[1]), points: parseNum(cols[2]), bigToys: { '1000': { amt: parseNum(cols[4]), qty: parseNum(cols[3]), giftQty: 0 }, '400': { amt: parseNum(cols[6]), qty: parseNum(cols[5]), giftQty: 0 } } }); count++;
                    }
                }
            });
            if (count > 0) { updateCloudData('dailyRecords', newRecords.sort((a, b) => a.date.localeCompare(b.date)), `成功匯入 ${count} 筆歷史紀錄！`); setBulkInput(''); setIsBulkImportOpen(false); setSelectedMonth(newRecords[0].date.split('/')[0]); }
          };

          const handleImportDict = () => {
            if (!dictInput.trim()) return;
            let newDict = { ...settings.customNameMap }; let count = 0;
            dictInput.split('\n').forEach(line => { const parts = line.trim().split(/\t|,/); if (parts.length >= 2 && parts[0].trim() && parts[1].trim()) { newDict[parts[0].trim()] = parts[1].trim(); count++; } });
            updateCloudData('settings', { ...settings, customNameMap: newDict }, `成功匯入 ${count} 筆翻譯字典！`); setDictInput('');
          };

          const addNewBarcode = () => {
            if (!newBarcodeStr.trim()) return;
            updateCloudData('settings', { ...settings, newBarcodes: settings.newBarcodes.includes(newBarcodeStr.trim()) ? settings.newBarcodes : [...settings.newBarcodes, newBarcodeStr.trim()], boxSizeMap: { ...settings.boxSizeMap, [newBarcodeStr.trim()]: newBoxSize || 6 } });
            setNewBarcodeStr(''); setNewBoxSize(6);
          };
          const removeBarcode = (code) => {
            const newBoxMap = { ...settings.boxSizeMap }; delete newBoxMap[code];
            updateCloudData('settings', { ...settings, newBarcodes: settings.newBarcodes.filter(b => b !== code), boxSizeMap: newBoxMap });
          };

          // --- 產生報表內文 ---
          const reportContent = useMemo(() => {
            if (!selectedMonth) return '請先上傳檔案或建立紀錄...';
            let recordsToPrint = dailyRecords.filter(r => r.date.split('/')[0] === selectedMonth);
            if (todayStats && formatDateStr(todayStats.dateStr).split('/')[0] === selectedMonth && !recordsToPrint.find(r => r.date === formatDateStr(todayStats.dateStr))) {
                recordsToPrint.push({ date: formatDateStr(todayStats.dateStr), weekday: getWeekday(todayStats.dateStr), sales: todayStats.sales, points: todayStats.points, bigToys: todayStats.bigToys });
            }
            if (recordsToPrint.length === 0 && !todayStats) return '此月份尚無紀錄...';
            recordsToPrint.sort((a, b) => a.date.localeCompare(b.date));
            const totalSales = recordsToPrint.reduce((sum, r) => sum + r.sales, 0);
            const totalPoints = recordsToPrint.reduce((sum, r) => sum + (r.points || 0), 0);
            const sumBigToy = (type, key) => recordsToPrint.reduce((sum, r) => sum + (r.bigToys?.[type]?.[key] || 0), 0);
            const achievement = settings.targetAmount > 0 ? ((totalSales / (settings.targetAmount * 10000)) * 100).toFixed(2) : '0.00';

            let report = `桃園台茂店 銷售日報（TWD）\n`;
            recordsToPrint.forEach(r => report += `${r.date}（${r.weekday}）$${formatMoney(r.sales)}\n`);
            report += `\nTotal: $${formatMoney(totalSales)}\n\n（點數兌換: $${formatMoney(totalPoints)})\n`;
            report += `（1000%：$${formatMoney(sumBigToy('1000','amt'))}， ${sumBigToy('1000','qty')}隻${sumBigToy('1000','giftQty') > 0 ? `，贈品 ${sumBigToy('1000','giftQty')}隻` : ''}）\n`;
            report += `（400%：$${formatMoney(sumBigToy('400','amt'))}， ${sumBigToy('400','qty')}隻${sumBigToy('400','giftQty') > 0 ? `，贈品 ${sumBigToy('400','giftQty')}隻` : ''}）\n\n`;
            report += `目標：${settings.targetAmount}萬\n達成率：${achievement}%\n\n銷售狀況分享：\n`;
            
            const isTodaySelected = todayStats && (formatDateStr(todayStats.dateStr).split('/')[0] === selectedMonth);
            if (isTodaySelected && todayStats.itemStats) {
              const top5 = Object.values(todayStats.itemStats).filter(item => item.desc && item.top5Amt > 0).sort((a, b) => b.top5Qty - a.top5Qty || b.top5Amt - a.top5Amt).slice(0, 5);
              top5.length > 0 ? top5.forEach((item, idx) => report += `${idx + 1}.${item.desc}\n`) : report += `(今日無Top 5)\n`;
            } else report += `(請上傳該日資料以產生 Top 5)\n`;

            report += `\n（2）新品分享\n`;
            if (settings.newBarcodes.length > 0) {
              settings.newBarcodes.forEach(barcode => {
                 const itemData = isTodaySelected ? todayStats?.itemStats?.[barcode] : null;
                 const desc = settings.customNameMap?.[barcode] || settings.barcodeMap?.[barcode] || barcode; 
                 const boxSize = settings.boxSizeMap[barcode] || 6;
                 if (itemData && (itemData.singles > 0 || itemData.boxes > 0)) {
                   let qtyStr = boxSize === 1 ? `${(itemData.boxes * boxSize) + itemData.singles}` : (itemData.singles > 0 && itemData.boxes > 0 ? `散盒 ${itemData.singles} 端盒 ${itemData.boxes}` : (itemData.boxes > 0 ? `端盒 ${itemData.boxes}` : `散盒 ${itemData.singles}`));
                   report += `${desc}➡️${qtyStr}\n`;
                 } else report += `${desc}➡️0\n`;
              });
            } else report += `(尚未設定任何新品條碼)\n`;
            report += `\n(3）${story || '請在系統設定輸入今日的故事...'}`;
            return report;
          }, [dailyRecords, todayStats, settings, story, currentStore, selectedMonth]);

          const currentMonthRecords = useMemo(() => dailyRecords.filter(r => r.date.split('/')[0] === selectedMonth).sort((a, b) => b.date.localeCompare(a.date)), [dailyRecords, selectedMonth]); 
          const visibleRecords = isHistoryExpanded ? currentMonthRecords : currentMonthRecords.slice(0, 3);
          
          // ==========================================
          // ✨ 完美解除字數限制 QR Code 產生
          // ==========================================
          useEffect(() => {
              if (!isQRCodeModalOpen || !reportContent) return;
              setQrDataUrl(''); setQrError('');
              
              if (typeof window.QRious === 'undefined') {
                  setQrError('⚠️ 條碼模組載入失敗，請檢查網路狀態。'); return;
              }
              
              try {
                  // 無論多長都強制轉成 UTF-8 純文字 QR Code
                  const utf8Content = unescape(encodeURIComponent(reportContent));
                  const qr = new window.QRious({ value: utf8Content, size: 350, level: 'L', background: 'white', foreground: '#000000' });
                  const dataUrl = qr.toDataURL();
                  if (dataUrl && dataUrl.length > 100) setQrDataUrl(dataUrl); else throw new Error("圖片異常");
              } catch (err) { 
                  setQrError('⚠️ 條碼轉換失敗，報表文字可能包含無法解析的特殊字元，建議改用「複製」按鈕。'); 
              }
          }, [reportContent, isQRCodeModalOpen]);

          // ==========================================
          // Auth 登入畫面處理
          // ==========================================
          const handleLogin = (e) => {
              e.preventDefault();
              if (!emailInput || !passwordInput) return showToast('請填寫帳號與密碼');
              setAuthError('');
              auth.signInWithEmailAndPassword(emailInput, passwordInput)
                  .then(() => showToast('✅ 登入成功！'))
                  .catch(() => { setAuthError('帳號或密碼錯誤'); setPasscodeError(true); setTimeout(() => setPasscodeError(false), 500); });
          };

          const handleLogout = () => { auth.signOut().then(() => showToast('👋 已登出系統')); };

          if (authLoading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white"><i className="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500"></i></div>;

          if (!user) {
              return (
                  <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-6 transition-colors duration-300 no-print">
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className="absolute top-6 right-6 w-12 h-12 rounded-full flex items-center justify-center bg-white dark:bg-slate-800 text-amber-500 shadow-sm hover:scale-110 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'} text-xl`}></i></button>
                      <div className={`w-full max-w-sm bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col items-center ${passcodeError ? 'animate-shake' : 'animate-scale-in'}`}>
                          <div className="w-20 h-20 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 rounded-3xl flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-shield-halved text-4xl"></i></div>
                          <h1 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">門市營運系統</h1>
                          <p className="text-sm text-slate-500 dark:text-slate-400 mb-8 text-center">請輸入員工帳號密碼登入 (內部邀請制)</p>
                          <form onSubmit={handleLogin} className="w-full flex flex-col gap-4">
                              <div className="relative"><i className="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} placeholder="員工 Email" className="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white font-medium transition-colors" /></div>
                              <div className="relative"><i className="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="密碼" className={`w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white font-medium transition-colors ${authError ? 'border-red-500 focus:ring-red-500' : 'border-slate-200 dark:border-slate-700'}`} /></div>
                              {authError && <p className="text-red-500 text-sm font-bold text-center">{authError}</p>}
                              <button type="submit" className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-600/30 transition-all active:scale-95 mt-2">安全登入</button>
                          </form>
                      </div>
                      {toast && <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[60] bg-rose-500 text-white px-6 py-2 rounded-full shadow-lg font-bold animate-slide-up-fade">{toast}</div>}
                  </div>
              );
          }

          // ==========================================
          // 主要 UI 渲染區塊 
          // ==========================================
          return (
            <div className="flex flex-col h-screen w-full font-sans overflow-x-hidden">
              
              {/* ✨ 已移除滾動隱藏邏輯，現在 Navbar 永遠固定在最上方 */}
              <header className="fixed top-0 left-0 right-0 h-20 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md shadow-sm border-b border-slate-100 dark:border-slate-700/50 z-50 no-print">
                <div className="max-w-6xl mx-auto h-full flex items-center justify-between px-6">
                  <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center tracking-tight"><i className="fa-solid fa-shop text-indigo-500 mr-2 text-2xl"></i><span className="hidden sm:inline">門市整合系統</span></h2>
                  <div className="flex items-center gap-3">
                    <div className={`text-xs font-bold px-3 py-1.5 rounded-full ${dbStatus.includes('同步') ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400' : 'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-400'}`}>{dbStatus}</div>
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="w-10 h-10 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-700 text-amber-500 hover:scale-110 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'}`}></i></button>
                    <button onClick={handleLogout} className="w-10 h-10 rounded-full flex items-center justify-center bg-rose-50 dark:bg-rose-500/20 text-rose-500 hover:scale-110 transition-transform ml-1" title="登出"><i className="fa-solid fa-arrow-right-from-bracket"></i></button>
                  </div>
                </div>
              </header>

              <div className="pt-24 pb-32 px-4 max-w-6xl mx-auto min-h-screen w-full no-print">
                <div className="space-y-6">

                    {/* =========================================
                        分頁 1: 銷售日報表
                    ========================================= */}
                    {activeTab === 'daily-report' && (
                      <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full pb-10">
                        <div className="lg:col-span-7 space-y-6">
                          <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                            <h2 className="text-xl font-semibold mb-4 flex items-center dark:text-slate-100"><i className="fa-solid fa-cloud-arrow-up text-indigo-500 mr-2"></i>上傳今日報表</h2>
                            <div className="flex items-center justify-center w-full">
                                <label className={`flex flex-col items-center justify-center w-full h-32 border-2 ${isProcessing ? 'border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800' : 'border-indigo-200 dark:border-indigo-500/30 border-dashed bg-indigo-50 dark:bg-indigo-500/5 hover:bg-indigo-100 dark:hover:bg-indigo-500/10 cursor-pointer'} rounded-xl transition-colors`}>
                                    <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                        <i className={`fa-solid fa-cloud-arrow-up text-3xl ${isProcessing ? 'text-slate-400' : 'text-indigo-500'} mb-2`}></i>
                                        <p className="mb-2 text-sm text-slate-600 dark:text-slate-300">{isProcessing ? '處理檔案中...' : <><span className="font-semibold">點擊上傳</span> 或拖曳 Excel 檔案至此</>}</p>
                                    </div>
                                    <input type="file" className="hidden" accept=".csv, .xlsx, .xls" onChange={handleFileUpload} disabled={isProcessing} />
                                </label>
                            </div>
                            {todayStats && (
                              <div className="mt-4 p-4 bg-indigo-50 dark:bg-indigo-500/20 rounded-xl flex justify-between items-center transition-colors">
                                <div>
                                  <span className="block text-sm text-indigo-600 dark:text-indigo-300 font-medium">今日資料已解析 ({todayStats.dateStr})</span>
                                  <span className="block text-2xl font-bold text-indigo-900 dark:text-indigo-100">${formatMoney(todayStats.sales)}</span>
                                </div>
                                <button onClick={saveRecord} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors flex items-center shadow-sm"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 儲存至雲端</button>
                              </div>
                            )}
                          </div>

                          <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                              <div className="flex items-center">
                                <h2 className="text-xl font-semibold flex items-center whitespace-nowrap dark:text-slate-100"><i className="fa-solid fa-cloud text-blue-500 mr-2"></i> 雲端歷史業績</h2>
                                {availableMonths.length > 0 && (
                                  <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="ml-3 px-2 py-1 text-sm bg-blue-50 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 font-medium border border-blue-100 dark:border-blue-500/30 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                                    {availableMonths.map(m => <option key={m} value={m}>{parseInt(m, 10)} 月份</option>)}
                                  </select>
                                )}
                              </div>
                              <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                                {currentMonthRecords.length > 3 && (
                                  <button onClick={() => setIsHistoryExpanded(!isHistoryExpanded)} className={`flex-1 sm:flex-none justify-center text-sm px-3 py-1.5 rounded-lg flex items-center transition-colors ${isHistoryExpanded ? 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300' : 'bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300'}`}><i className={`fa-solid ${isHistoryExpanded ? 'fa-compress' : 'fa-expand'} mr-1`}></i> {isHistoryExpanded ? '收起' : `展開全部(${currentMonthRecords.length})`}</button>
                                )}
                                <button onClick={() => { setIsBulkImportOpen(!isBulkImportOpen); }} className={`flex-1 sm:flex-none justify-center text-sm px-3 py-1.5 rounded-lg flex items-center transition-colors ${isBulkImportOpen ? 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300' : 'bg-emerald-50 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-300 hover:bg-emerald-100 dark:hover:bg-emerald-500/30'}`}><i className={`fa-solid ${isBulkImportOpen ? 'fa-xmark' : 'fa-table'} mr-1`}></i> {isBulkImportOpen ? '取消' : '批量匯入'}</button>
                              </div>
                            </div>
                            {isBulkImportOpen && (
                              <div className="mb-6 p-4 bg-emerald-50/50 dark:bg-emerald-500/10 rounded-xl border border-emerald-100 dark:border-emerald-500/20">
                                <p className="text-xs text-slate-600 dark:text-slate-400 mb-3 leading-relaxed">請在 Excel 總表中依序選取並複製以下欄位：<br/>日期、總業績、點數兌換、1000%數量、1000%金額、400%數量、400%金額</p>
                                <textarea className="w-full px-4 py-3 border border-emerald-200 dark:border-emerald-500/30 rounded-lg outline-none h-32 text-sm font-mono whitespace-pre dark:bg-slate-800 dark:text-slate-200" placeholder="貼上 Excel 內容..." value={bulkInput} onChange={(e) => setBulkInput(e.target.value)}></textarea>
                                <div className="flex justify-end mt-3"><button onClick={handleBulkImport} className="px-4 py-1.5 bg-emerald-500 text-white text-sm font-medium rounded-lg hover:bg-emerald-600"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 同步至雲端</button></div>
                              </div>
                            )}
                            {visibleRecords.length === 0 ? (
                              <p className="text-slate-400 dark:text-slate-500 text-sm">雲端無此月份紀錄，請上傳檔案或匯入。</p>
                            ) : (
                              <div className="space-y-3">
                                {visibleRecords.map(record => (
                                  <div key={record.date} className="flex justify-between items-start p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-blue-100 dark:hover:border-blue-500/50 transition-colors">
                                    <div className="flex-1">
                                      <div className="flex items-center mb-2">
                                          <span className="font-bold text-slate-800 dark:text-slate-200 mr-3">{record.date} ({record.weekday})</span>
                                          <span className="text-blue-600 dark:text-blue-300 font-bold bg-blue-50 dark:bg-blue-500/20 px-2 py-0.5 rounded text-sm">業績: ${formatMoney(record.sales)}</span>
                                      </div>
                                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm text-slate-500 dark:text-slate-400 mt-3">
                                          <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                              <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">點數兌換</span>
                                              <span className="font-medium text-slate-700 dark:text-slate-200">${formatMoney(record.points || 0)}</span>
                                          </div>
                                          <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                              <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">400% MEGA</span>

                                    <span key={code} className="inline-flex items-center px-3 py-1 rounded-full bg-indigo-50 dark:bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 text-sm font-medium">{code} <span className="text-xs ml-1 opacity-60 font-normal">({settings.boxSizeMap[code] || 6}入)</span><button onClick={() => removeBarcode(code)} className="ml-2 hover:text-red-500"><i className="fa-solid fa-xmark"></i></button></span>

                                        </div>
                                      </div>

                                    <div className="mb-6"><div className="w-12 h-12 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-500 dark:text-indigo-400 rounded-xl flex items-center justify-center mb-4"><i className="fa-solid fa-barcode text-2xl"></i></div><h3 className="text-xl font-bold text-slate-800 dark:text-slate-100">連續條碼掃描</h3></div>
                                    <form onSubmit={handleBarcodePrintScan} className="relative mb-4"><div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i className="fa-solid fa-magnifying-glass text-slate-400"></i></div><input ref={barcodeInputRef} type="text" value={barcodePrintInput} onChange={(e) => setBarcodePrintInput(e.target.value)} className="block w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 dark:text-white transition-all font-medium text-lg" placeholder="在此掃描或輸入..." autoFocus /><button type="submit" className="absolute inset-y-2 right-2 px-6 bg-slate-800 dark:bg-indigo-600 text-white hover:bg-slate-900 dark:hover:bg-indigo-700 rounded-lg font-medium">加入</button></form>

                                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 shrink-0 gap-4">
                                    <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center whitespace-nowrap"><i className="fa-solid fa-list-check text-slate-400 mr-2"></i>待印清單</h2>
                                    
                                    <div className="flex items-center gap-3 w-full sm:w-auto">
                                        {barcodeItems.length > 0 && (
                                            <button onClick={() => executePrint('barcode-all')} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors shadow-sm flex items-center whitespace-nowrap"><i className="fa-solid fa-print mr-1.5"></i>全部列印</button>

                                        {barcodeItems.length > 0 && (
                                          <div className="relative flex-1 sm:w-48">
                                              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i className="fa-solid fa-filter text-slate-400 text-xs"></i></div>

                                          </div>

                                                  </div>
                                              ))}
                                          </div>
                                      )}
                                  </div>
                                </div>
                            </div>

                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                            <div className="p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700 flex flex-col items-start"><button onClick={handleExportData} className="w-full px-4 py-2 bg-slate-800 dark:bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-slate-900 dark:hover:bg-indigo-700 transition-colors shadow-sm"><i className="fa-solid fa-box-archive mr-2"></i> 下載備份檔</button></div>
                            <div className="p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700 flex flex-col items-start"><label className="w-full px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 text-sm font-medium rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors shadow-sm cursor-pointer text-center"><i className="fa-solid fa-folder-open mr-2"></i> 選擇備份檔並還原<input type="file" className="hidden" accept=".json" onChange={handleImportData} /></label></div>
                          </div>
                        </div>

                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors">
                          <h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-2 flex items-center"><i className="fa-solid fa-layer-group text-blue-500 mr-2"></i>自動分類規則</h3>
                          <div className="flex flex-col sm:flex-row gap-3 mb-6"><input type="text" className="w-full sm:w-1/3 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="分類名稱" value={newCatName} onChange={(e)=>setNewCatName(e.target.value)} /><input type="text" className="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500" placeholder="關鍵字" value={newCatKeys} onChange={(e)=>setNewCatKeys(e.target.value)} /><button onClick={handleAddCategory} className="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 shadow-sm font-medium">建立</button></div>
                          <div className="space-y-3">{settings.customCategories.map(cat => (<div key={cat.id} className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 px-4 py-3 rounded-xl border border-slate-100 dark:border-slate-700"><div><div className="font-bold text-slate-700 dark:text-slate-200">{cat.name}</div><div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">關鍵字：{cat.keywords}</div></div><button onClick={() => handleRemoveCategory(cat.id)} className="text-slate-400 hover:text-red-500 p-2"><i className="fa-solid fa-trash-can"></i></button></div>))}</div>
                        </div>

                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors">
                          <div className="flex items-start mb-6 border-b border-slate-100 dark:border-slate-700 pb-6"><div className="p-3 bg-teal-50 dark:bg-teal-500/20 text-teal-600 dark:text-teal-400 rounded-xl mr-4"><i className="fa-solid fa-book-open text-2xl"></i></div><div><h3 className="text-lg font-semibold text-slate-800 dark:text-slate-100">匯入中文名稱 (共用字典)</h3></div></div>
                          <div className="mt-2 p-4 bg-teal-50/50 dark:bg-teal-500/10 rounded-xl border border-teal-100 dark:border-teal-500/20">
                            <textarea className="w-full px-4 py-3 border border-slate-200 dark:border-teal-500/30 rounded-lg outline-none h-48 text-sm font-mono whitespace-pre dark:bg-slate-900 dark:text-slate-200" placeholder="條碼與品名 (以逗號或Tab分隔)" value={dictInput} onChange={(e) => setDictInput(e.target.value)}></textarea>
                            <div className="flex justify-end mt-3 gap-3"><button onClick={() => { if(window.confirm('確定清空所有手動匯入的翻譯字典？')){ updateCloudData('settings', {...settings, customNameMap: {}}, '已清空翻譯字典！'); } }} className="px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-sm font-medium rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors">清空字典</button><button onClick={handleImportDict} className="px-4 py-2 bg-teal-500 text-white text-sm font-medium rounded-lg hover:bg-teal-600 shadow-sm transition-colors"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 同步至雲端</button></div>
                          </div>
                        </div>
                      </div>
                    )}
                </div>
              </div>

              {/* ✨ 底部 Navigation Dock：移除滾動隱藏邏輯，固定在底部 */}
              <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700 shadow-2xl rounded-full px-8 py-3 flex items-center gap-8 z-40 no-print">
                  <button onClick={() => setActiveTab('daily-report')} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${activeTab === 'daily-report' ? 'bg-indigo-600 text-white shadow-lg -translate-y-2' : 'text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-file-invoice text-xl"></i></button>
                  <button onClick={() => setActiveTab('damaged-box')} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${activeTab === 'damaged-box' ? 'bg-indigo-600 text-white shadow-lg -translate-y-2' : 'text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-box-open text-xl"></i></button>
                  <button onClick={() => setActiveTab('barcode-print')} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${activeTab === 'barcode-print' ? 'bg-indigo-600 text-white shadow-lg -translate-y-2' : 'text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-barcode text-xl"></i></button>
                  <button onClick={() => setActiveTab('settings')} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${activeTab === 'settings' ? 'bg-indigo-600 text-white shadow-lg -translate-y-2' : 'text-slate-500 hover:bg-slate-100'}`}><i className="fa-solid fa-gear text-xl"></i></button>
              </nav>

              {/* QR Code 彈出視窗 */}
              {isQRCodeModalOpen && (
                  <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 no-print animate-scale-in">
                      <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                          <div className="p-6 text-center border-b border-slate-100 dark:border-slate-700 relative">
                              <div className="w-12 h-12 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3"><i className="fa-solid fa-qrcode text-2xl"></i></div>
                              <h3 className="text-xl font-bold dark:text-white mb-1">手機掃碼複製文字</h3>
                              <p className="text-sm text-slate-500 dark:text-slate-400">請用 LINE 或相機掃描下方條碼，即可直接複製報表文字！</p>
                              <button onClick={() => setIsQRCodeModalOpen(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark"></i></button>
                          </div>
                          <div className="p-8 flex justify-center bg-slate-50 dark:bg-slate-900">
                              <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                  {qrError ? <div className="text-red-500 text-xs p-4 whitespace-pre-wrap font-bold leading-relaxed">{qrError}</div> : <img src={qrDataUrl} className="mx-auto block w-full h-auto rounded-lg" />}
                              </div>
                          </div>
                          <div className="p-4"><button onClick={() => setIsQRCodeModalOpen(false)} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">已掃描完成</button></div>
                      </div>
                  </div>
              )}

              {/* 復原 Undo Toast */}
              {undoData && (
                  <div className="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-4 z-50 overflow-hidden animate-slide-up-fade border border-slate-700 no-print">
                      <span className="text-sm font-medium">已刪除 <span className="font-bold text-slate-200">{undoData.item.name}</span></span>
                      <button onClick={handleUndoAction} className="text-indigo-400 font-bold text-sm hover:text-indigo-300 flex items-center gap-1"><i className="fa-solid fa-rotate-left"></i> 復原</button>
                      <div className="absolute bottom-0 left-0 h-1 bg-indigo-500 animate-shrink-x origin-left w-full"></div>
                  </div>
              )}
              
              {toast && (
                <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-emerald-500 text-white px-6 py-2 rounded-full shadow-lg font-bold animate-slide-up-fade no-print">
                  {toast}
                </div>
              )}
              
              {/* =========================================
                  列印渲染區域 (Print Only DOM)
              ========================================= */}
              <div className="print-only">
                  {printContext === 'damaged' && (
                    <div id="print-area-damaged">
                        <div className="text-center pb-3 border-b border-black mb-3">
                            <h2 className="font-bold text-[16px] m-0 leading-tight">📦 盤點/盒損作業單</h2>
                            <p className="text-[10px] mt-1 m-0">列印時間: {new Date().toLocaleString()}</p>
                        </div>
                        {groupedDamagedItems.map(([category, items]) => (
                        <div key={category} className="mb-2">
                            <div className="font-bold text-[14px] bg-gray-200 px-2 py-1 mb-2">【{category.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '')}】</div>
                            {items.map(item => (
                            <div key={item.id} className="damaged-print-item flex flex-col">
                                <div className="flex justify-between items-start mb-2 leading-tight">
                                    <div className="pr-2 flex-1"><div className="font-bold text-[14px]">{item.name}</div></div>
                                    <div className="font-bold text-[16px] whitespace-nowrap">x {item.quantity}</div>
                                </div>
                                <div className="mt-1 flex justify-center w-full">
                                    <BarcodeImage value={item.barcode} printMode={false} hideName={true} />
                                </div>
                            </div>
                            ))}
                        </div>
                        ))}
                        <div className="border-t border-black pt-3 mt-4 text-center text-[14px] font-bold">
                            本次盤點總件數: {damagedItems.reduce((sum, item) => sum + item.quantity, 0)} 件
                        </div>
                    </div>
                  )}

                  {printContext === 'barcode-all' && (
                      <div id="print-area-barcode">
                          {barcodeItems.map(item => (
                              <BarcodeImage key={item.id} value={item.barcode} name={item.name} quantity={item.quantity} printMode={true} />
                          ))}
                      </div>
                  )}

                  {printContext?.type === 'barcode-single' && (
                      <div id="print-area-barcode">
                          <BarcodeImage value={printContext.item.barcode} name={printContext.item.name} quantity={printContext.item.quantity} printMode={true} />
                      </div>
                  )}
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
