<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="P-ops">
    <title>P-ops 懶人系統</title>
    <link rel="stylesheet" href="./style.css?v=4">
    <link rel="manifest" href="./manifest.json">
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
    <link rel="preconnect" href="https://securetoken.googleapis.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                fontFamily: {
                    sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                },
                extend: {
                    transitionTimingFunction: {
                        DEFAULT: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                        'spring': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                    },
                    fontSize: {
                        'xs': ['12px', { lineHeight: '16px', letterSpacing: '0em' }],
                        'sm': ['14px', { lineHeight: '18px', letterSpacing: '-0.006em' }],
                        'base': ['17px', { lineHeight: '22px', letterSpacing: '-0.022em' }],
                        'lg': ['19px', { lineHeight: '24px', letterSpacing: '-0.021em' }],
                        'xl': ['20px', { lineHeight: '25px', letterSpacing: '-0.022em' }],
                        '2xl': ['22px', { lineHeight: '28px', letterSpacing: '-0.026em' }],
                        '3xl': ['28px', { lineHeight: '34px', letterSpacing: '-0.038em' }],
                        '4xl': ['34px', { lineHeight: '41px', letterSpacing: '-0.041em' }],
                    },
                    animation: {
                        'shrink-x': 'shrinkX 5s linear forwards',
                        'slide-up-fade': 'slideUpFade 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'scale-in': 'scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shrinkX: { '0%': { width: '100%' }, '100%': { width: '0%' } },
                        slideUpFade: { '0%': { transform: 'translate(-50%, 100%)', opacity: 0 }, '100%': { transform: 'translate(-50%, 0)', opacity: 1 } },
                        scaleIn: { '0%': { transform: 'scale(0.8)', opacity: 0 }, '100%': { transform: 'scale(1)', opacity: 1 } },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5"></script>


</head>

<body
    class="antialiased text-base bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDzqfgGPpbiXFO7DJVG-GIn1MKnDEVtSHw",
            authDomain: "retail-ops-90129.firebaseapp.com",
            projectId: "retail-ops-90129",
            storageBucket: "retail-ops-90129.firebasestorage.app",
            messagingSenderId: "123533342597",
            appId: "1:123533342597:web:b75e0f8100f9381cfff6ec",
            measurementId: "G-F6PTTYE35G"
        };

        if (typeof window.firebase !== 'undefined' && !window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
            window.firebase.firestore().enablePersistence({ synchronizeTabs: true })
                .catch(function (err) { console.warn("快取啟用失敗:", err.code); });
        }
        const db = window.firebase ? window.firebase.firestore() : null;
        const auth = window.firebase ? window.firebase.auth() : null;

        const defaultCategories = [
            { id: 1, name: '✨ 星星人系列', keywords: '星星人' },
            { id: 2, name: '🧸 模型/盲盒', keywords: '公仔,一番賞,盲盒' },
            { id: 3, name: '🃏 卡牌遊戲', keywords: '卡牌' },
            { id: 4, name: '☁️ 絨毛玩具', keywords: '娃娃,絨毛,毛絨' }
        ];

        const defaultSettings = { targetAmount: 1150, newBarcodes: [], barcodeMap: {}, customNameMap: {}, boxSizeMap: {}, customCategories: defaultCategories };

        const { useState, useEffect, useMemo, useRef } = React;

        const parseCSV = (text) => {
            const lines = text.split('\n'); const result = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim(); if (!line) continue;
                const row = []; let insideQuotes = false, value = '';
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') insideQuotes = !insideQuotes;
                    else if (char === ',' && !insideQuotes) { row.push(value.trim()); value = ''; }
                    else value += char;
                }
                row.push(value.trim()); result.push(row);
            }
            return result;
        };

        const formatMoney = (num) => new Intl.NumberFormat('en-US').format(Math.round(num));
        const getWeekday = (dateStr) => ['日', '一', '二', '三', '四', '五', '六'][new Date(dateStr).getDay()];
        const formatDateStr = (dateStr) => {
            const date = new Date(dateStr);
            return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
        };
        const determineCategory = (productName, categories) => {
            const lowerProductName = (productName || '').toLowerCase();
            for (let cat of categories) {
                const keywords = cat.keywords.split(',').map(k => k.trim().toLowerCase()).filter(k => k);
                if (keywords.some(k => lowerProductName.includes(k))) return cat.name;
            }
            return '📦 其他 IP';
        };

        const findNameInDict = (barcode, dict) => {
            if (!barcode || !dict) return null;
            const safeBarcode = String(barcode).trim();
            if (dict[safeBarcode]) return dict[safeBarcode];
            const stripped = safeBarcode.replace(/^0+/, '');
            const key = Object.keys(dict).find(k => String(k).trim().replace(/^0+/, '') === stripped);
            return key ? dict[key] : null;
        };

        const getSalesStatus = (dateStr) => {
            if (!dateStr || dateStr.includes('到貨') || dateStr.includes('收到')) {
                return { label: '🟢 到貨即售', color: 'text-emerald-600 bg-emerald-50 border-emerald-200 dark:bg-emerald-500/10 dark:border-emerald-500/20' };
            }

            const match = dateStr.match(/([0-9]{1,2})\/([0-9]{1,2})/);
            if (!match) return { label: '⚪ 待確認', color: 'text-slate-600 bg-slate-50 border-slate-200 dark:bg-slate-800 dark:border-slate-700' };

            const today = new Date();
            const currentYear = today.getFullYear();
            const [_, month, day] = match;
            const targetDate = new Date(currentYear, parseInt(month) - 1, parseInt(day));

            // 將時間設為午夜 00:00:00 進行純日期比較
            today.setHours(0, 0, 0, 0);
            targetDate.setHours(0, 0, 0, 0);

            if (today >= targetDate) {
                return { label: '🟢 現正販售', color: 'text-emerald-600 bg-emerald-50 border-emerald-200 dark:bg-emerald-500/10 dark:border-emerald-500/20' };
            } else {
                const diffTime = Math.abs(targetDate - today);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return { label: `⏳ 倒數 ${diffDays} 天`, color: 'text-amber-600 bg-amber-50 border-amber-200 dark:bg-amber-500/10 dark:border-amber-500/20' };
            }
        };

        function BarcodeImage({ value, name, printMode = false, mini = false, quantity = 1, printStyle = 'default', itemData }) {
            const svgRef = useRef(null);

            useEffect(() => {
                if (svgRef.current && value && typeof window.JsBarcode !== 'undefined') {
                    try {
                        // ✨ 針對可掃描性進行參數優化
                        window.JsBarcode(svgRef.current, value, {
                            format: "CODE128",
                            width: printStyle === 'popmart' ? 1.8 : 2, // 稍微收緊寬度以適應表格
                            height: printStyle === 'popmart' ? 40 : 50,
                            displayValue: false, // 文字由我們手動排版
                            margin: 0,
                            background: "transparent",
                            lineColor: "#000"
                        });
                    }
                    catch (e) { console.error("條碼生成失敗:", e); }
                }
            }, [value, printMode, printStyle]);

            if (mini) return <svg ref={svgRef} className="dark:invert"></svg>;

            if (printMode && printStyle === 'notice' && itemData) {
                return (
                    <div className="notice-wrapper">
                        <div className="notice-card">
                            {/* 1. 頂部標籤區 (日期與警告) */}
                            <div className="notice-header-tags">
                                <div className="notice-date-col">
                                    {itemData.sellDate && (
                                        <div className="notice-badge sell">
                                            <span className="badge-label">販售</span>
                                            <span className="badge-val">{itemData.sellDate}</span>
                                        </div>
                                    )}
                                    {itemData.displayDate && (
                                        <div className="notice-badge display">
                                            <span className="badge-label">陳列</span>
                                            <span className="badge-val">{itemData.displayDate} {itemData.displayTime || ''}</span>
                                        </div>
                                    )}
                                </div>
                                {itemData.needExhibition && (
                                    <div className="notice-warn-box">
                                        <div className="warn-icon">!</div>
                                        <div className="warn-text">須留<br />存</div>
                                    </div>
                                )}
                            </div>

                            {/* 2. 標題與限購區 */}
                            <div className="notice-title-box">
                                <div className="notice-title">{itemData.name}</div>
                                {itemData.restrict && (
                                    <div className="notice-restrict">
                                        <span className="restrict-label">限購</span>
                                        <span>{itemData.restrict}</span>
                                    </div>
                                )}
                            </div>

                            {/* 3. 任務確認區 */}
                            {itemData.needExhibition && (
                                <div className="notice-task-box">
                                    <div className="task-checkbox"></div>
                                    <div className="task-desc">確認陳列品已留存<br />未當作商品販售</div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (printMode && printStyle === 'popmart') {
                return (
                    <div className="popmart-wrapper">
                        <div className="popmart-header">POP MART陳列樣品明細</div>
                        <div className="popmart-table">
                            <div className="popmart-row">
                                <div className="popmart-label-col">
                                    <div className="popmart-label">品項:</div>
                                    <div className="popmart-sub">填寫全名</div>
                                </div>
                                <div className="popmart-val-col">
                                    <div className="popmart-val">{name || ''}</div>
                                </div>
                            </div>
                            <div className="popmart-row">
                                <div className="popmart-label-col">
                                    <div className="popmart-label">條碼:</div>
                                    <div className="popmart-sub">正確69碼</div>
                                </div>
                                <div className="popmart-val-col popmart-barcode-container">
                                    <div className="popmart-barcode-wrapper"><svg ref={svgRef}></svg></div>
                                    <div className="popmart-barcode-text">{value}</div>
                                </div>
                            </div>
                            <div className="popmart-row">
                                <div className="popmart-label-col">
                                    <div className="popmart-label">備註:</div>
                                    <div className="popmart-sub">樣品損壞等</div>
                                </div>
                                <div className="popmart-val-col">
                                    <div className="popmart-val">{quantity > 1 ? `數量: ${quantity} 件` : ''}</div>
                                </div>
                            </div>
                            {/* 第四列：門市 */}
                            <div className="popmart-row">
                                <div className="popmart-label-col">
                                    <div className="popmart-label">門市:</div>
                                    <div className="popmart-sub">門市全名</div>
                                </div>
                                <div className="popmart-val-col">
                                    {/* ✨ 加入 store-name 讓字體放大 */}
                                    <div className="popmart-val store-name">桃園台茂店</div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="custom-print-label">
                    <div className="custom-print-container">

                        <div className="custom-print-header">
                            <div className="custom-print-subtitle">◇ 產品名稱 ◇</div>
                            <div className="custom-print-title">{name || '（無品名）'}</div>
                        </div>

                        <div className="custom-print-barcode-sec">
                            <div className="custom-print-barcode-svg">
                                <svg ref={svgRef}></svg>
                            </div>
                            {/* 獨立抽出來的條碼文字，確保字體與間距符合你的設計 */}
                            <div className="custom-print-barcode-text">{value}</div>
                        </div>

                        <div className="custom-print-footer">
                            <div className="custom-print-qty-sec">
                                <div className="custom-print-qty-label-1">數量</div>
                                <div className="custom-print-qty-label-2">QTY</div>
                                <div className="custom-print-qty-val">{quantity}</div>
                            </div>

                            <div className="custom-print-note-sec">
                                <div className="custom-print-note-label">備註 NOTE</div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        function EditableItemName({ item, onSave }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(item.name);
            const inputRef = useRef(null);
            useEffect(() => { if (isEditing) inputRef.current?.focus(); }, [isEditing]);
            const save = () => { if (tempName.trim() && tempName !== item.name) onSave(item.id, item.barcode, tempName.trim()); setIsEditing(false); };

            if (isEditing) return <input ref={inputRef} type="text" value={tempName} onChange={e => setTempName(e.target.value)} onBlur={save} onKeyDown={e => e.key === 'Enter' && save()} className="w-full px-2 py-1 text-sm border border-blue-300 rounded dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />;
            return (
                <div className={`font-bold text-lg cursor-pointer group flex items-start gap-2 transition-colors ${item.name.includes('未知商品') ? 'text-rose-500 hover:text-rose-600' : 'hover:text-blue-500'}`} onClick={() => setIsEditing(true)}>
                    {/* 加上 flex-1, min-w-0, line-clamp-2 與 break-all 防止超長檔名破版 */}
                    <span className="flex-1 min-w-0 break-all line-clamp-2 leading-tight" title={item.name}>{item.name}</span>
                    {/* 加上 shrink-0 與 mt-1 讓編輯小圖示對齊第一行 */}
                    <i className="fa-solid fa-pen text-xs opacity-0 group-hover:opacity-100 transition-opacity mt-1.5 shrink-0"></i>
                </div>
            );
        }

        function EditableCategoryItem({ cat, onSave, onDelete }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(cat.name);
            const [tempKeys, setTempKeys] = useState(cat.keywords);

            const handleSave = () => {
                if (tempName.trim() && tempKeys.trim()) {
                    onSave(cat.id, tempName.trim(), tempKeys.trim());
                }
                setIsEditing(false);
            };

            if (isEditing) {
                return (
                    <div className="flex flex-col sm:flex-row gap-3 bg-blue-50 dark:bg-slate-800/80 p-4 rounded-xl border border-blue-200 dark:border-blue-500/50 shadow-sm animate-scale-in">
                        <input type="text" value={tempName} onChange={e => setTempName(e.target.value)} className="flex-1 px-3 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="分類名稱 (例: 星星人系列)" />
                        <input type="text" value={tempKeys} onChange={e => setTempKeys(e.target.value)} className="flex-2 px-3 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="關鍵字 (逗號分隔)" />
                        <div className="flex gap-2 justify-end sm:items-center">
                            <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-sm text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors font-medium">取消</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-bold shadow-sm flex items-center"><i className="fa-solid fa-check mr-1.5"></i>儲存</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 px-5 py-4 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-blue-200 dark:hover:border-blue-500/30 transition-colors group cursor-pointer" onClick={() => setIsEditing(true)}>
                    <div className="flex-1 pr-4">
                        <div className="font-bold text-slate-700 dark:text-slate-200 flex items-center text-base">
                            {cat.name}
                            <i className="fa-solid fa-pen ml-3 text-xs text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity" title="點擊編輯"></i>
                        </div>
                        <div className="text-sm text-slate-500 dark:text-slate-400 mt-1.5 leading-relaxed font-mono bg-white dark:bg-slate-800 inline-block px-2 py-0.5 rounded border border-slate-100 dark:border-slate-700">
                            {cat.keywords}
                        </div>
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); onDelete(cat.id); }} className="w-11 h-11 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-colors shrink-0 shadow-sm border border-transparent hover:border-red-100 dark:hover:border-red-500/20" title="刪除規則">
                        <i className="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            );
        }

        function QuantityControl({ quantity, onUpdate, onChange, size = 'md', focusRingClass = 'focus:ring-blue-500' }) {
            const isSm = size === 'sm';
            const btnSize = isSm ? 'w-7 h-7 rounded' : 'w-11 h-11 rounded-lg';
            const iconSize = isSm ? 'text-xs' : 'text-xs';
            const inputWidth = isSm ? 'w-8' : 'w-10';
            const textSize = isSm ? 'text-sm' : 'text-base';
            return (
                <div className={`flex items-center bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden p-1 ${isSm ? 'rounded-lg' : 'rounded-xl'}`}>
                    <button onClick={() => onUpdate(-1)} className={`${btnSize} flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-white dark:hover:bg-slate-800 dark:hover:text-slate-200 transition-colors shadow-sm`}>
                        <i className={`fa-solid fa-minus ${iconSize}`}></i>
                    </button>
                    <input type="number" min="1" value={quantity} onChange={(e) => onChange(e.target.value)} onFocus={(e) => e.target.select()} className={`${inputWidth} text-center font-bold text-slate-700 dark:text-slate-200 ${textSize} bg-transparent outline-none focus:bg-white dark:focus:bg-slate-800 focus:ring-2 ${focusRingClass} transition-all rounded px-1 hide-arrows`} />
                    <button onClick={() => onUpdate(1)} className={`${btnSize} flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-white dark:hover:bg-slate-800 dark:hover:text-slate-200 transition-colors shadow-sm`}>
                        <i className={`fa-solid fa-plus ${iconSize}`}></i>
                    </button>
                </div>
            );
        }
        function EmptyState({ icon, title, subtitle, className }) {
            return (
                <div className={`flex flex-col items-center justify-center ${className || "text-center py-20 bg-white/50 dark:bg-slate-800/30 rounded-2xl border border-slate-200 dark:border-slate-700 border-dashed transition-colors"}`}>
                    <i className={`${icon} ${icon.includes('text-') ? '' : 'text-slate-300 dark:text-slate-600'} ${icon.includes('text-') && icon.includes('xl') ? '' : 'text-5xl'} mb-4 block`}></i>
                    <div className="text-slate-500 dark:text-slate-400 font-medium">{title}</div>
                    {subtitle && <div className="text-slate-400 text-sm mt-2">{subtitle}</div>}
                </div>
            );
        }

        function ProductListItem({
            item, variant = 'card', isSelected = false, onToggleSelect,
            onUpdateName, onUpdateQuantity, onSetQuantity, onDelete,
            renderExtraTags, renderExtraActions, renderStatus
        }) {
            const [localRevealed, setLocalRevealed] = React.useState(false);

            const handleInteract = (e) => {
                if (onToggleSelect && !['INPUT', 'BUTTON', 'I'].includes(e.target.tagName) && !e.target.closest('button') && !e.target.closest('input')) {
                    onToggleSelect(item.id, e);
                }
            };

            const copyBarcode = (e) => {
                e.stopPropagation();
                const textToCopy = `${item.barcode}\t${item.name}`;
                if (window.copyTextToClipboard) {
                    window.copyTextToClipboard(textToCopy, () => {
                        if (window.showGlobalToast) window.showGlobalToast('📋 已複製條碼與品名！');
                    });
                }
            };

            if (variant === 'list') {
                return (
                    <div className={`flex flex-col sm:flex-row items-start sm:items-center justify-between px-5 py-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group gap-4 ${isSelected ? 'bg-amber-50/50 dark:bg-amber-500/10' : ''}`}
                        onClick={handleInteract}>

                        <div className="flex items-start sm:items-center flex-1 min-w-0 w-full sm:w-auto gap-3 sm:gap-4">
                            {onToggleSelect && (
                                <div className="flex-shrink-0 mt-0.5 sm:mt-0 relative flex items-center justify-center p-1" title={isSelected ? '取消選取' : '點擊選取'}>
                                    <input
                                        type="checkbox"
                                        checked={isSelected}
                                        readOnly
                                        className="w-5 h-5 md:w-6 md:h-6 rounded border-2 border-slate-300 text-amber-500 focus:ring-amber-500 appearance-none checked:bg-amber-500 checked:border-amber-500 transition-colors shadow-sm bg-slate-50 dark:bg-slate-700 dark:border-slate-500 outline-none pointer-events-none cursor-pointer"
                                    />
                                    {isSelected && <i className="fa-solid fa-check text-white text-xs md:text-sm absolute pointer-events-none"></i>}
                                </div>
                            )}
                            <div className="flex flex-col flex-1 min-w-0 pr-4 justify-center">
                                <div className="flex items-center gap-3 mb-1.5 flex-wrap">
                                    <div className="text-base font-bold text-slate-800 dark:text-slate-100">
                                        <EditableItemName item={item} onSave={onUpdateName} />
                                    </div>
                                    {renderExtraTags && renderExtraTags(item)}
                                </div>
                                <div className="text-sm text-slate-400 dark:text-slate-500 font-mono flex items-center flex-wrap gap-x-2 gap-y-1 mt-0.5">
                                    <div className="flex items-center gap-2 mr-2">
                                        <span className="flex items-center"><i className="fa-solid fa-barcode mr-1.5 opacity-50"></i>{item.barcode}</span>
                                        <button onClick={copyBarcode} className="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-500/20 rounded-md transition-colors shadow-sm border border-transparent hover:border-blue-100 dark:hover:border-blue-500/30" title="複製條碼與品名"><i className="fa-solid fa-copy text-[11px]"></i></button>
                                    </div>
                                    {item.timestamp && (
                                        <span className="flex items-center text-xs font-bold text-slate-400 dark:text-slate-500">
                                            <i className="fa-solid fa-clock mr-1.5 opacity-60"></i>
                                            {typeof formatTimeDetailed !== 'undefined' ? formatTimeDetailed(item.timestamp) : ''}
                                        </span>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-3 sm:gap-4 shrink-0 mt-3 sm:mt-0 w-full lg:w-auto justify-between lg:justify-end">
                            {renderStatus && (
                                <div className="flex-shrink-0 w-24 flex items-center lg:justify-end">
                                    {renderStatus(item)}
                                </div>
                            )}
                            <QuantityControl quantity={item.quantity} onUpdate={onUpdateQuantity} onChange={onSetQuantity} size="sm" focusRingClass="focus:ring-blue-500" />
                            <div className="flex items-center gap-2">
                                {renderExtraActions && renderExtraActions(item)}
                                {onDelete && (
                                    <button onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} className="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-xl transition-colors shrink-0" title="刪除">
                                        <i className="fa-solid fa-trash-can"></i>
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // card variant
            return (
                <div className={`flex flex-col h-full relative rounded-2xl p-5 bg-white dark:bg-slate-800 border ${isSelected ? 'border-amber-400 shadow-amber-500/10 ring-2 ring-amber-400 rotate-1' : 'border-slate-200 dark:border-slate-700'} transition-all duration-300 hover:-translate-y-1 hover:shadow-lg animate-scale-in cursor-pointer select-none`}
                    onClick={handleInteract}>

                    {/* 1. 頂部列 */}
                    <div className="flex justify-between items-start mb-3 relative">
                        {item.status ? (
                            <div className="text-xs font-bold text-slate-500 dark:text-slate-400 flex items-center gap-1.5 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 px-2.5 py-1 rounded-lg">
                                <i className="fa-solid fa-tag w-3"></i>數量: <strong className={`text-sm ${item.status === 'displayed' ? 'text-amber-500' : 'text-slate-600 dark:text-slate-300'}`}>{item.quantity}</strong>
                            </div>
                        ) : (
                            <span className="text-xs text-slate-500 dark:text-slate-400 font-mono font-bold bg-slate-100 dark:bg-slate-700/50 px-2 py-1 rounded flex items-center truncate max-w-[150px]">
                                <i className="fa-solid fa-barcode mr-1.5 opacity-60"></i>{item.barcode}
                            </span>
                        )}
                        {renderExtraTags && renderExtraTags(item)}
                    </div>

                    {/* 2. 標題區 */}
                    <div className="flex-1 flex flex-col justify-start mt-1">
                        <div className="mb-2 text-base font-bold text-slate-800 dark:text-slate-100">
                            <EditableItemName item={item} onSave={onUpdateName} />
                        </div>

                        {item.timestamp && (
                            <div className="text-xs font-bold text-slate-400 dark:text-slate-500 mb-2 flex items-center gap-1.5">
                                <i className="fa-solid fa-clock opacity-60"></i>
                                <span>入庫: <span className="text-slate-600 dark:text-slate-300 ml-1">{typeof formatTimeDetailed !== 'undefined' ? formatTimeDetailed(item.timestamp) : ''}</span></span>
                            </div>
                        )}

                        {/* 3. 條碼區 */}
                        <div className="mt-1">
                            {item.status ? (
                                <button onClick={(e) => { e.stopPropagation(); setLocalRevealed(!localRevealed); }} className="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-2 py-1 rounded text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors font-mono flex items-center w-max shadow-sm">
                                    <i className={`fa-solid ${localRevealed ? 'fa-eye-slash' : 'fa-barcode'} mr-1.5`}></i>{localRevealed ? item.barcode : '顯示條碼'}
                                </button>
                            ) : (
                                <div className="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-2 py-1 rounded text-xs text-slate-400 font-mono flex items-center w-max shadow-sm">
                                    <i className="fa-solid fa-barcode mr-1.5 opacity-60"></i>{item.barcode}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 4. 底部操作列 */}
                    <div className="mt-auto pt-4 flex justify-between items-center z-10 relative">
                        <QuantityControl quantity={item.quantity} onUpdate={onUpdateQuantity} onChange={onSetQuantity} size="sm" focusRingClass="focus:ring-amber-500" />
                        <div className="flex items-center gap-2 shrink-0">
                            {renderExtraActions && renderExtraActions(item)}
                            {!renderExtraActions && onDelete && (
                                <button onClick={(e) => { e.stopPropagation(); onDelete(item.id); }} className="w-8 h-8 flex items-center justify-center bg-slate-50 dark:bg-slate-700 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg transition-colors shrink-0" title="刪除"><i className="fa-solid fa-trash-can"></i></button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function useGlobalScanner(onScan, threshold = 50) {
            const { useEffect, useRef } = React;
            const buffer = useRef('');
            const lastKeyTime = useRef(Date.now());

            useEffect(() => {
                const handleKeyDown = (e) => {
                    // 如果使用者原本就在文字方塊打字，就不攔截
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

                    const currentTime = Date.now();
                    if (currentTime - lastKeyTime.current > threshold) {
                        buffer.current = '';
                    }

                    if (e.key === 'Enter' && buffer.current.length > 5) {
                        e.preventDefault();
                        onScan(buffer.current);
                        buffer.current = '';
                    } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                        buffer.current += e.key;
                    }

                    lastKeyTime.current = currentTime;
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [onScan, threshold]);
        }

        function BarcodeScannerInput({ target, placeholder, iconClass, onSubmit, onOpenCamera, allDictEntries, settings, extraInput }) {
            const { useState, useMemo, useRef, useEffect } = React;
            const [inputValue, setInputValue] = useState('');
            const [isFocused, setIsFocused] = useState(false);
            const [multiplier, setMultiplier] = useState(1); // ✨ 新增：觸控鎖定倍數狀態
            const inputRef = useRef(null);

            useEffect(() => {
                if (inputRef.current) {
                    inputRef.current.style.height = 'auto';
                    inputRef.current.style.height = `${inputRef.current.scrollHeight}px`;
                }
            }, [inputValue]);

            const searchSuggestions = useMemo(() => {
                const input = String(inputValue || '').trim().toLowerCase();
                if (!input) return [];
                return allDictEntries
                    .filter(item => item.name.toLowerCase().includes(input) || item.barcode.toLowerCase().includes(input))
                    .slice(0, 10);
            }, [inputValue, allDictEntries]);

            const getBarcodeFromInput = (input) => {
                const safeInput = String(input || '').trim();
                if (settings.customNameMap[safeInput] || settings.barcodeMap[safeInput]) return safeInput;

                const lowerInput = safeInput.toLowerCase();
                const allEntries = [...Object.entries(settings.customNameMap || {}), ...Object.entries(settings.barcodeMap || {})];

                const exactMatch = allEntries.find(([bc, name]) => String(name || '').toLowerCase() === lowerInput);
                if (exactMatch) return exactMatch[0];

                const partialMatch = allEntries.find(([bc, name]) => String(name || '').toLowerCase().includes(lowerInput));
                if (partialMatch) return partialMatch[0];

                return safeInput;
            };

            const processInputs = (inputStr) => {
                const str = String(inputStr || '').trim();
                if (!str) return;

                const rawInputs = str.split(/[\n\t, \u3000]+/).filter(b => b.trim() !== '');
                const itemsToSubmit = [];

                rawInputs.forEach(rawInput => {
                    let code = rawInput;
                    let currentMultiplier = multiplier;

                    // ✨ 支援鍵盤輸入 *N (例如 6941313089877*12)，優先級高於觸控按鈕
                    if (code.includes('*')) {
                        const parts = code.split('*');
                        if (parts.length === 2 && parseInt(parts[1]) > 0) {
                            code = parts[0];
                            currentMultiplier = parseInt(parts[1]);
                        }
                    }

                    const barcode = getBarcodeFromInput(code);
                    let dictName = findNameInDict(barcode, settings.customNameMap);
                    let name = dictName || settings.barcodeMap[barcode] || `未知商品 (${barcode})`;

                    // ✨ 依照倍數將商品重複放入陣列，完美相容現有的 handleUnifiedSubmit 加總邏輯
                    for (let i = 0; i < currentMultiplier; i++) {
                        itemsToSubmit.push({ barcode, name });
                    }
                });

                onSubmit(itemsToSubmit);
                setInputValue('');
                setMultiplier(1); // ✨ 自動解除倍數鎖定，防止下一個商品被誤算
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                processInputs(inputValue);
            };

            const [isGlobalScannerEnabled, setIsGlobalScannerEnabled] = useState(true);

            useGlobalScanner((scannedValue) => {
                if (isGlobalScannerEnabled) {
                    processInputs(scannedValue);
                }
            }, 50);

            return (
                <div className="relative w-full">
                    <form onSubmit={handleSubmit} className="relative flex flex-wrap items-start gap-3 z-20 w-full">
                        <div className="relative flex-auto min-w-[250px] group">
                            <div className="absolute top-0 left-0 pl-4 h-12 md:h-14 flex items-center pointer-events-none transition-transform group-focus-within:scale-110">
                                <i className={`fa-solid ${iconClass} ${multiplier > 1 ? 'text-blue-500' : 'text-slate-400 group-focus-within:text-blue-500'}`}></i>
                            </div>
                            <textarea
                                ref={inputRef}
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter' && !e.shiftKey) {
                                        e.preventDefault();
                                        handleSubmit(e);
                                    }
                                }}
                                onFocus={() => setIsFocused(true)}
                                onBlur={() => setIsFocused(false)}
                                /* ✨ 當倍率 > 1 時，輸入框會有明顯的視覺發光回饋 */
                                className={`block w-full min-h-[48px] md:min-h-[56px] pl-11 pr-4 py-3 md:py-4 bg-slate-50 dark:bg-slate-900 border ${multiplier > 1 ? 'border-blue-400 ring-2 ring-blue-400/50 bg-blue-50/50 dark:bg-blue-900/20' : 'border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500'} rounded-xl dark:text-white transition-all font-mono text-sm md:text-base outline-none resize-none overflow-y-auto custom-scrollbar max-h-[200px]`}
                                placeholder={multiplier > 1 ? `${placeholder} (鎖定 x${multiplier} 加入)` : placeholder}
                                autoComplete="off"
                                rows="1"
                            />
                        </div>

                        <div className="flex gap-2 shrink-0 justify-start">
                            <button type="button" onClick={() => onOpenCamera(target)} className="h-12 md:h-14 w-12 md:w-14 shrink-0 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors shadow-sm flex items-center justify-center">
                                <i className="fa-solid fa-camera text-xl"></i>
                            </button>
                            {extraInput}
                            <button type="submit" className={`h-12 md:h-14 px-5 md:px-6 shrink-0 text-white rounded-xl font-bold transition-all shadow-sm text-sm md:text-base whitespace-nowrap ${multiplier > 1 ? 'bg-blue-600 hover:bg-blue-700 shadow-blue-500/30' : 'bg-slate-800 dark:bg-blue-600 hover:bg-slate-900 dark:hover:bg-blue-700'}`}>
                                加入 {multiplier > 1 ? `x${multiplier}` : ''}
                            </button>
                        </div>
                    </form>

                    {/* ✨ 觸控快捷倍數鍵 (Proposal C) */}
                    <div className="mt-3 flex items-center gap-2 overflow-x-auto custom-scrollbar pb-1.5 select-none">
                        <span className="text-xs font-bold text-slate-400 shrink-0 ml-1 mr-1">
                            <i className="fa-solid fa-layer-group"></i> 掃描數量
                        </span>
                        {[1, 6, 8, 9, 12].map(m => (
                            <button
                                key={`mul-${m}`}
                                type="button"
                                onClick={() => setMultiplier(m)}
                                className={`px-3 py-1.5 rounded-lg text-[13px] font-black transition-all shrink-0 border ${multiplier === m ? 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-500/30 scale-105' : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500/50 hover:text-blue-500'}`}
                            >
                                {m === 1 ? 'x 1' : `x ${m}`}
                            </button>
                        ))}
                    </div>

                    {/* 快捷鍵提示與全域掃描開關 */}
                    <div className="mt-2 text-xs sm:text-xs text-slate-400 dark:text-slate-500 font-bold flex items-center justify-between pl-1">
                        <div className="flex items-center">
                            <i className={`fa-solid fa-bolt mr-1.5 transition-colors ${isGlobalScannerEnabled ? 'text-amber-500 opacity-80 animate-pulse' : 'text-slate-300'}`}></i>
                            <span>{isGlobalScannerEnabled ? '全域掃描：已啟用（隨掃即登錄）' : '全域掃描：已暫停（請點擊上方輸入框）'}</span>
                        </div>
                        <button
                            type="button"
                            onClick={() => setIsGlobalScannerEnabled(!isGlobalScannerEnabled)}
                            className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full border transition-all ${isGlobalScannerEnabled ? 'border-amber-500/30 bg-amber-50 text-amber-600 dark:bg-amber-500/10 dark:text-amber-400 focus:ring-2 focus:ring-amber-400' : 'border-slate-200 bg-slate-100 text-slate-500 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-400 focus:ring-2 focus:ring-slate-400'} focus:outline-none`}
                            title={isGlobalScannerEnabled ? '關閉全域掃描' : '啟用全域掃描'}
                        >
                            <div className={`w-2 h-2 rounded-full ${isGlobalScannerEnabled ? 'bg-amber-500 animate-pulse' : 'bg-slate-400'}`}></div>
                            {isGlobalScannerEnabled ? 'ON' : 'OFF'}
                        </button>
                    </div>

                    {/* 下拉搜尋選單 */}
                    {isFocused && searchSuggestions.length > 0 && (
                        <div className="absolute top-[calc(100%+8px)] left-0 w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl z-[100] overflow-hidden animate-scale-in origin-top">
                            <div className="max-h-[320px] overflow-y-auto custom-scrollbar flex flex-col divide-y divide-slate-100 dark:divide-slate-700/50">
                                {searchSuggestions.map((item, idx) => (
                                    <div
                                        key={`sugg-${item.barcode}-${idx}`}
                                        className="px-4 py-3 hover:bg-blue-50/50 dark:hover:bg-slate-700/50 cursor-pointer transition-colors flex flex-col justify-center"
                                        onMouseDown={(e) => {
                                            e.preventDefault();
                                            // ✨ 點擊下拉選單也會套用目前的鎖定倍數！
                                            processInputs(item.barcode);
                                        }}
                                    >
                                        <div className="font-bold text-slate-800 dark:text-slate-200 text-sm mb-1">{item.name}</div>
                                        <div className="text-xs font-mono text-slate-400 bg-slate-100 dark:bg-slate-900 inline-flex px-2 py-0.5 rounded w-max">{item.barcode}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // ✨ 共用元件：全域捷徑操作選單 (Quick Action Menu)
        // ==========================================
        function QuickActionMenu({ barcode, name, onAction }) {
            const [isOpen, setIsOpen] = useState(false);
            const menuRef = useRef(null);

            // 點擊外部關閉選單防呆
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (menuRef.current && !menuRef.current.contains(event.target)) setIsOpen(false);
                };
                if (isOpen) document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [isOpen]);

            const triggerAction = (action, forcedStatus) => {
                onAction(action, barcode, name, forcedStatus);
                setIsOpen(false);
            };

            return (
                <div className={`relative inline-block ${isOpen ? 'z-[99]' : ''}`} ref={menuRef}>
                    <button
                        onClick={(e) => { e.stopPropagation(); setIsOpen(!isOpen); }}
                        className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all focus:outline-none ${isOpen ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-blue-50 hover:text-blue-600 dark:bg-slate-800 dark:text-slate-400 dark:hover:bg-blue-500/20 dark:hover:text-blue-400'}`}
                        title="捷徑操作"
                    >
                        <i className="fa-solid fa-bolt"></i>
                    </button>

                    {isOpen && (
                        <div className="absolute right-0 top-[calc(100%+4px)] w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 py-1.5 z-50 animate-scale-in origin-top-right flex flex-col">
                            <div className="px-3 py-1.5 text-[10px] font-bold text-slate-400 border-b border-slate-100 dark:border-slate-700 mb-1">傳送資料至...</div>
                            <button onClick={(e) => { e.stopPropagation(); triggerAction('print'); }} className="w-full text-left px-3 py-2 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-blue-50 dark:hover:bg-blue-500/10 hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center">
                                <i className="fa-solid fa-print w-5 text-center mr-1 text-blue-500/70"></i> 加入待印清單
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); triggerAction('damaged'); }} className="w-full text-left px-3 py-2 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-rose-50 dark:hover:bg-rose-500/10 hover:text-rose-600 dark:hover:text-rose-400 transition-colors flex items-center">
                                <i className="fa-solid fa-box-open w-5 text-center mr-1 text-rose-500/70"></i> 登記為盒損
                            </button>
                            <div className="h-px bg-slate-100 dark:bg-slate-700 my-1"></div>
                            <button onClick={(e) => { e.stopPropagation(); triggerAction('display', 'displayed'); }} className="w-full text-left px-3 py-2 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-amber-500/10 hover:text-amber-600 dark:hover:text-amber-400 transition-colors flex items-center">
                                <i className="fa-solid fa-lightbulb w-5 text-center mr-1 text-amber-500/70"></i> 陳列 (上架展示)
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); triggerAction('display', 'stored'); }} className="w-full text-left px-3 py-2 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-800 dark:hover:text-white transition-colors flex items-center">
                                <i className="fa-solid fa-box-archive w-5 text-center mr-1 text-slate-500/70"></i> 陳列 (撤下保管)
                            </button>
                            <div className="h-px bg-slate-100 dark:bg-slate-700 my-1"></div>
                            <button onClick={(e) => { e.stopPropagation(); triggerAction('track_new'); }} className="w-full text-left px-3 py-2 text-sm font-bold text-slate-700 dark:text-slate-200 hover:bg-emerald-50 dark:hover:bg-emerald-500/10 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors flex items-center">
                                <i className="fa-solid fa-star w-5 text-center mr-1 text-emerald-500/70"></i> 追蹤為新品
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        window.copyTextToClipboard = (text, fallbackToast) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => { if (fallbackToast) fallbackToast(); }).catch(e => console.error(e));
            } else {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    textArea.remove();
                    if (fallbackToast) fallbackToast();
                } catch (e) {
                    console.error("複製失敗", e);
                }
            }
        };

        function App() {
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [passcodeError, setPasscodeError] = useState(false);

            useEffect(() => {
                if (!auth) { setAuthLoading(false); return; }
                const unsubscribe = auth.onAuthStateChanged((currentUser) => { setUser(currentUser); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);

            const [activeTab, setActiveTab] = useState('daily-report');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState('');
            const [printContext, setPrintContext] = useState(null);
            const [printStyle, setPrintStyle] = useState('popmart');
            const [top5SortBy, setTop5SortBy] = useState('qty');
            // ✨ 新增：用於控制陳列品轉移 Modal 的狀態
            const [displayTransferModal, setDisplayTransferModal] = useState(null);
            const [listTransferModal, setListTransferModal] = useState(null);

            // ✨ 新增：執行轉移與新增的核心邏輯
            const executeDisplayUpdate = (newItems, transferItems, targetStatus) => {
                setDisplayItems(prev => {
                    let nextState = [...prev];
                    let addedCount = 0;
                    let transferCount = 0;

                    // 1. 處理需要從另一個狀態轉移過來的商品
                    transferItems.forEach(transfer => {
                        // 計算：如果他掃描的數量大於他決定轉移的數量，差額當作「全新商品」加入
                        const remainingNewQty = Math.max(0, transfer.qtyToAdd - transfer.transferQty);

                        if (transfer.transferQty > 0) {
                            // 從來源地扣除
                            const sourceIdx = nextState.findIndex(i => i.id === transfer.sourceItem.id);
                            if (sourceIdx >= 0) {
                                nextState[sourceIdx] = { ...nextState[sourceIdx], quantity: nextState[sourceIdx].quantity - transfer.transferQty };
                                if (nextState[sourceIdx].quantity <= 0) nextState.splice(sourceIdx, 1);
                            }
                            // 加入到目的地
                            const targetIdx = nextState.findIndex(i => i.barcode === transfer.barcode && i.status === targetStatus);
                            if (targetIdx >= 0) {
                                nextState[targetIdx] = { ...nextState[targetIdx], quantity: nextState[targetIdx].quantity + transfer.transferQty };
                            } else {
                                nextState.push({ id: Date.now() + Math.random(), barcode: transfer.barcode, name: transfer.name, quantity: transfer.transferQty, status: targetStatus });
                            }
                            transferCount += transfer.transferQty;
                        }

                        // 差額當作新商品加入
                        if (remainingNewQty > 0) {
                            const targetIdx = nextState.findIndex(i => i.barcode === transfer.barcode && i.status === targetStatus);
                            if (targetIdx >= 0) {
                                nextState[targetIdx] = { ...nextState[targetIdx], quantity: nextState[targetIdx].quantity + remainingNewQty };
                            } else {
                                nextState.push({ id: Date.now() + Math.random(), barcode: transfer.barcode, name: transfer.name, quantity: remainingNewQty, status: targetStatus });
                            }
                            addedCount += remainingNewQty;
                        }
                    });

                    // 2. 處理純粹全新的商品
                    newItems.forEach(item => {
                        const targetIdx = nextState.findIndex(i => i.barcode === item.barcode && i.status === targetStatus);
                        if (targetIdx >= 0) {
                            nextState[targetIdx] = { ...nextState[targetIdx], quantity: nextState[targetIdx].quantity + item.qtyToAdd };
                        } else {
                            nextState.push({ id: Date.now() + Math.random(), barcode: item.barcode, name: item.name, quantity: item.qtyToAdd, status: targetStatus });
                        }
                        addedCount += item.qtyToAdd;
                    });

                    updateCloudData('displayItems', nextState);
                    let msgs = [];
                    if (transferCount > 0) msgs.push(`成功轉移 ${transferCount} 件`);
                    if (addedCount > 0) msgs.push(`全新加入 ${addedCount} 件`);
                    showToast(`✨ ${msgs.join('，')}`);

                    return nextState;
                });
            };

            const executePrint = (context) => {
                setPrintContext(context);
                setTimeout(() => { window.print(); }, 150);
            };
            const [undoData, setUndoData] = useState(null);
            const [isQRCodeModalOpen, setIsQRCodeModalOpen] = useState(false);
            const [qrDataUrl, setQrDataUrl] = useState('');
            const [qrError, setQrError] = useState('');

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };
            window.showGlobalToast = showToast;

            const exportToExcel = (data, filename) => {
                if (data.length === 0) return showToast('⚠️ 匯出失敗：沒有資料可以匯出');
                const exportData = data.map(item => ({
                    '條碼': item.barcode,
                    '品名': item.name,
                    '數量': item.quantity,
                    '狀態': item.status ? (item.status === 'displayed' ? '陳列中' : '已撤下') : '盒損'
                }));
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "品項清單");
                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                window.XLSX.writeFile(workbook, `${filename}_${dateStr}.xlsx`);
            };

            useEffect(() => {
                const afterPrint = () => setPrintContext(null);
                window.addEventListener('afterprint', afterPrint);
                return () => window.removeEventListener('afterprint', afterPrint);
            }, []);

            const [dailyRecords, setDailyRecords] = useState([]);
            const [settings, setSettings] = useState(defaultSettings);
            const [damagedItems, setDamagedItems] = useState([]);
            const [displayItems, setDisplayItems] = useState([]);
            const [systemExhibitionItems, setSystemExhibitionItems] = useState([]);
            const [printSubTab, setPrintSubTab] = useState('scan');
            // 公告相關狀態
            const [announcementItems, setAnnouncementItems] = useState([]);
            const [announcementInput, setAnnouncementInput] = useState('');

            // ✨ 新增：手動輸入面板專用的 State
            const [inputMode, setInputMode] = useState('auto'); // 'auto' | 'manual'
            const [manualSeries, setManualSeries] = useState('');
            const [manualName, setManualName] = useState('');
            const [manualSellDate, setManualSellDate] = useState('');
            const [manualDisplayDate, setManualDisplayDate] = useState('');
            const [manualDisplayTime, setManualDisplayTime] = useState('');
            const [manualRestrict, setManualRestrict] = useState('');
            const [manualNeedExhibition, setManualNeedExhibition] = useState(false);

            const [dbStatus, setDbStatus] = useState('連線中...');
            const [dataLoaded, setDataLoaded] = useState({ records: false, settings: false, damaged: false, display: false, systemExhibition: false, announcement: false });
            const isDataReady = dataLoaded.records && dataLoaded.settings && dataLoaded.damaged && dataLoaded.display && dataLoaded.systemExhibition && dataLoaded.announcement;

            useEffect(() => {
                if (!user || !db) return;
                const options = { includeMetadataChanges: true };
                const unsubRecords = db.collection('retailOps').doc('dailyRecords').onSnapshot(options, doc => {
                    if (doc.exists) setDailyRecords(doc.data().data || []);
                    if (!doc.metadata.fromCache) { setDataLoaded(prev => ({ ...prev, records: true })); }
                    setDbStatus(doc.metadata.fromCache ? '🟡 連線中...' : '🟢 已同步');
                }, err => { setDbStatus('🔴 權限不足或連線失敗'); });
                const unsubSettings = db.collection('retailOps').doc('settings').onSnapshot(options, doc => {
                    if (doc.exists) setSettings(doc.data().data || defaultSettings);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, settings: true }));
                });
                const unsubDamaged = db.collection('retailOps').doc('damagedItems').onSnapshot(options, doc => {
                    if (doc.exists) setDamagedItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, damaged: true }));
                });
                const unsubDisplay = db.collection('retailOps').doc('displayItems').onSnapshot(options, doc => {
                    if (doc.exists) setDisplayItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, display: true }));
                });
                const unsubSystemExhibition = db.collection('retailOps').doc('systemExhibitionItems').onSnapshot(options, doc => {
                    if (doc.exists) setSystemExhibitionItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, systemExhibition: true }));
                });
                const unsubAnnouncement = db.collection('retailOps').doc('announcementItems').onSnapshot(options, doc => {
                    if (doc.exists) setAnnouncementItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, announcement: true }));
                });
                return () => { unsubRecords(); unsubSettings(); unsubDamaged(); unsubDisplay(); unsubSystemExhibition(); unsubAnnouncement(); };
            }, [user]);

            const updateCloudData = (docName, newData, successMsg) => {
                if (!db || !user) return showToast('權限不足，無法寫入資料');
                db.collection('retailOps').doc(docName).set({ data: newData })
                    .then(() => { if (successMsg) showToast(successMsg); })
                    .catch(err => showToast('同步失敗：' + err.message));
            };

            const handleUpdateItemName = (listType, id, barcode, newName) => {
                if (listType === 'damaged') {
                    updateCloudData('damagedItems', damagedItems.map(i => i.id === id ? { ...i, name: newName } : i));
                } else if (listType === 'display') {
                    updateCloudData('displayItems', displayItems.map(i => i.id === id ? { ...i, name: newName } : i));
                } else {
                    setBarcodeItems(prev => prev.map(i => i.id === id ? { ...i, name: newName } : i));
                }
                updateCloudData('settings', { ...settings, customNameMap: { ...settings.customNameMap, [barcode]: newName } }, `已更新條碼商品！`);
            };

            const triggerUndo = (message, onUndoCallback) => {
                if (undoData && undoData.timerId) clearTimeout(undoData.timerId);
                const timerId = setTimeout(() => setUndoData(null), 5000);
                setUndoData({ message, onUndo: onUndoCallback, timerId });
            };

            const handleUndoAction = () => {
                if (!undoData) return;
                clearTimeout(undoData.timerId);
                if (typeof undoData.onUndo === 'function') undoData.onUndo();
                setUndoData(null);
                showToast('✅ 已成功復原操作！');
            };

            const [lastAction, setLastAction] = useState(null);
            const [isDamagedOverviewExpanded, setIsDamagedOverviewExpanded] = useState(false);
            const [damagedSearch, setDamagedSearch] = useState('');
            const [activeDamagedCategory, setActiveDamagedCategory] = useState('全部');

            // ✨ 升級版：支援跨分頁捷徑傳送 (加入 forcedStatus 參數)
            const handleUnifiedSubmit = (target, items, forcedStatus = null) => {
                if (!items || items.length === 0) return;

                if (target === 'damaged') {
                    setDamagedItems(prev => {
                        let nextState = [...prev];
                        let addedCount = 0;
                        items.forEach(({ barcode, name }) => {
                            const exIndex = nextState.findIndex(i => i.barcode === barcode);
                            if (exIndex >= 0) {
                                nextState[exIndex] = { ...nextState[exIndex], quantity: nextState[exIndex].quantity + 1 };
                            } else {
                                nextState = [...nextState, { id: Date.now() + Math.random(), barcode, name, quantity: 1 }];
                            }
                            addedCount++;
                        });
                        updateCloudData('damagedItems', nextState);
                        if (addedCount > 1) showToast(`✅ 已成功批量盒損：${addedCount} 筆`);
                        else showToast(`📦 盒損已登記：${items[0].name}`);
                        return nextState;
                    });
                } else if (target === 'display') {
                    // ✨ 關鍵修改：優先使用強制狀態 (捷徑傳入)，否則使用目前分頁過濾器狀態
                    const targetStatus = forcedStatus || displayFilter;
                    const sourceStatus = targetStatus === 'displayed' ? 'stored' : 'displayed';

                    let itemsRequiringTransfer = [];
                    let itemsToAddNew = [];

                    // 將輸入的商品依據條碼群組化 (計算掃描了幾件)
                    const groupedInput = items.reduce((acc, item) => {
                        acc[item.barcode] = acc[item.barcode] || { ...item, qtyToAdd: 0 };
                        acc[item.barcode].qtyToAdd += 1;
                        return acc;
                    }, {});

                    // 逐一檢查是否在「另一個狀態」存在 (智能轉移邏輯)
                    Object.values(groupedInput).forEach(inputItem => {
                        const existingInSource = displayItems.find(i => i.barcode === inputItem.barcode && i.status === sourceStatus);
                        if (existingInSource) {
                            itemsRequiringTransfer.push({
                                ...inputItem,
                                sourceItem: existingInSource,
                                // 預設轉移數量：0 (全新商品優先)，讓使用者自行決定是否轉移
                                transferQty: 0
                            });
                        } else {
                            itemsToAddNew.push(inputItem);
                        }
                    });

                    // 如果有需要轉移的，就開啟 Modal 詢問；否則直接執行新增
                    if (itemsRequiringTransfer.length > 0) {
                        setDisplayTransferModal({
                            targetStatus,
                            sourceStatus,
                            items: itemsRequiringTransfer,
                            pendingNewItems: itemsToAddNew
                        });
                    } else {
                        executeDisplayUpdate(itemsToAddNew, [], targetStatus);
                    }
                } else if (target === 'print') {
                    setBarcodeItems(prev => {
                        let nextState = [...prev];
                        let addedCount = 0;
                        items.forEach(({ barcode, name }) => {
                            const exIndex = nextState.findIndex(i => i.barcode === barcode);
                            if (exIndex >= 0) {
                                nextState[exIndex] = { ...nextState[exIndex], quantity: nextState[exIndex].quantity + 1 };
                            } else {
                                nextState = [{ id: Date.now() + Math.random(), barcode, name, quantity: 1 }, ...nextState];
                            }
                            addedCount++;
                        });
                        if (addedCount > 1) showToast(`✅ 已成功批量加入待印：${addedCount} 筆`);
                        else showToast(`🖨️ 已加入待印清單：${items[0].name}`);
                        return nextState;
                    });
                }
            };

            // ✨ 新增：跨分頁加入新品追蹤的獨立函數
            const handleTrackNewFromShortcut = (barcode) => {
                if (!barcode) return;
                const safeBc = String(barcode).trim();
                if (settings.newBarcodes.includes(safeBc)) {
                    showToast('⚠️ 此商品已經在新品追蹤清單中囉！');
                    return;
                }
                updateCloudData('settings', {
                    ...settings,
                    newBarcodes: [...settings.newBarcodes, safeBc],
                    boxSizeMap: { ...settings.boxSizeMap, [safeBc]: 6 } // 預設給 6 入
                }, '✨ 已加入新品追蹤清單！(預設6入)');
            };

            const handleOpenCamera = (target) => {
                setScannerTarget(target);
                setScannerOpen(true);
            };

            const updateQuantity = (id, delta) => {
                setDamagedItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item);
                    updateCloudData('damagedItems', newData);
                    return newData;
                });
            };
            const setDamagedQuantity = (id, newQty) => {
                const qty = Math.max(1, parseInt(newQty) || 1);
                setDamagedItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: qty } : item);
                    updateCloudData('damagedItems', newData);
                    return newData;
                });
            };

            const removeDamagedItem = (id) => {
                setDamagedItems(prev => {
                    const item = prev.find(i => i.id === id);
                    const newData = prev.filter(i => i.id !== id);
                    if (item) triggerUndo(`已刪除盒損品：${item.name}`, () => {
                        setDamagedItems(current => {
                            const restored = [...current, item];
                            updateCloudData('damagedItems', restored);
                            return restored;
                        });
                    });
                    updateCloudData('damagedItems', newData);
                    return newData;
                });
            };

            const clearAllDamagedItems = () => {
                const backup = [...damagedItems];
                setDamagedItems([]);
                updateCloudData('damagedItems', []);
                setLastAction(null);
                triggerUndo('已清空季末盒損紀錄', () => {
                    setDamagedItems(backup);
                    updateCloudData('damagedItems', backup);
                });
            };

            const filteredDamagedItems = useMemo(() => {
                if (!damagedSearch.trim()) return damagedItems; const q = damagedSearch.toLowerCase();
                return damagedItems.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
            }, [damagedItems, damagedSearch]);

            const groupedDamagedItems = useMemo(() => {
                const groups = {};
                filteredDamagedItems.forEach(item => {
                    const cat = determineCategory(item.name, settings.customCategories);
                    if (!groups[cat]) groups[cat] = []; groups[cat].push(item);
                });
                return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
            }, [filteredDamagedItems, settings.customCategories]);

            const [displayFilter, setDisplayFilter] = useState('stored');
            const [displaySearch, setDisplaySearch] = useState('');
            const [displayOverviewStatus, setDisplayOverviewStatus] = useState('all');
            const [activeDisplayCategory, setActiveDisplayCategory] = useState('全部');
            const [displayCurrentPage, setDisplayCurrentPage] = useState(1);
            const [overviewCurrentPage, setOverviewCurrentPage] = useState(1);
            const [isDisplayOverviewExpanded, setIsDisplayOverviewExpanded] = useState(false);
            const [itemsPerPage, setItemsPerPage] = useState(10);

            // ✨ 根據螢幕長寬動態計算分頁數量
            useEffect(() => {
                const updateItemsPerPage = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;

                    // 扣除上方導覽列、搜尋列與分頁器的約略高度 (約 280px)
                    const availableHeight = Math.max(400, height - 280);

                    // 假設單張卡片含間距約佔 140px 高度，計算可容納的橫列數
                    const rows = Math.max(4, Math.floor(availableHeight / 140));

                    if (width >= 1280) { // xl:grid-cols-3 (3欄)
                        setItemsPerPage(rows * 3);
                    } else if (width >= 768) { // md:grid-cols-2 (2欄)
                        setItemsPerPage(rows * 2);
                    } else { // 手機版 (1欄)
                        setItemsPerPage(Math.max(10, rows * 1));
                    }
                };

                updateItemsPerPage();
                let timeoutId;
                const resizeListener = () => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(updateItemsPerPage, 150);
                };
                window.addEventListener('resize', resizeListener);
                return () => {
                    clearTimeout(timeoutId);
                    window.removeEventListener('resize', resizeListener);
                };
            }, []);


            // 計算陳列品過濾與分頁
            const displayData = useMemo(() => {
                let statusFiltered = displayItems.filter(item => item.status === displayFilter);

                // ✨ 依照使用者需求，加上按新增時間反向排序，讓最新掃入的商品排在最前面
                statusFiltered.reverse();

                if (displaySearch.trim()) {
                    const q = displaySearch.toLowerCase();
                    statusFiltered = statusFiltered.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
                }

                // 計算總覽用的分類群組 (未經下拉選單過濾)
                const groups = {};
                statusFiltered.forEach(item => {
                    const cat = determineCategory(item.name, settings.customCategories);
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                });
                const grouped = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));

                // 下拉選單過濾
                let finalFiltered = statusFiltered;
                if (activeDisplayCategory !== '全部') {
                    finalFiltered = statusFiltered.filter(item => {
                        const cat = determineCategory(item.name, settings.customCategories);
                        return cat === activeDisplayCategory;
                    });
                }
