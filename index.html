                // 👇 將原本寫死的常數，換成剛剛動態監聽的 itemsPerPage
                const totalPages = Math.max(1, Math.ceil(finalFiltered.length / itemsPerPage));

                // 避免縮放螢幕時，導致當前頁碼大於總頁數而破版
                const safeCurrentPage = Math.min(displayCurrentPage, totalPages);
                const paginated = finalFiltered.slice((safeCurrentPage - 1) * itemsPerPage, safeCurrentPage * itemsPerPage);

                return { filtered: finalFiltered, allFiltered: statusFiltered, grouped, paginated, totalPages, safeCurrentPage };
            }, [displayItems, displayFilter, displaySearch, activeDisplayCategory, displayCurrentPage, settings.customCategories, itemsPerPage]); // 👈 記得在結尾的陣列補上 itemsPerPage

            // 當切換篩選條件、搜尋或「改變螢幕大小」時，自動回到第一頁
            useEffect(() => { setDisplayCurrentPage(1); }, [displayFilter, displaySearch, activeDisplayCategory, itemsPerPage]);

            const toggleDisplayStatus = (id, currentStatus) => {
                const newStatus = currentStatus === 'displayed' ? 'stored' : 'displayed';
                const item = displayItems.find(i => i.id === id);
                if (item && item.quantity > 1) {
                    setListTransferModal({ item, targetStatus: newStatus, transferQty: item.quantity });
                } else if (item) {
                    executeListTransfer(item.id, newStatus, 1);
                }
            };

            const executeListTransfer = (id, targetStatus, transferQty) => {
                setDisplayItems(prev => {
                    let nextState = [...prev];
                    const sourceIdx = nextState.findIndex(i => i.id === id);
                    if (sourceIdx < 0) return prev;

                    const sourceItem = nextState[sourceIdx];
                    const actualTransferQty = Math.min(transferQty, sourceItem.quantity);
                    if (actualTransferQty <= 0) return prev;

                    // 扣除來源數量
                    sourceItem.quantity -= actualTransferQty;
                    if (sourceItem.quantity <= 0) {
                        nextState.splice(sourceIdx, 1);
                    } else {
                        nextState[sourceIdx] = { ...sourceItem };
                    }

                    // 加入目標數量
                    const targetIdx = nextState.findIndex(i => i.barcode === sourceItem.barcode && i.status === targetStatus);
                    if (targetIdx >= 0) {
                        nextState[targetIdx] = { ...nextState[targetIdx], quantity: nextState[targetIdx].quantity + actualTransferQty };
                    } else {
                        nextState.push({ id: Date.now() + Math.random(), barcode: sourceItem.barcode, name: sourceItem.name, quantity: actualTransferQty, status: targetStatus });
                    }

                    updateCloudData('displayItems', nextState, targetStatus === 'displayed' ? `✅ 已陳列 ${actualTransferQty} 件！` : `📦 已撤下 ${actualTransferQty} 件！`);
                    return nextState;
                });
                setListTransferModal(null);
            };

            const updateDisplayQuantity = (id, delta) => {
                setDisplayItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item);
                    updateCloudData('displayItems', newData);
                    return newData;
                });
            };
            const setDisplayItemQuantity = (id, newQty) => {
                const qty = Math.max(1, parseInt(newQty) || 1);
                setDisplayItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: qty } : item);
                    updateCloudData('displayItems', newData);
                    return newData;
                });
            };

            const removeDisplayItem = (id) => {
                setDisplayItems(prev => {
                    const item = prev.find(i => i.id === id);
                    const newData = prev.filter(i => i.id !== id);
                    if (item) triggerUndo(`已撤下陳列品：${item.name}`, () => {
                        setDisplayItems(current => {

                // 降冪排序
                surpluses.sort((a, b) => b.denom - a.denom);
                deficits.sort((a, b) => b.denom - a.denom);

                    if (!groups[d]) groups[d] = {};

                    if (!groups[d][s]) groups[d][s] = [];
                    groups[d][s].push(item);
                });

                // 將「到貨即售」等字眼排在最前面
                const sortedDates = Object.keys(groups).sort((a, b) => {
                    if (a.includes('到貨')) return -1;
                    if (b.includes('到貨')) return 1;
                    return a.localeCompare(b);
                });

                return sortedDates.map(date => ({

                    seriesGroups: Object.keys(groups[date]).map(series => ({

                    }))
                }));
            }, [announcementItems]);

            const parseAnnouncement = (text) => {
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                let currentSellDate = null;
                let currentDisplayDate = null;
                let currentDisplayTime = null; // ✨ 新增：儲存陳列時間 (如：閉店後)
                let globalNeedExhibition = false;
                let currentSeries = '其他';
                let isLineCard = false;
                const newItems = [];

                const extractAndPushItem = (name, index, lines, globalNeedExhibition, sellDate, displayDate, displayTime, series, newItems) => {
                    let itemNeedExhibition = globalNeedExhibition || lines[index].includes('陳列') || lines[index].includes('留存');
                    let restrictInfo = '';

                    let cleanName = name.replace(/\s*[\(（].*?[\)）]\s*$/, '').trim();
                    if (!cleanName) return;

                    for (let j = 1; j <= 2; j++) {
                        if (index + j < lines.length) {
                            const nextLine = lines[index + j];
                            if (nextLine.startsWith('👉') || nextLine.startsWith('·') || nextLine.startsWith('-') || nextLine.includes('---')) break;
                            if (nextLine.includes('限購') || nextLine.includes('單人')) {
                                restrictInfo = nextLine.replace(/^[\u{10000}-\u{10FFFF}\u{2000}-\u{2BFF}\(（]?[a-zA-Z\s]+[\)）]?/gu, '').trim();

                        displayDate,
                        displayTime, // ✨ 存入物件

                        series,
                        restrict: restrictInfo,
                        needExhibition: itemNeedExhibition,
                        isChecked: false
                    });

                for (let i = 0; i < lines.length; i++) {

                    if (dateMatch) {

                        // ✨ 偵測同列是否有「閉店後」或「XX:XX」時間格式

                const idxAmt = headers.indexOf('AMT_WITH_TAX');

                const idxDocNo = headers.indexOf('DOC_NO'); // ✨ 新增：抓取單號欄位

                let todaySales = 0, firstDate = null, storeName = '未知店鋪';

                let mega1000 = { amt: 0, qty: 0, giftQty: 0 }, mega400 = { amt: 0, qty: 0, giftQty: 0 };
                let itemStats = {}, updatedBarcodeMap = { ...settings.barcodeMap };
                let docDiscountMap = {}; // ✨ 新增：用來記錄每張單號的總折扣

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i]; if (row.length < 5) continue;
                    if (idxType !== -1 && !['sale', 'return', 'refund', 'exchange'].includes(String(row[idxType] || '').trim().toLowerCase())) continue;
                    const barcode = String(row[idxBarcode] || '').trim();

                    // ✨ 修改：將原本加總的 amt 替換為 originalAmt (原價)
                    if (rawDesc.includes('1000%') || desc.includes('1000%')) {
                        amt === 0 ? (mega1000.giftQty += qty) : (mega1000.qty += qty, mega1000.amt += originalAmt);

                    if (rawDesc.includes('400%') || desc.includes('400%')) {

            const handleFileUpload = (e) => {

                        catch (error) { showToast('讀取失敗，請確認檔案格式'); } finally { setIsProcessing(false); }
                    };
                    reader.readAsArrayBuffer(file);

            const handleBulkImport = () => {

                    if (cols.length >= 2 && cols[0]) {

                    { tags: ['MEGA熱銷'], text: `今天週${weekdayStr}有客人特地來詢問想要的 MEGA 款式，連續買了好幾隻都沒有抽到，雖然有點失望，但還是很有禮貌地來問能不能和店裡展示品交換，看到這樣的場景真的感受到大家對這系列有多喜愛。今日 MEGA 400% 共售出 ${mega400qty} 隻，表現不俗。\n\n盲盒方面「${top1.name}」今日佔比 ${top1Percent}%，成為今天的銷售冠軍，業績整體令人滿意。` },
                    { tags: ['MEGA熱銷', '大單出現'], text: `今天週${weekdayStr}出現了幾位專程來買 MEGA 的客人，今日共賣出 ${mega400qty} 隻 400%，直接帶走好幾隻，連旁邊的顧客都忍不住停下來看，現場氣氛非常嗨！光 MEGA 系列就為業績貢獻了相當可觀的金額。\n\n盲盒方面「${top1.name}」同樣表現出色，佔比 ${top1Percent}%，今天大單與盲盒雙雙發威，業績非常漂亮 🎉` },
                    { tags: ['大排長龍'], text: `今天週${weekdayStr}一開店門口就有客人在等候，主要都是衝著「${top1.name}」來的！一開賣現場氣氛非常熱烈，很多人就算沒抽到喜歡的款也繼續追，完全停不下來，這款售出 ${top1.quantity} 件，佔業績 ${top1Percent}%，集客力超強。\n\n「${top2.name}」承接了下午的人潮，銷售穩定，佔比 ${top2Percent}%，今天客流從早到晚沒有停過，業績相當豐收。` },
                    { tags: ['大排長龍', '上架秒殺'], text: `今天週${weekdayStr}一大早就開始大排長龍，客人一進來馬上直奔「${top1.name}」的陳列區，上架之後不到幾分鐘就幾乎掃光了，補完貨人潮還是沒有散，整日佔了業績 ${top1Percent}%，現場的熱鬧程度讓店員都跟著振奮起來！\n\n「${top2.name}」今天也有 ${top2Percent}% 的好表現，今天算是本週數一數二的好日子，整體業績令人滿意。` },
                    { tags: ['補貨熱銷'], text: `今天週${weekdayStr}補進了「${top1.name}」，一上架就迎來一波搶購，今日售出 ${top1.quantity} 件，佔業績 ${top1Percent}%，補到最後又快見底，後面陸續有客人來詢問還有沒有，可見這款商品的需求還是相當旺盛。\n\n「${top2.name}」今天反應同樣不錯，佔比 ${top2Percent}%，今天補貨節奏很順，能看到客人滿載而歸真的很有成就感。` },
                    { tags: ['補貨熱銷', '上架秒殺'], text: `近幾日許多客人都在詢問「${top1.name}」的補貨時間，今天一到貨就馬上有消息靈通的客人出現，一上架就幾乎被掃光，售出 ${top1.quantity} 件，業績佔比直衝 ${top1Percent}%，補一次清一次，熱度真的非常驚人。\n\n「${top2.name}」跟著受惠，今日同樣有 ${top2Percent}% 的好表現，整天店內不斷傳來抽到喜歡款的歡呼聲，氛圍超棒！` },
                    { tags: ['假日人潮', '天氣不佳'], text: `今天週${weekdayStr}天氣稍涼，但家長帶著小朋友來台茂逛街的人潮一點都不少，很多客人都詢問現場沒貨的商品，得知沒有庫存後還問陳列品能不能賣，看來客人對心儀的商品真的不善罷甘休。\n\n今天銷售第一名是「${top1.name}」，佔了整體業績 ${top1Percent}%，「${top2.name}」緊接其後，佔比 ${top2Percent}%，今天業績整體表現相當穩健。` },
                    { tags: ['假日人潮', '補貨熱銷'], text: `今天是週${weekdayStr}，許多家長帶著小朋友來台茂逛街。今天補進了「${top1.name}」，一上架馬上就吸引到親子客群搶購，大人小孩都圍在一起，現場歡樂的氣氛非常熱烈，這款今日佔業績 ${top1Percent}%。\n\n「${top2.name}」也在今天的假日氣氛帶動下有 ${top2Percent}% 的好表現，整體業績相當不錯！` },
                    { tags: ['上架秒殺', 'MEGA熱銷'], text: `今天週${weekdayStr}真的是雙喜臨門，「${top1.name}」一上架就直接秒殺，售出 ${top1.quantity} 件、佔比 ${top1Percent}%，根本沒有留給人猶豫的空間；同時 MEGA 400% 系列今日共賣出 ${mega400qty} 隻，很多客人買完大隻的還順手帶走一堆盲盒，消費力超強。\n\n「${top2.name}」在今天的強勢氛圍帶動下同樣有 ${top2Percent}% 的亮眼表現，整天買氣高漲，今天算是本月數一數二的好日子！` },
                    { tags: ['客人端盒', '假日人潮', '大單出現'], text: `今天是週${weekdayStr}，假日家庭客群特別多，現場不時傳來一家人一起開盒、抽到喜歡款的歡呼聲，氣氛非常熱鬧。其中還出現一位剛加入會員就消費了相當驚人金額的新客人，真的很開心我們的商品能吸引到他，成為今天的大客戶。\n\n今日銷售冠軍是「${top1.name}」，佔業績 ${top1Percent}%；第二名「${top2.name}」佔比 ${top2Percent}%，今天業績非常漂亮。` },
                    { tags: ['天氣不佳', '補貨熱銷', '客人端盒'], text: `今天週${weekdayStr}外面下著雨，不過完全擋不住大家衝來購物的熱情！「${top1.name}」一補進來馬上就有消息靈通的顧客出現，不少客人直接以中盒為單位下手，售出 ${top1.quantity} 件，業績佔比 ${top1Percent}%，雨天照樣搶購，讓人感動。\n\n「${top2.name}」今天也有不錯的表現，佔比 ${top2Percent}%，雖然天氣差讓客流少了一點，但今天進來的客人買氣都超強，帶來不俗的表現。` }
                ];
                const activeKeywords = Array.from(selectedKeywords);
                let availableTemplates;

                if (activeKeywords.length === 0) {
                    availableTemplates = templates;
                } else {
                    const exactMatch = templates.filter(t => activeKeywords.every(kw => t.tags.includes(kw)));
                    if (exactMatch.length > 0) {
                        availableTemplates = exactMatch;
                    } else {
                        availableTemplates = templates.filter(t => activeKeywords.some(kw => t.tags.includes(kw)));
                    }
                }

                if (availableTemplates.length === 0) { showToast('⚠️ 找不到符合此組合的範本，請換個關鍵字試試！'); return; }

                const randomIndex = Math.floor(Math.random() * availableTemplates.length);
                setStory(availableTemplates[randomIndex].text);
                showToast('✨ 小作文已生成！可再依現場情況微調。');
            };

            const reportContent = useMemo(() => {
                if (!selectedMonth) return '請先上傳檔案或建立紀錄...';
                let recordsToPrint = dailyRecords.filter(r => r.date.split('/')[0] === selectedMonth);
                if (todayStats && formatDateStr(todayStats.dateStr).split('/')[0] === selectedMonth && !recordsToPrint.find(r => r.date === formatDateStr(todayStats.dateStr))) {
                    recordsToPrint.push({ date: formatDateStr(todayStats.dateStr), weekday: getWeekday(todayStats.dateStr), sales: todayStats.sales, points: todayStats.points, bigToys: todayStats.bigToys });
                }
                if (recordsToPrint.length === 0 && !todayStats) return '此月份尚無紀錄...';
                recordsToPrint.sort((a, b) => a.date.localeCompare(b.date));
                const totalSales = recordsToPrint.reduce((sum, r) => sum + r.sales, 0);
                const totalPoints = recordsToPrint.reduce((sum, r) => sum + (r.points || 0), 0);
                const sumBigToy = (type, key) => recordsToPrint.reduce((sum, r) => sum + (r.bigToys?.[type]?.[key] || 0), 0);
                const achievement = settings.targetAmount > 0 ? ((totalSales / (settings.targetAmount * 10000)) * 100).toFixed(2) : '0.00';

                let report = `桃園台茂店 銷售日報（TWD）\n`;
                recordsToPrint.forEach(r => report += `${r.date}（${r.weekday}）$${formatMoney(r.sales)}\n`);
                report += `\nTotal: $${formatMoney(totalSales)}\n\n（點數兌換: $${formatMoney(totalPoints)})\n`;
                report += `（1000%：$${formatMoney(sumBigToy('1000', 'amt'))}， ${sumBigToy('1000', 'qty')}隻）\n`;
                report += `（400%：$${formatMoney(sumBigToy('400', 'amt'))}， ${sumBigToy('400', 'qty')}隻）\n\n`;
                report += `目標：${settings.targetAmount}萬\n達成率：${achievement}%\n\n銷售狀況分享：\n`;

                const isTodaySelected = todayStats && (formatDateStr(todayStats.dateStr).split('/')[0] === selectedMonth);
                if (isTodaySelected && todayStats.itemStats) {
                    const top5 = Object.values(todayStats.itemStats)
                        .filter(item => item.desc && item.desc.trim() !== '' && (item.top5Amt > 0 || item.top5Qty > 0))
                        .sort((a, b) => top5SortBy === 'qty' ? (b.top5Qty - a.top5Qty || b.top5Amt - a.top5Amt) : (b.top5Amt - a.top5Amt || b.top5Qty - a.top5Qty))
                        .slice(0, 5);
                    if (top5.length > 0) { top5.forEach((item, idx) => { report += `${idx + 1}. ${item.desc}\n`; }); }
                    else { report += `(今日無銷售商品可產生 Top 5)\n`; }
                } else { report += `(請上傳該日資料以產生 Top 5)\n`; }

                report += `\n（2）新品分享\n`;
                if (settings.newBarcodes.length > 0) {
                    settings.newBarcodes.forEach(barcode => {
                        const itemData = isTodaySelected ? todayStats?.itemStats?.[barcode] : null;
                        let dictName = findNameInDict(barcode, settings.customNameMap);
                        const desc = dictName || settings.barcodeMap?.[barcode] || barcode;
                        const boxSize = settings.boxSizeMap[barcode] || 6;
                        if (itemData && (itemData.singles > 0 || itemData.boxes > 0)) {
                            let qtyStr = boxSize === 1 ? `${(itemData.boxes * boxSize) + itemData.singles}` : (itemData.singles > 0 && itemData.boxes > 0 ? `散盒 ${itemData.singles} 端盒 ${itemData.boxes}` : (itemData.boxes > 0 ? `端盒 ${itemData.boxes}` : `散盒 ${itemData.singles}`));
                            report += `${desc}➡️${qtyStr}\n`;
                        } else report += `${desc}➡️0\n`;
                    });
                } else report += `(尚未設定任何新品條碼)\n`;
                report += `\n(3）${story || '請輸入今日的小作文...'}`;
                return report;
            }, [dailyRecords, todayStats, settings, story, currentStore, selectedMonth]);

            const currentMonthRecords = useMemo(() => dailyRecords.filter(r => r.date.split('/')[0] === selectedMonth).sort((a, b) => b.date.localeCompare(a.date)), [dailyRecords, selectedMonth]);
            const visibleRecords = currentMonthRecords;

            useEffect(() => {
                if (!isQRCodeModalOpen || !reportContent) return;
                setQrDataUrl(''); setQrError('');
                if (typeof window.QRious === 'undefined') { setQrError('⚠️ 條碼模組載入失敗，請檢查網路狀態。'); return; }
                try {
                    const utf8Content = unescape(encodeURIComponent(reportContent));
                    const qr = new window.QRious({ value: utf8Content, size: 350, level: 'L', background: 'white', foreground: '#000000' });
                    const dataUrl = qr.toDataURL();
                    if (dataUrl && dataUrl.length > 100) setQrDataUrl(dataUrl); else throw new Error("圖片異常");
                } catch (err) { setQrError('⚠️ 條碼轉換失敗，報表文字可能包含無法解析的特殊字元，建議改用「複製」按鈕。'); }
            }, [reportContent, isQRCodeModalOpen]);

            const [scannerOpen, setScannerOpen] = useState(false);
            const [scannerTarget, setScannerTarget] = useState('');
            const [dictSearch, setDictSearch] = useState('');
            const [isDictExpanded, setIsDictExpanded] = useState(true);
            const [isCategoryExpanded, setIsCategoryExpanded] = useState(false);
            const [dictCurrentPage, setDictCurrentPage] = useState(1);

            const scanLockRef = useRef(false);
            const latestStateRef = useRef({});
            latestStateRef.current = { settings, displayFilter };

            useEffect(() => {
                if (!scannerOpen) { scanLockRef.current = false; return; }
                const html5QrCode = new window.Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 120 } },
                    (decodedText) => {
                        if (scanLockRef.current) return;
                        scanLockRef.current = true;
                        if (typeof navigator.vibrate === 'function') navigator.vibrate(100);
                        html5QrCode.stop().then(() => {
                            setScannerOpen(false);
                            const barcode = decodedText.replace(/[^a-zA-Z0-9-]/g, '').trim();
                            const currentSettings = latestStateRef.current.settings;
                            let dictName = findNameInDict(barcode, currentSettings.customNameMap);
                            const productName = dictName || currentSettings.barcodeMap[barcode] || `未知商品 (${barcode})`;

                            handleUnifiedSubmit(scannerTarget, [{ barcode, name: productName }]);
                        }).catch(() => { setScannerOpen(false); });
                    },
                    (error) => { }
                ).catch(err => { showToast('⚠️ 無法啟動相機，請確認瀏覽器權限'); setScannerOpen(false); });
                return () => { if (html5QrCode.isScanning) html5QrCode.stop().catch(console.error); };
            }, [scannerOpen, scannerTarget]);

            // ✨ 陳列品盤點總覽資料集 (合併應有數量與實際數量，並進行差異比對)
            const overviewItems = useMemo(() => {
                const map = new Map();

                // 1. 建立應有數量 (Base = systemExhibitionItems)
                systemExhibitionItems.forEach(sysItem => {
                    map.set(sysItem.barcode, {
                        id: sysItem.id, // 基底 ID，如果在 displayItems 找不到，也能有 ID
                        barcode: sysItem.barcode,
                        name: sysItem.name,
                        expected: sysItem.expectedQuantity,
                        actual: 0,
                        stored: 0,
                        displayed: 0
                    });
                });

                // 2. 疊加實際門市數量 (陳列中 + 已撤下)
                displayItems.forEach(item => {
                    if (!map.has(item.barcode)) {
                        map.set(item.barcode, {
                            id: item.id,
                            barcode: item.barcode,
                            name: item.name,
                            expected: 0,
                            actual: 0,
                            stored: 0,
                            displayed: 0
                        });
                    }
                    const obj = map.get(item.barcode);
                    obj.actual += item.quantity;
                    if (item.status === 'stored') obj.stored += item.quantity;
                    if (item.status === 'displayed') obj.displayed += item.quantity;
                    // 若有顯示名稱，可選擇更新為最新的顯示名稱
                    if (item.name) obj.name = item.name;
                });

                // 3. 計算 Badge 狀態，4種狀態
                let items = Array.from(map.values()).map(item => {
                    let matchingStatus = 'match';
                    if (item.actual === 0 && item.expected > 0) matchingStatus = 'missing';   // 🔴 未尋獲
                    else if (item.actual < item.expected) matchingStatus = 'shortage';        // 🟡 短缺
                    else if (item.actual > item.expected) matchingStatus = 'surplus';         // 🔵 溢出
                    // 否則為 🟢 吻合 (match)

                    return { ...item, matchingStatus };
                });

                // 4. 重點排序：有差異的放前面 (missing -> shortage -> surplus -> match)
                const statusWeight = { missing: 1, shortage: 2, surplus: 3, match: 4 };
                items.sort((a, b) => statusWeight[a.matchingStatus] - statusWeight[b.matchingStatus] || (a.name || '').localeCompare(b.name || ''));

                return items;
            }, [systemExhibitionItems, displayItems]);

            const overviewData = useMemo(() => {
                const searchLower = displaySearch.toLowerCase();
                const filtered = overviewItems.filter(item => {
                    const matchSearch = !displaySearch || (item.name || '').toLowerCase().includes(searchLower) || (item.barcode || '').toLowerCase().includes(searchLower);
                    const matchStatus = displayOverviewStatus === 'all' || item.matchingStatus === displayOverviewStatus;
                    return matchSearch && matchStatus;
                });
                const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));
                const safeCurrentPage = Math.min(overviewCurrentPage, totalPages);
                const paginated = filtered.slice((safeCurrentPage - 1) * itemsPerPage, safeCurrentPage * itemsPerPage);
                return { paginated, totalPages, safeCurrentPage, filteredCount: filtered.length };
            }, [overviewItems, overviewCurrentPage, itemsPerPage, displaySearch, displayOverviewStatus]);

            useEffect(() => { setOverviewCurrentPage(1); }, [itemsPerPage, displaySearch, displayOverviewStatus]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!emailInput || !passwordInput) return showToast('請填寫帳號與密碼');
                setAuthError('');
                auth.signInWithEmailAndPassword(emailInput, passwordInput)
                    .then(() => showToast('✅ 登入成功！'))
                    .catch(() => { setAuthError('帳號或密碼錯誤'); setPasscodeError(true); setTimeout(() => setPasscodeError(false), 500); });
            };

            const handleLogout = () => { auth.signOut().then(() => showToast('👋 已登出系統')); };

            if (authLoading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white"><i className="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-6 transition-colors duration-300 no-print">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="absolute top-6 right-6 w-12 h-12 rounded-full flex items-center justify-center bg-white dark:bg-slate-800 text-amber-500 shadow-sm hover:scale-110 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'} text-xl`}></i></button>
                        <div className={`w-full max-w-sm bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col items-center ${passcodeError ? 'animate-shake' : 'animate-scale-in'}`}>
                            <div className="w-20 h-20 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-3xl flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-shield-halved text-4xl"></i></div>
                            <h1 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">P-ops 懶人系統</h1>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-8 text-center">請輸入帳號密碼登入</p>
                            <form onSubmit={handleLogin} className="w-full flex flex-col gap-4">
                                <div className="relative"><i className="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} placeholder="員工 Email" className="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white font-medium transition-colors" /></div>
                                <div className="relative"><i className="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="密碼" className={`w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white font-medium transition-colors ${authError ? 'border-red-500 focus:ring-red-500' : 'border-slate-200 dark:border-slate-700'}`} /></div>
                                {authError && <p className="text-red-500 text-sm font-bold text-center">{authError}</p>}
                                <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/30 transition-all active:scale-95 mt-2">安全登入</button>
                            </form>
                        </div>
                        {toast && <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[60] bg-rose-500 text-white px-6 py-2 rounded-full shadow-lg font-bold animate-slide-up-fade">{toast}</div>}
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen w-full font-sans overflow-x-clip">

                    {user && !isDataReady && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center transition-all">
                            <div className="bg-white dark:bg-slate-800 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-scale-in border border-slate-200 dark:border-slate-700">
                                <i className="fa-solid fa-circle-notch fa-spin text-2xl text-blue-500"></i>
                                <div>
                                    <div className="font-bold text-slate-800 dark:text-slate-100 text-sm">正在安全同步雲端資料...</div>

                                                </div>
                                            </div>
                                            {isBulkImportOpen && (

                                                                </div>
                                                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm text-slate-500 dark:text-slate-400 mt-3">
                                                                    <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">

                                                                        <span className="font-medium text-slate-700 dark:text-slate-200">${formatMoney(record.points || 0)}</span>
                                                                    </div>
                                                                    <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">

                                                                        <span className="font-medium text-slate-700 dark:text-slate-200">{record.bigToys?.['400']?.qty || 0}隻 / ${formatMoney(record.bigToys?.['400']?.amt || 0)}</span>
                                                                    </div>
                                                                    <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                                                        <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">1000% MEGA</span>
                                                                        <span className="font-medium text-slate-700 dark:text-slate-200">{record.bigToys?.['1000']?.qty || 0}隻 / ${formatMoney(record.bigToys?.['1000']?.amt || 0)}</span>

                                                                </div>
                                                            </div>

                                                        </div>
                                                    ))}
                                                </div>

                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">

                                                        <BarcodeScannerInput

                                                            placeholder="掃描或搜尋新品名稱..."

                                                            onSubmit={(items) => {
                                                                let newSettings = { ...settings, newBarcodes: [...settings.newBarcodes], boxSizeMap: { ...settings.boxSizeMap } };
                                                                let hasChanges = false;
                                                                items.forEach(item => {
                                                                    if (!newSettings.newBarcodes.includes(item.barcode)) {
                                                                        newSettings.newBarcodes.push(item.barcode);
                                                                        newSettings.boxSizeMap[item.barcode] = newBoxSize || 6;
                                                                        hasChanges = true;
                                                                    }
                                                                });
                                                                if (hasChanges) {
                                                                    updateCloudData('settings', newSettings);
                                                                    setNewBoxSize(6);
                                                                }
                                                            }}
                                                            onOpenCamera={handleOpenCamera}
                                                            allDictEntries={allDictEntries}
                                                            settings={settings}

                                                                <button onClick={() => removeBarcode(code)} className="absolute top-2 right-2 w-6 h-6 rounded flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all shrink-0 focus:outline-none">
                                                                    <i className="fa-solid fa-xmark text-sm"></i>
                                                                </button>

                                                                </div>

                                                                                if (typeof updateCloudData === 'function') {

                                                                                        boxSizeMap: { ...settings.boxSizeMap, [code]: newSize }

                                                        onClick={handleAutoGenerateStory}

                                                            情境關鍵字（可複選，組合出更精準的範本）

                                                        {selectedKeywords.size > 0 && (
                                                            <button
                                                                type="button"
                                                                onClick={() => setSelectedKeywords(new Set())}
                                                                className="text-xs text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1"
                                                            >
                                                                <i className="fa-solid fa-xmark"></i> 清除選擇
                                                            </button>
                                                        )}

                                                                'bg-slate-400 text-white',

                                                                        <div className="text-sm font-black text-slate-800 dark:text-slate-100">${item.sales.toLocaleString()}</div>

                                                                        setCashCounts(prev => ({ ...prev, [denom]: Math.max(0, val) }));
                                                                    }}
                                                                    onFocus={(e) => e.target.select()}

                                                                    placeholder="0"
                                                                />
                                                                <div className="absolute right-4 text-xs font-bold text-slate-400 pointer-events-none select-none">
                                                                    {denom >= 100 ? '張' : '枚'}
                                                                </div>
                                                            </div>

                                                            {/* 手機版顯示向下的箭頭或小等號，電腦版維持置中等號 */}

                                                                <i className="fa-solid fa-equals sm:hidden text-slate-200 dark:text-slate-700"></i>

                                                            </div>

                                                                <span className="absolute left-4 font-bold text-sm pointer-events-none select-none text-slate-400">$</span>
                                                                <input
                                                                    type="number" min="0"
                                                                    value={cashAmtRaw[denom] !== undefined ? cashAmtRaw[denom] : ((cashCounts[denom] || 0) * denom) || ''}
                                                                    onChange={(e) => {
                                                                        const valRaw = e.target.value;
                                                                        setCashAmtRaw(prev => ({ ...prev, [denom]: valRaw }));
                                                                        const val = parseInt(valRaw) || 0;
                                                                        if (val % denom === 0 || valRaw === '') {
                                                                            setCashCounts(prev => ({ ...prev, [denom]: Math.max(0, Math.floor(val / denom)) }));
                                                                            if (val % denom === 0) {
                                                                                setCashAmtRaw(prev => { const n = { ...prev }; delete n[denom]; return n; });
                                                                            }
                                                                        }
                                                                    }}
                                                                    onBlur={() => {
                                                                        if (cashAmtRaw[denom] !== undefined) {
                                                                            const val = parseInt(cashAmtRaw[denom]) || 0;
                                                                            setCashCounts(prev => ({ ...prev, [denom]: Math.max(0, Math.floor(val / denom)) }));
                                                                            setCashAmtRaw(prev => { const n = { ...prev }; delete n[denom]; return n; });
                                                                        }
                                                                    }}
                                                                    onFocus={(e) => e.target.select()}
                                                                    className="w-full h-10 bg-transparent text-right pr-4 pl-8 font-bold text-base outline-none hide-arrows text-slate-700 dark:text-slate-200"
                                                                    placeholder="0"
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* 右側：帳務總覽 */}
                                        <div className="lg:col-span-4 bg-slate-50 dark:bg-slate-800 rounded-[24px] shadow-sm border border-slate-200 dark:border-slate-700/50 p-6 md:p-8 transition-colors lg:sticky lg:top-8">

                                            <div className="flex items-center gap-3 mb-8">
                                                <div className="w-10 h-10 rounded-xl bg-blue-100 text-blue-600 dark:bg-blue-500/20 flex items-center justify-center shadow-sm">
                                                    <i className="fa-solid fa-calculator text-lg"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-slate-800 dark:text-slate-100 text-lg leading-tight">帳務總覽</h4>
                                                </div>
                                            </div>

                                            {/* 強調版：預設零用金區塊 (藍色圓角底色 + 置左) */}
                                            <div className="mb-6 p-4 md:p-5 bg-blue-50 dark:bg-blue-500/10 rounded-2xl border border-blue-100 dark:border-blue-500/20 shadow-sm flex flex-col gap-3">
                                                <span className="text-sm font-bold text-blue-700 dark:text-blue-400 flex items-center gap-2">
                                                    <i className="fa-solid fa-piggy-bank"></i> 預設零用金基準
                                                </span>
                                                <div className="relative flex items-center bg-white dark:bg-slate-800 rounded-xl px-4 py-2.5 w-full shadow-sm border border-transparent focus-within:border-blue-300 dark:focus-within:border-blue-500 transition-colors">                                                    <span className="text-blue-400 dark:text-blue-500 font-bold text-lg pointer-events-none mr-1.5">$</span>
                                                    <input
                                                        type="number"
                                                        value={pettyCashTarget}
                                                        onChange={(e) => setPettyCashTarget(Number(e.target.value) || 0)}
                                                        className="w-full bg-transparent text-left text-xl font-black text-blue-700 dark:text-blue-400 outline-none hide-arrows"
                                                    />
                                                </div>
                                            </div>

                                            {/* 面額清點小計 */}
                                            {denominations.filter(d => cashCounts[d] > 0).length > 0 && (
                                                <div className="space-y-2 mb-6 px-1">
                                                    {denominations.filter(d => cashCounts[d] > 0).map(denom => (
                                                        <div key={`sum-${denom}`} className="flex justify-between items-center text-sm">
                                                            <span className="text-slate-500 dark:text-slate-400 font-bold">${denom} x {cashCounts[denom]}</span>
                                                            <span className="font-bold text-slate-700 dark:text-slate-200">${formatMoney(denom * cashCounts[denom])}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            <div className="border-t border-slate-200 dark:border-slate-700 my-6"></div>

                                            <div className="mb-6 bg-white dark:bg-slate-900 rounded-2xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                                                <div className="text-sm font-bold text-slate-500 dark:text-slate-400 mb-1">零用金</div>
                                                <div className="text-4xl font-black text-left text-slate-800 dark:text-white tracking-tight mb-5">
                                                    ${formatMoney(currentTotalCash)}
                                                </div>

                                                <div className="border-t border-slate-100 dark:border-slate-700 pt-4">
                                                    <div className="text-xs font-bold text-slate-400 mb-1">帳務差異</div>
                                                    <div className={`text-xl font-black tracking-tight flex items-center gap-2 ${cashDifference === 0 ? 'text-slate-400' : cashDifference > 0 ? 'text-blue-600' : 'text-rose-600'}`}>
                                                        {cashDifference === 0 ? <i className="fa-solid fa-check"></i> : cashDifference > 0 ? <i className="fa-solid fa-arrow-trend-up"></i> : <i className="fa-solid fa-arrow-trend-down"></i>}
                                                        {cashDifference === 0 ? '無差異' : `${cashDifference > 0 ? '多了' : '少了'} ${cashDifference > 0 ? '+' : ''}${formatMoney(cashDifference)}`}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 換鈔建議區塊 (移除「拿幾包」的精簡版) */}
                                            {(changeSuggestions.deficits.length > 0 || changeSuggestions.surpluses.length > 0) && (
                                                <div className="mt-6 pt-6 border-t border-slate-200 dark:border-slate-700">

                                                    {changeSuggestions.deficits.length > 0 && (
                                                        <div className="mb-5 bg-emerald-50 dark:bg-emerald-500/10 rounded-2xl p-5 border border-emerald-100 dark:border-emerald-500/20">
                                                            <div className="flex justify-between items-center mb-4">
                                                                <h5 className="font-bold text-emerald-700 dark:text-emerald-500 text-sm flex items-center gap-2">
                                                                    <i className="fa-solid fa-arrow-right-to-bracket"></i>要換入的面額
                                                                </h5>
                                                                <div className="text-xs font-black bg-emerald-500 text-white px-2.5 py-1 rounded-md">需 ${formatMoney(changeSuggestions.totalNeeded)}</div>
                                                            </div>
                                                            <div className="space-y-3">
                                                                {changeSuggestions.deficits.map((s, idx) => (
                                                                    <div key={`def-${idx}`} className="flex justify-between items-center text-sm border-b border-emerald-100/50 dark:border-emerald-800/30 pb-2.5 last:border-0 last:pb-0">
                                                                        <span className="text-emerald-900/70 dark:text-emerald-100/60 font-bold">${s.denom} 面額</span>
                                                                        <div className="font-mono text-emerald-600 dark:text-emerald-400 font-bold">
                                                                            <span className="mr-2">+{s.qty} {s.denom >= 50 ? '張' : '個'}</span>
                                                                            =${formatMoney(s.amt)}
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                    {changeSuggestions.surpluses.length > 0 && (
                                                        <div className="bg-amber-50 dark:bg-amber-500/10 rounded-2xl p-5 border border-amber-200 dark:border-amber-500/20">

                                                                    <i className="fa-solid fa-arrow-right-from-bracket"></i>可換出面額
                                                                </h5>
                                                                <div className="text-xs font-black bg-amber-500 text-white px-2.5 py-1 rounded-md">共 ${formatMoney(changeSuggestions.totalSurplus)}</div>

                                                            <div className="space-y-3">
                                                                {changeSuggestions.surpluses.map((s, idx) => (

                                                                        <div className="font-mono text-amber-600 dark:text-amber-400 font-bold">
                                                                            <span className="mr-2">拿 {s.qty} {s.denom >= 50 ? '張' : '個'}</span>

                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                        </div>
                                    </div>
                                </div>
                            )}

                                                </div>
                                                <div className="flex flex-col gap-4 mt-4">
                                                    <button onClick={handleExportData} className="group flex items-center w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-600 transition-all text-left overflow-hidden active:scale-[0.98]">
                                                        <div className="w-12 h-12 flex items-center justify-center rounded-xl bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 group-hover:scale-110 transition-transform shrink-0">
                                                            <i className="fa-solid fa-cloud-arrow-up text-xl"></i>
                                                        </div>
                                                        <div className="flex flex-col ml-4 flex-1 min-w-0">
                                                            <h4 className="text-base font-bold text-slate-800 dark:text-slate-100 truncate">備份資料</h4>
                                                            <div className="text-xs text-slate-500 dark:text-slate-400 mt-1 truncate">狀態: {dbStatus.includes('目前為最新') ? '最新備份' : '建議備份'}</div>
                                                        </div>
                                                    </button>

                                                    <label className="group flex items-center w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-500 transition-all text-left overflow-hidden cursor-pointer active:scale-[0.98]">
                                                        <input type="file" className="hidden" accept=".json" onChange={handleImportData} />
                                                        <div className="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 group-hover:scale-110 transition-transform shrink-0">
                                                            <i className="fa-solid fa-clock-rotate-left text-xl"></i>
                                                        </div>
                                                        <div className="flex flex-col ml-4 flex-1 min-w-0">
                                                            <h4 className="text-base font-bold text-slate-800 dark:text-slate-100 truncate">本地還原</h4>
                                                            <div className="text-xs text-slate-500 dark:text-slate-400 mt-1 truncate">支援 .json 格式</div>
                                                        </div>
                                                    </label>
                                                </div>
                                            </div>

                                            {/* 自動分類規則卡片 */}
                                            <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors flex flex-col min-w-0">
                                                <div className={`flex flex-col sm:flex-row items-start sm:items-center justify-between cursor-pointer group transition-all gap-4 ${isCategoryExpanded ? 'mb-5 border-b border-slate-100 dark:border-slate-700 pb-5' : ''}`} onClick={() => setIsCategoryExpanded(!isCategoryExpanded)}>
                                                    <div className="flex items-center gap-4 min-w-0">
                                                        <div className="w-12 h-12 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform"><i className="fa-solid fa-layer-group text-xl"></i></div>
                                                        <div className="flex flex-col min-w-0">
                                                            <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 tracking-tight truncate">自動分類規則</h3>

                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3 self-end sm:self-auto shrink-0">
                                                        <span className="bg-blue-50 text-blue-600 dark:bg-blue-500/10 dark:text-blue-400 px-3 py-1 rounded-xl text-sm font-bold shadow-sm whitespace-nowrap inline-flex items-center justify-center min-w-[70px]">共 {settings.customCategories.length} 筆</span>
                                                        <div className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-400 group-hover:bg-slate-200 dark:group-hover:bg-slate-600 transition-colors"><i className={`fa-solid fa-chevron-${isCategoryExpanded ? 'up' : 'down'} transition-transform duration-300`}></i></div>
                                                    </div>

                                                        <div className="flex flex-col sm:flex-row gap-2 mb-4 bg-blue-50/50 dark:bg-blue-500/10 p-3 rounded-2xl border border-blue-100 dark:border-blue-500/20 w-full">
                                                            <input type="text" className="w-full sm:w-1/4 px-3 py-2 border border-white dark:border-slate-700 rounded-xl outline-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 text-sm shadow-sm" placeholder="分類名稱" value={newCatName} onChange={(e) => setNewCatName(e.target.value)} />
                                                            <input type="text" className="flex-1 px-3 py-2 border border-white dark:border-slate-700 rounded-xl outline-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 text-sm shadow-sm min-w-0" placeholder="關鍵字 (半形逗號 , 分隔)" value={newCatKeys} onChange={(e) => setNewCatKeys(e.target.value)} />
                                                            <button onClick={handleAddCategory} className="px-5 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-600 shadow-sm text-sm font-bold flex items-center justify-center transition-colors shrink-0"><i className="fa-solid fa-plus sm:mr-1.5 text-xs"></i><span className="hidden sm:inline">新增</span></button>
                                                        </div>
                                                        <div className="space-y-2 max-h-[250px] overflow-y-auto custom-scrollbar pr-1 min-w-0">
                                                            {settings.customCategories.map(cat => (
                                                                <EditableCategoryItem key={cat.id} cat={cat}
                                                                    onSave={(id, newName, newKeywords) => { const updatedCategories = settings.customCategories.map(c => c.id === id ? { ...c, name: newName, keywords: newKeywords } : c); updateCloudData('settings', { ...settings, customCategories: updatedCategories }, `已更新分類：${newName}`); }}
                                                                    onDelete={(id) => { const catToDelete = settings.customCategories.find(c => c.id === id); const newCategories = settings.customCategories.filter(c => c.id !== id); updateCloudData('settings', { ...settings, customCategories: newCategories }); if (catToDelete) triggerUndo(`已刪除分類規則：${catToDelete.name}`, () => { updateCloudData('settings', { ...settings, customCategories: [...newCategories, catToDelete] }); }); }}
                                                                />
                                                            ))}
                                                            {settings.customCategories.length === 0 && (
                                                                <div className="text-center py-6 text-slate-400 text-sm font-medium border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl">目前尚未設定任何分類規則</div>
                                                            )}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* 右上角：批量匯入 */}
                                        <div className="lg:col-span-8 flex flex-col gap-6 w-full min-w-0">

                                            {/* 批量匯入卡片 */}
                                            <div className="bg-teal-50/40 dark:bg-teal-900/10 p-6 rounded-3xl border border-teal-100/60 dark:border-teal-500/20 shadow-sm flex-1 h-full flex flex-col min-w-0">
                                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                                                    <label className="text-lg font-bold text-teal-800 dark:text-teal-400 flex items-center shrink-0">
                                                        <i className="fa-solid fa-paste mr-2"></i>匯入條碼商品庫 (覆寫/新增)

                                                        <i className={`fa-solid ${isProcessing ? 'fa-spinner fa-spin' : 'fa-file-excel'} mr-2`}></i> {isProcessing ? '處理中...' : '匯入 Excel (.xlsx)'}
                                                        <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleImportExcelDict} disabled={isProcessing} />
                                                    </label>
                                                </div>
                                                <p className="text-sm text-slate-500 dark:text-slate-400 mb-4 leading-relaxed">請貼上文字內容，格式需為：<br /><strong className="text-teal-600 dark:text-teal-500">「條碼 品名」</strong>，或直接點擊上方按鈕匯入 Excel 檔案。</p>
                                                <textarea className="w-full flex-1 px-4 py-4 border border-teal-200/50 dark:border-teal-500/30 rounded-xl outline-none min-h-[120px] text-sm font-mono whitespace-pre dark:bg-slate-900/80 dark:text-slate-200 focus:ring-2 focus:ring-teal-500/50 transition-shadow resize-none" placeholder={`6941313089877\tDIMOO 隱藏版\n6941313071988\tSKULLPANDA 盒玩...`} value={dictInput} onChange={(e) => setDictInput(e.target.value)}></textarea>
                                                <div className="flex flex-wrap justify-end mt-4 gap-3">
                                                    <button onClick={() => { const backupMap = { ...settings.customNameMap }; updateCloudData('settings', { ...settings, customNameMap: {} }); setDictCurrentPage(1); triggerUndo('已清空翻譯條碼商品', () => { updateCloudData('settings', { ...settings, customNameMap: backupMap }); }); }} className="px-5 py-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-bold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm flex-1 sm:flex-none">清空條碼庫</button>
                                                    <button onClick={handleImportDict} className="flex-1 sm:flex-none px-6 py-2.5 bg-teal-500 text-white text-sm font-bold rounded-xl hover:bg-teal-600 shadow-lg shadow-teal-500/20 transition-all active:scale-95 flex items-center justify-center"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 同步至雲端</button>
                                                </div>
                                            </div>

                                        </div>
                                    </div>

                                    {/* 中下方：商品條碼庫管理 */}
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors w-full min-w-0 flex flex-col">

                                        {/* 標題與操作列 */}
                                        <div className={`flex flex-col lg:flex-row lg:items-center justify-between group transition-all gap-4 ${isDictExpanded ? 'mb-5 border-b border-slate-100 dark:border-slate-700 pb-5' : ''}`}>
                                            <div className="flex items-center gap-4 min-w-0 cursor-pointer w-full lg:w-auto" onClick={() => setIsDictExpanded(!isDictExpanded)}>
                                                <div className="w-12 h-12 bg-teal-50 dark:bg-teal-500/20 text-teal-600 dark:text-teal-400 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform"><i className="fa-solid fa-book-open text-xl"></i></div>
                                                <div className="flex flex-col min-w-0 flex-1">
                                                    <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 tracking-tight truncate">商品條碼庫管理</h3>
                                                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-1 hidden sm:block truncate">包含被收編的未知商品與手動建立的對應資料。</p>
                                                </div>
                                                <div className="lg:hidden w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 dark:bg-slate-700 text-slate-400 transition-colors shrink-0"><i className={`fa-solid fa-chevron-${isDictExpanded ? 'up' : 'down'} transition-transform duration-300`}></i></div>
