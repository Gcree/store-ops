<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="P-ops">
    <title>P-ops 懶人系統</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
    <link rel="preconnect" href="https://securetoken.googleapis.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                fontFamily: {
                    sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace'],
                },
                extend: {
                    transitionTimingFunction: {
                        DEFAULT: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                        'spring': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                    },
                    fontSize: {
                        'xs': ['12px', { lineHeight: '16px', letterSpacing: '0em' }],
                        'sm': ['14px', { lineHeight: '18px', letterSpacing: '-0.006em' }],
                        'base': ['17px', { lineHeight: '22px', letterSpacing: '-0.022em' }],
                        'lg': ['19px', { lineHeight: '24px', letterSpacing: '-0.021em' }],
                        'xl': ['20px', { lineHeight: '25px', letterSpacing: '-0.022em' }],
                        '2xl': ['22px', { lineHeight: '28px', letterSpacing: '-0.026em' }],
                        '3xl': ['28px', { lineHeight: '34px', letterSpacing: '-0.038em' }],
                        '4xl': ['34px', { lineHeight: '41px', letterSpacing: '-0.041em' }],
                    },
                    animation: {
                        'shrink-x': 'shrinkX 5s linear forwards',
                        'slide-up-fade': 'slideUpFade 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'scale-in': 'scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shrinkX: { '0%': { width: '100%' }, '100%': { width: '0%' } },
                        slideUpFade: { '0%': { transform: 'translate(-50%, 100%)', opacity: 0 }, '100%': { transform: 'translate(-50%, 0)', opacity: 1 } },
                        scaleIn: { '0%': { transform: 'scale(0.8)', opacity: 0 }, '100%': { transform: 'scale(1)', opacity: 1 } },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>


</head>

<body
    class="antialiased text-base bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDzqfgGPpbiXFO7DJVG-GIn1MKnDEVtSHw",
            authDomain: "retail-ops-90129.firebaseapp.com",
            projectId: "retail-ops-90129",
            storageBucket: "retail-ops-90129.firebasestorage.app",
            messagingSenderId: "123533342597",
            appId: "1:123533342597:web:b75e0f8100f9381cfff6ec",
            measurementId: "G-F6PTTYE35G"
        };

        if (typeof window.firebase !== 'undefined' && !window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
            window.firebase.firestore().enablePersistence({ synchronizeTabs: true })
                .catch(function (err) { console.warn("快取啟用失敗:", err.code); });
        }
        const db = window.firebase ? window.firebase.firestore() : null;
        const auth = window.firebase ? window.firebase.auth() : null;

        const defaultCategories = [
            { id: 1, name: '✨ 星星人系列', keywords: '星星人' },
            { id: 2, name: '🧸 模型/盲盒', keywords: '公仔,一番賞,盲盒' },
            { id: 3, name: '🃏 卡牌遊戲', keywords: '卡牌' },
            { id: 4, name: '☁️ 絨毛玩具', keywords: '娃娃,絨毛,毛絨' }
        ];

        const defaultSettings = { targetAmount: 1150, newBarcodes: [], barcodeMap: {}, customNameMap: {}, boxSizeMap: {}, customCategories: defaultCategories };

        const { useState, useEffect, useMemo, useRef } = React;

        const parseCSV = (text) => {
            const lines = text.split('\n'); const result = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim(); if (!line) continue;
                const row = []; let insideQuotes = false, value = '';
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') insideQuotes = !insideQuotes;
                    else if (char === ',' && !insideQuotes) { row.push(value.trim()); value = ''; }
                    else value += char;
                }
                row.push(value.trim()); result.push(row);
            }
            return result;
        };

        const formatMoney = (num) => new Intl.NumberFormat('en-US').format(Math.round(num));
        const getWeekday = (dateStr) => ['日', '一', '二', '三', '四', '五', '六'][new Date(dateStr).getDay()];
        const formatDateStr = (dateStr) => {
            const date = new Date(dateStr);
            return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
        };
        const determineCategory = (productName, categories) => {
            const lowerProductName = (productName || '').toLowerCase();
            for (let cat of categories) {
                const keywords = cat.keywords.split(',').map(k => k.trim().toLowerCase()).filter(k => k);
                if (keywords.some(k => lowerProductName.includes(k))) return cat.name;
            }
            return '📦 其他 IP';
        };

        const findNameInDict = (barcode, dict) => {
            if (!barcode || !dict) return null;
            const safeBarcode = String(barcode).trim();
            if (dict[safeBarcode]) return dict[safeBarcode];
            const stripped = safeBarcode.replace(/^0+/, '');
            const key = Object.keys(dict).find(k => String(k).trim().replace(/^0+/, '') === stripped);
            return key ? dict[key] : null;
        };

        function BarcodeImage({ value, name, printMode = false, mini = false, hideName = false, quantity = 1 }) {
            const svgRef = useRef(null);

            useEffect(() => {
                if (svgRef.current && value && typeof window.JsBarcode !== 'undefined') {
                    try {
                        const barHeight = printMode ? 45 : (mini ? 30 : 60);
                        window.JsBarcode(svgRef.current, value, {
                            format: "CODE128",
                            width: mini ? 1.5 : 2,
                            height: barHeight,
                            displayValue: !printMode && !mini, // 列印模式下隱藏預設文字，改用我們自己排版的文字
                            fontSize: 16,
                            margin: 0,
                            background: "transparent",
                            lineColor: printMode ? "#000" : "currentColor"
                        });
                    }
                    catch (e) { console.error("無法產生條碼:", e); }
                }
            }, [value, printMode, mini]);

            if (mini) return <svg ref={svgRef} className="dark:invert"></svg>;

            // ✨ 列印專用版型 (完美套用你手動更新的結構)
            if (printMode) {
                return (
                    <div className="custom-print-label">
                        <div className="custom-print-container">

                            <div className="custom-print-header">
                                <div className="custom-print-subtitle">◇ 產品名稱 ◇</div>
                                <div className="custom-print-title">{name || '（無品名）'}</div>
                            </div>

                            <div className="custom-print-barcode-sec">
                                <div className="custom-print-barcode-svg">
                                    <svg ref={svgRef}></svg>
                                </div>
                                {/* 獨立抽出來的條碼文字，確保字體與間距符合你的設計 */}
                                <div className="custom-print-barcode-text">{value}</div>
                            </div>

                            <div className="custom-print-footer">
                                <div className="custom-print-qty-sec">
                                    <div className="custom-print-qty-label-1">數量</div>
                                    <div className="custom-print-qty-label-2">QTY</div>
                                    <div className="custom-print-qty-val">{quantity}</div>
                                </div>

                                <div className="custom-print-note-sec">
                                    <div className="custom-print-note-label">備註 NOTE</div>
                                </div>
                            </div>

                        </div>
                    </div>
                );
            }

            // 一般網頁上的顯示排版 (維持原樣)
            return (
                <div className="flex flex-col items-center justify-center w-full">
                    {!hideName && (
                        <div className="font-bold text-center text-sm mb-2 text-slate-700 dark:text-slate-200">
                            <div>{name || '（無品名）'}</div>
                        </div>
                    )}
                    <svg ref={svgRef} className="dark:invert"></svg>
                </div>
            );
        }

        function EditableItemName({ item, onSave }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(item.name);
            const inputRef = useRef(null);
            useEffect(() => { if (isEditing) inputRef.current?.focus(); }, [isEditing]);
            const save = () => { if (tempName.trim() && tempName !== item.name) onSave(item.id, item.barcode, tempName.trim()); setIsEditing(false); };

            if (isEditing) return <input ref={inputRef} type="text" value={tempName} onChange={e => setTempName(e.target.value)} onBlur={save} onKeyDown={e => e.key === 'Enter' && save()} className="w-full px-2 py-1 text-sm border border-blue-300 rounded dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" />;
            return (
                <div className={`font-bold text-lg cursor-pointer group flex items-start gap-2 transition-colors ${item.name.includes('未知商品') ? 'text-rose-500 hover:text-rose-600' : 'hover:text-blue-500'}`} onClick={() => setIsEditing(true)}>
                    {/* 加上 flex-1, min-w-0, line-clamp-2 與 break-all 防止超長檔名破版 */}
                    <span className="flex-1 min-w-0 break-all line-clamp-2 leading-tight" title={item.name}>{item.name}</span>
                    {/* 加上 shrink-0 與 mt-1 讓編輯小圖示對齊第一行 */}
                    <i className="fa-solid fa-pen text-xs opacity-0 group-hover:opacity-100 transition-opacity mt-1.5 shrink-0"></i>
                </div>
            );
        }

        function EditableCategoryItem({ cat, onSave, onDelete }) {
            const [isEditing, setIsEditing] = useState(false);
            const [tempName, setTempName] = useState(cat.name);
            const [tempKeys, setTempKeys] = useState(cat.keywords);

            const handleSave = () => {
                if (tempName.trim() && tempKeys.trim()) {
                    onSave(cat.id, tempName.trim(), tempKeys.trim());
                }
                setIsEditing(false);
            };

            if (isEditing) {
                return (
                    <div className="flex flex-col sm:flex-row gap-3 bg-blue-50 dark:bg-slate-800/80 p-4 rounded-xl border border-blue-200 dark:border-blue-500/50 shadow-sm animate-scale-in">
                        <input type="text" value={tempName} onChange={e => setTempName(e.target.value)} className="flex-1 px-3 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="分類名稱 (例: 星星人系列)" />
                        <input type="text" value={tempKeys} onChange={e => setTempKeys(e.target.value)} className="flex-2 px-3 py-2 text-sm border border-slate-200 dark:border-slate-600 rounded-lg dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="關鍵字 (逗號分隔)" />
                        <div className="flex gap-2 justify-end sm:items-center">
                            <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-sm text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors font-medium">取消</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-bold shadow-sm flex items-center"><i className="fa-solid fa-check mr-1.5"></i>儲存</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 px-5 py-4 rounded-xl border border-slate-100 dark:border-slate-700 hover:border-blue-200 dark:hover:border-blue-500/30 transition-colors group cursor-pointer" onClick={() => setIsEditing(true)}>
                    <div className="flex-1 pr-4">
                        <div className="font-bold text-slate-700 dark:text-slate-200 flex items-center text-base">
                            {cat.name}
                            <i className="fa-solid fa-pen ml-3 text-xs text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity" title="點擊編輯"></i>
                        </div>
                        <div className="text-sm text-slate-500 dark:text-slate-400 mt-1.5 leading-relaxed font-mono bg-white dark:bg-slate-800 inline-block px-2 py-0.5 rounded border border-slate-100 dark:border-slate-700">
                            {cat.keywords}
                        </div>
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); onDelete(cat.id); }} className="w-11 h-11 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-colors shrink-0 shadow-sm border border-transparent hover:border-red-100 dark:hover:border-red-500/20" title="刪除規則">
                        <i className="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            );
        }

        function QuantityControl({ quantity, onUpdate, onChange, size = 'md', focusRingClass = 'focus:ring-blue-500' }) {
            const isSm = size === 'sm';
            const btnSize = isSm ? 'w-7 h-7 rounded' : 'w-11 h-11 rounded-lg';
            const iconSize = isSm ? 'text-xs' : 'text-xs';
            const inputWidth = isSm ? 'w-10' : 'w-12';
            const textSize = isSm ? 'text-sm' : 'text-base';
            return (
                <div className={`flex items-center bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden p-1 ${isSm ? 'rounded-lg' : 'rounded-xl'}`}>
                    <button onClick={() => onUpdate(-1)} className={`${btnSize} flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-white dark:hover:bg-slate-800 dark:hover:text-slate-200 transition-colors shadow-sm`}>
                        <i className={`fa-solid fa-minus ${iconSize}`}></i>
                    </button>
                    <input type="number" min="1" value={quantity} onChange={(e) => onChange(e.target.value)} onFocus={(e) => e.target.select()} className={`${inputWidth} text-center font-bold text-slate-700 dark:text-slate-200 ${textSize} bg-transparent outline-none focus:bg-white dark:focus:bg-slate-800 focus:ring-2 ${focusRingClass} transition-all rounded px-1 hide-arrows`} />
                    <button onClick={() => onUpdate(1)} className={`${btnSize} flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-white dark:hover:bg-slate-800 dark:hover:text-slate-200 transition-colors shadow-sm`}>
                        <i className={`fa-solid fa-plus ${iconSize}`}></i>
                    </button>
                </div>
            );
        }
        function useGlobalScanner(onScan, threshold = 50) {
            const { useEffect, useRef } = React;
            const buffer = useRef('');
            const lastKeyTime = useRef(Date.now());

            useEffect(() => {
                const handleKeyDown = (e) => {
                    // 如果使用者原本就在文字方塊打字，就不攔截
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

                    const currentTime = Date.now();
                    if (currentTime - lastKeyTime.current > threshold) {
                        buffer.current = '';
                    }

                    if (e.key === 'Enter' && buffer.current.length > 5) {
                        e.preventDefault();
                        onScan(buffer.current);
                        buffer.current = '';
                    } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                        buffer.current += e.key;
                    }

                    lastKeyTime.current = currentTime;
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [onScan, threshold]);
        }

        function BarcodeScannerInput({ target, placeholder, iconClass, onSubmit, onOpenCamera, allDictEntries, settings }) {
            const { useState, useMemo, useRef } = React;
            const [inputValue, setInputValue] = useState('');
            const [isFocused, setIsFocused] = useState(false);
            const inputRef = useRef(null);

            const searchSuggestions = useMemo(() => {
                const input = String(inputValue || '').trim().toLowerCase();
                if (!input) return [];
                return allDictEntries
                    .filter(item => item.name.toLowerCase().includes(input) || item.barcode.toLowerCase().includes(input))
                    .slice(0, 10);
            }, [inputValue, allDictEntries]);

            const getBarcodeFromInput = (input) => {
                const safeInput = String(input || '').trim();
                if (settings.customNameMap[safeInput] || settings.barcodeMap[safeInput]) return safeInput;

                const lowerInput = safeInput.toLowerCase();
                const allEntries = [...Object.entries(settings.customNameMap || {}), ...Object.entries(settings.barcodeMap || {})];

                const exactMatch = allEntries.find(([bc, name]) => String(name || '').toLowerCase() === lowerInput);
                if (exactMatch) return exactMatch[0];

                const partialMatch = allEntries.find(([bc, name]) => String(name || '').toLowerCase().includes(lowerInput));
                if (partialMatch) return partialMatch[0];

                return safeInput;
            };

            const processInputs = (inputStr) => {
                const str = String(inputStr || '').trim();
                if (!str) return;

                const rawInputs = str.split(/[\n\t,]+/).filter(b => b.trim() !== '');
                const items = rawInputs.map(rawInput => {
                    const barcode = getBarcodeFromInput(rawInput);
                    let dictName = findNameInDict(barcode, settings.customNameMap);
                    let name = dictName || settings.barcodeMap[barcode] || `未知商品 (${barcode})`;
                    return { barcode, name };
                });

                onSubmit(items);
                setInputValue('');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                processInputs(inputValue);
            };

            const [isGlobalScannerEnabled, setIsGlobalScannerEnabled] = useState(true);

            // ✨ 套用無游標全域掃描監聽（搭配鎖定開關）
            useGlobalScanner((scannedValue) => {
                if (isGlobalScannerEnabled) {
                    processInputs(scannedValue);
                }
            }, 50);

            return (
                <div className="relative w-full">
                    <form onSubmit={handleSubmit} className="relative flex gap-2 z-20">
                        <div className="relative flex-1 group">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-transform group-focus-within:scale-110">
                                <i className={`fa-solid ${iconClass} text-slate-400 group-focus-within:text-blue-500`}></i>
                            </div>
                            <input
                                ref={inputRef}
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onFocus={() => setIsFocused(true)}
                                onBlur={() => setIsFocused(false)}
                                className="block w-full h-12 md:h-14 pl-11 pr-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 dark:text-white transition-all font-mono text-sm md:text-base outline-none"
                                placeholder={placeholder}
                                autoComplete="off"
                            />
                        </div>
                        <button type="button" onClick={() => onOpenCamera(target)} className="h-12 md:h-14 w-12 md:w-14 shrink-0 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors shadow-sm flex items-center justify-center">
                            <i className="fa-solid fa-camera text-xl"></i>
                        </button>
                        <button type="submit" className="h-12 md:h-14 px-5 md:px-6 shrink-0 bg-slate-800 dark:bg-blue-600 text-white hover:bg-slate-900 dark:hover:bg-blue-700 rounded-xl font-bold transition-colors shadow-sm text-sm md:text-base whitespace-nowrap">加入</button>
                    </form>

                    {/* ✨ 快捷鍵提示與全域掃描 Toggle 開關 */}
                    <div className="mt-2 text-xs sm:text-xs text-slate-400 dark:text-slate-500 font-bold flex items-center justify-between pl-1">
                        <div className="flex items-center">
                            <i className={`fa-solid fa-bolt mr-1.5 transition-colors ${isGlobalScannerEnabled ? 'text-amber-500 opacity-80 animate-pulse' : 'text-slate-300'}`}></i>
                            <span>{isGlobalScannerEnabled ? '全域掃描：已啟用（隨掃即登錄）' : '全域掃描：已暫停（請點擊上方輸入框）'}</span>
                        </div>
                        <button
                            type="button"
                            onClick={() => setIsGlobalScannerEnabled(!isGlobalScannerEnabled)}
                            className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full border transition-all ${isGlobalScannerEnabled ? 'border-amber-500/30 bg-amber-50 text-amber-600 dark:bg-amber-500/10 dark:text-amber-400 focus:ring-2 focus:ring-amber-400' : 'border-slate-200 bg-slate-100 text-slate-500 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-400 focus:ring-2 focus:ring-slate-400'} focus:outline-none`}
                            title={isGlobalScannerEnabled ? '關閉全域掃描' : '啟用全域掃描'}
                        >
                            <div className={`w-2 h-2 rounded-full ${isGlobalScannerEnabled ? 'bg-amber-500 animate-pulse' : 'bg-slate-400'}`}></div>
                            {isGlobalScannerEnabled ? 'ON' : 'OFF'}
                        </button>
                    </div>

                    {isFocused && searchSuggestions.length > 0 && (
                        <div className="absolute top-[calc(100%+8px)] left-0 w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl z-[100] overflow-hidden animate-scale-in origin-top">
                            <div className="max-h-[320px] overflow-y-auto custom-scrollbar flex flex-col divide-y divide-slate-100 dark:divide-slate-700/50">
                                {searchSuggestions.map((item, idx) => (
                                    <div
                                        key={`sugg-${item.barcode}-${idx}`}
                                        className="px-4 py-3 hover:bg-blue-50/50 dark:hover:bg-slate-700/50 cursor-pointer transition-colors flex flex-col justify-center"
                                        onMouseDown={(e) => {
                                            e.preventDefault();
                                            onSubmit([item]);
                                            setInputValue('');
                                        }}
                                    >
                                        <div className="font-bold text-slate-800 dark:text-slate-200 text-sm mb-1">{item.name}</div>
                                        <div className="text-xs font-mono text-slate-400 bg-slate-100 dark:bg-slate-900 inline-flex px-2 py-0.5 rounded w-max">{item.barcode}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [emailInput, setEmailInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [passcodeError, setPasscodeError] = useState(false);

            useEffect(() => {
                if (!auth) { setAuthLoading(false); return; }
                const unsubscribe = auth.onAuthStateChanged((currentUser) => { setUser(currentUser); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); localStorage.setItem('darkMode', isDarkMode); }, [isDarkMode]);

            const [activeTab, setActiveTab] = useState('daily-report');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [toast, setToast] = useState('');
            const [printContext, setPrintContext] = useState(null);

            const executePrint = (context) => {
                setPrintContext(context);
                setTimeout(() => { window.print(); }, 150);
            };
            const [undoData, setUndoData] = useState(null);
            const [isQRCodeModalOpen, setIsQRCodeModalOpen] = useState(false);
            const [qrDataUrl, setQrDataUrl] = useState('');
            const [qrError, setQrError] = useState('');

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 4000); };

            const exportToExcel = (data, filename) => {
                if (data.length === 0) return showToast('⚠️ 匯出失敗：沒有資料可以匯出');
                const exportData = data.map(item => ({
                    '條碼': item.barcode,
                    '品名': item.name,
                    '數量': item.quantity,
                    '狀態': item.status ? (item.status === 'displayed' ? '陳列中' : '已撤下') : '盒損'
                }));
                const worksheet = window.XLSX.utils.json_to_sheet(exportData);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "品項清單");
                const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
                window.XLSX.writeFile(workbook, `${filename}_${dateStr}.xlsx`);
            };

            useEffect(() => {
                const afterPrint = () => setPrintContext(null);
                window.addEventListener('afterprint', afterPrint);
                return () => window.removeEventListener('afterprint', afterPrint);
            }, []);

            const [dailyRecords, setDailyRecords] = useState([]);
            const [settings, setSettings] = useState(defaultSettings);
            const [damagedItems, setDamagedItems] = useState([]);
            const [displayItems, setDisplayItems] = useState([]);
            const [dbStatus, setDbStatus] = useState('連線中...');
            const [dataLoaded, setDataLoaded] = useState({ records: false, settings: false, damaged: false, display: false });
            const isDataReady = dataLoaded.records && dataLoaded.settings && dataLoaded.damaged && dataLoaded.display;

            useEffect(() => {
                if (!user || !db) return;
                const options = { includeMetadataChanges: true };
                const unsubRecords = db.collection('retailOps').doc('dailyRecords').onSnapshot(options, doc => {
                    if (doc.exists) setDailyRecords(doc.data().data || []);
                    if (!doc.metadata.fromCache) { setDataLoaded(prev => ({ ...prev, records: true })); }
                    setDbStatus(doc.metadata.fromCache ? '🟡 連線中...' : '🟢 已同步');
                }, err => { setDbStatus('🔴 權限不足或連線失敗'); });
                const unsubSettings = db.collection('retailOps').doc('settings').onSnapshot(options, doc => {
                    if (doc.exists) setSettings(doc.data().data || defaultSettings);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, settings: true }));
                });
                const unsubDamaged = db.collection('retailOps').doc('damagedItems').onSnapshot(options, doc => {
                    if (doc.exists) setDamagedItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, damaged: true }));
                });
                const unsubDisplay = db.collection('retailOps').doc('displayItems').onSnapshot(options, doc => {
                    if (doc.exists) setDisplayItems(doc.data().data || []);
                    if (!doc.metadata.fromCache) setDataLoaded(prev => ({ ...prev, display: true }));
                });
                return () => { unsubRecords(); unsubSettings(); unsubDamaged(); unsubDisplay(); };
            }, [user]);

            const updateCloudData = (docName, newData, successMsg) => {
                if (!db || !user) return showToast('權限不足，無法寫入資料');
                db.collection('retailOps').doc(docName).set({ data: newData })
                    .then(() => { if (successMsg) showToast(successMsg); })
                    .catch(err => showToast('同步失敗：' + err.message));
            };

            const handleUpdateItemName = (listType, id, barcode, newName) => {
                if (listType === 'damaged') {
                    updateCloudData('damagedItems', damagedItems.map(i => i.id === id ? { ...i, name: newName } : i));
                } else if (listType === 'display') {
                    updateCloudData('displayItems', displayItems.map(i => i.id === id ? { ...i, name: newName } : i));
                } else {
                    setBarcodeItems(prev => prev.map(i => i.id === id ? { ...i, name: newName } : i));
                }
                updateCloudData('settings', { ...settings, customNameMap: { ...settings.customNameMap, [barcode]: newName } }, `已更新字典！`);
            };

            const triggerUndo = (message, onUndoCallback) => {
                if (undoData && undoData.timerId) clearTimeout(undoData.timerId);
                const timerId = setTimeout(() => setUndoData(null), 5000);
                setUndoData({ message, onUndo: onUndoCallback, timerId });
            };

            const handleUndoAction = () => {
                if (!undoData) return;
                clearTimeout(undoData.timerId);
                if (typeof undoData.onUndo === 'function') undoData.onUndo();
                setUndoData(null);
                showToast('✅ 已成功復原操作！');
            };

            const [lastAction, setLastAction] = useState(null);
            const [isDamagedOverviewExpanded, setIsDamagedOverviewExpanded] = useState(false);
            const [damagedSearch, setDamagedSearch] = useState('');
            const [activeDamagedCategory, setActiveDamagedCategory] = useState('全部');

            const handleUnifiedSubmit = (target, items) => {
                if (!items || items.length === 0) return;

                if (target === 'damaged') {
                    setDamagedItems(prev => {
                        let nextState = [...prev];
                        let addedCount = 0;
                        items.forEach(({ barcode, name }) => {
                            const exIndex = nextState.findIndex(i => i.barcode === barcode);
                            if (exIndex >= 0) {
                                nextState[exIndex] = { ...nextState[exIndex], quantity: nextState[exIndex].quantity + 1 };
                            } else {
                                nextState = [...nextState, { id: Date.now() + Math.random(), barcode, name, quantity: 1 }];
                            }
                            addedCount++;
                        });
                        updateCloudData('damagedItems', nextState);
                        if (addedCount > 1) showToast(`✅ 已成功批量盒損：${addedCount} 筆`);
                        else showToast(`📦 盒損已自動加入：${items[0].name}`);
                        return nextState;
                    });
                } else if (target === 'display') {
                    setDisplayItems(prev => {
                        let nextState = [...prev];
                        let addedCount = 0;
                        items.forEach(({ barcode, name }) => {
                            const exIndex = nextState.findIndex(i => i.barcode === barcode && i.status === displayFilter);
                            if (exIndex >= 0) {
                                nextState[exIndex] = { ...nextState[exIndex], quantity: nextState[exIndex].quantity + 1 };
                            } else {
                                nextState = [...nextState, { id: Date.now() + Math.random(), barcode, name, quantity: 1, status: displayFilter }];
                            }
                            addedCount++;
                        });
                        updateCloudData('displayItems', nextState);
                        if (addedCount > 1) showToast(`✨ 已成功批量登錄：${addedCount} 筆`);
                        else showToast(`✨ 陳列品已登錄：${items[0].name}`);
                        return nextState;
                    });
                } else if (target === 'print') {
                    setBarcodeItems(prev => {
                        let nextState = [...prev];
                        let addedCount = 0;
                        items.forEach(({ barcode, name }) => {
                            const exIndex = nextState.findIndex(i => i.barcode === barcode);
                            if (exIndex >= 0) {
                                nextState[exIndex] = { ...nextState[exIndex], quantity: nextState[exIndex].quantity + 1 };
                            } else {
                                nextState = [{ id: Date.now() + Math.random(), barcode, name, quantity: 1 }, ...nextState];
                            }
                            addedCount++;
                        });
                        if (addedCount > 1) showToast(`✅ 已成功批量加入待印：${addedCount} 筆`);
                        else showToast(`🖨️ 已加入待印清單：${items[0].name}`);
                        return nextState;
                    });
                }
            };

            const handleOpenCamera = (target) => {
                setScannerTarget(target);
                setScannerOpen(true);
            };

            const updateQuantity = (id, delta) => {
                setDamagedItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item);
                    updateCloudData('damagedItems', newData);
                    return newData;
                });
            };
            const setDamagedQuantity = (id, newQty) => {
                const qty = Math.max(1, parseInt(newQty) || 1);
                setDamagedItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: qty } : item);
                    updateCloudData('damagedItems', newData);
                    return newData;
                });
            };

            const removeDamagedItem = (id) => {
                setDamagedItems(prev => {
                    const item = prev.find(i => i.id === id);
                    const newData = prev.filter(i => i.id !== id);
                    if (item) triggerUndo(`已刪除盒損品：${item.name}`, () => {
                        setDamagedItems(current => {
                            const restored = [...current, item];
                            updateCloudData('damagedItems', restored);
                            return restored;
                        });
                    });
                    updateCloudData('damagedItems', newData);
                    return newData;
                });
            };

            const clearAllDamagedItems = () => {
                const backup = [...damagedItems];
                setDamagedItems([]);
                updateCloudData('damagedItems', []);
                setLastAction(null);
                triggerUndo('已清空季末盒損紀錄', () => {
                    setDamagedItems(backup);
                    updateCloudData('damagedItems', backup);
                });
            };

            const filteredDamagedItems = useMemo(() => {
                if (!damagedSearch.trim()) return damagedItems; const q = damagedSearch.toLowerCase();
                return damagedItems.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
            }, [damagedItems, damagedSearch]);

            const groupedDamagedItems = useMemo(() => {
                const groups = {};
                filteredDamagedItems.forEach(item => {
                    const cat = determineCategory(item.name, settings.customCategories);
                    if (!groups[cat]) groups[cat] = []; groups[cat].push(item);
                });
                return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
            }, [filteredDamagedItems, settings.customCategories]);

            const [displayFilter, setDisplayFilter] = useState('stored');
            const [displaySearch, setDisplaySearch] = useState('');
            const [displayCurrentPage, setDisplayCurrentPage] = useState(1);
            const [isDisplayOverviewExpanded, setIsDisplayOverviewExpanded] = useState(false);
            const [itemsPerPage, setItemsPerPage] = useState(12);

            useEffect(() => {
                const updateItemsPerPage = () => {
                    const width = window.innerWidth;
                    if (width >= 1280) {
                        setItemsPerPage(12); // 電腦大螢幕 (3欄排版，給 12 張)
                    } else if (width >= 768) {
                        setItemsPerPage(8);  // 平板尺寸 (2欄排版，給 8 張)
                    } else {
                        setItemsPerPage(5);  // 手機尺寸 (1欄排版，給 5 張，避免滑動太長)
                    }
                };

                updateItemsPerPage(); // 初始載入時先執行一次
                window.addEventListener('resize', updateItemsPerPage); // 監聽視窗縮放
                return () => window.removeEventListener('resize', updateItemsPerPage);
            }, []);
            const [revealedBarcodes, setRevealedBarcodes] = useState({});

            // 計算陳列品過濾與分頁
            const displayData = useMemo(() => {
                let filtered = displayItems.filter(item => item.status === displayFilter);

                // ✨ 依照使用者需求，加上按新增時間反向排序，讓最新掃入的商品排在最前面
                filtered.reverse();

                if (displaySearch.trim()) {
                    const q = displaySearch.toLowerCase();
                    filtered = filtered.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
                }

                // 計算總覽用的分類群組
                const groups = {};
                filtered.forEach(item => {
                    const cat = determineCategory(item.name, settings.customCategories);
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                });
                const grouped = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));

                // 👇 將原本寫死的常數，換成剛剛動態監聽的 itemsPerPage
                const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));

                // 避免縮放螢幕時，導致當前頁碼大於總頁數而破版
                const safeCurrentPage = Math.min(displayCurrentPage, totalPages);
                const paginated = filtered.slice((safeCurrentPage - 1) * itemsPerPage, safeCurrentPage * itemsPerPage);

                return { filtered, grouped, paginated, totalPages, safeCurrentPage };
            }, [displayItems, displayFilter, displaySearch, displayCurrentPage, settings.customCategories, itemsPerPage]); // 👈 記得在結尾的陣列補上 itemsPerPage

            // 當切換篩選條件、搜尋或「改變螢幕大小」時，自動回到第一頁
            useEffect(() => { setDisplayCurrentPage(1); }, [displayFilter, displaySearch, itemsPerPage]);

            const toggleDisplayStatus = (id, currentStatus) => {
                const newStatus = currentStatus === 'displayed' ? 'stored' : 'displayed';
                setDisplayItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, status: newStatus } : item);
                    updateCloudData('displayItems', newData, newStatus === 'displayed' ? '已轉移至展示中！' : '已收回典藏庫！');
                    return newData;
                });
            };

            const updateDisplayQuantity = (id, delta) => {
                setDisplayItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item);
                    updateCloudData('displayItems', newData);
                    return newData;
                });
            };
            const setDisplayItemQuantity = (id, newQty) => {
                const qty = Math.max(1, parseInt(newQty) || 1);
                setDisplayItems(prev => {
                    const newData = prev.map(item => item.id === id ? { ...item, quantity: qty } : item);
                    updateCloudData('displayItems', newData);
                    return newData;
                });
            };

            const removeDisplayItem = (id) => {
                setDisplayItems(prev => {
                    const item = prev.find(i => i.id === id);
                    const newData = prev.filter(i => i.id !== id);
                    if (item) triggerUndo(`已移除陳列品：${item.name}`, () => {
                        setDisplayItems(current => {
                            const restored = [...current, item];
                            updateCloudData('displayItems', restored);
                            return restored;
                        });
                    });
                    updateCloudData('displayItems', newData);
                    return newData;
                });
            };

            const toggleBarcodeVisibility = (id) => {
                setRevealedBarcodes(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const [selectedDisplayItems, setSelectedDisplayItems] = useState(new Set());
            const [lastSelectedDisplayId, setLastSelectedDisplayId] = useState(null);

            const toggleDisplaySelection = (id, isShiftKey = false) => {
                setSelectedDisplayItems(prev => {
                    const next = new Set(prev);

                    if (isShiftKey && lastSelectedDisplayId) {
                        const allIds = displayData.paginated.map(item => item.id);
                        const startIdx = allIds.indexOf(lastSelectedDisplayId);
                        const endIdx = allIds.indexOf(id);

                        if (startIdx !== -1 && endIdx !== -1) {
                            const minIdx = Math.min(startIdx, endIdx);
                            const maxIdx = Math.max(startIdx, endIdx);
                            const isSelected = next.has(id);

                            for (let i = minIdx; i <= maxIdx; i++) {
                                if (isSelected) next.delete(allIds[i]);
                                else next.add(allIds[i]);
                            }
                            setLastSelectedDisplayId(id);
                            return next;
                        }
                    }

                    if (next.has(id)) next.delete(id);
                    else next.add(id);

                    setLastSelectedDisplayId(id);
                    return next;
                });
            };
            const toggleAllDisplaySelections = () => {
                const currentIds = displayData.filtered.map(i => i.id);
                if (currentIds.length > 0 && currentIds.every(id => selectedDisplayItems.has(id))) {
                    setSelectedDisplayItems(new Set());
                } else {
                    const next = new Set(selectedDisplayItems);
                    currentIds.forEach(id => next.add(id));
                    setSelectedDisplayItems(next);
                }
            };

            const handleExportData = () => {
                const backupData = { dailyRecords, reportSettings: settings, damagedItems, displayItems };
                const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
                a.download = `系統備份_${new Date().getTime()}.json`; a.click(); URL.revokeObjectURL(url);
            };

            const handleImportData = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (window.confirm('確定要匯入此備份並覆蓋雲端資料？')) {
                            if (data.dailyRecords) updateCloudData('dailyRecords', data.dailyRecords);
                            if (data.reportSettings) updateCloudData('settings', data.reportSettings);
                            if (data.damagedItems) updateCloudData('damagedItems', data.damagedItems);
                            if (data.displayItems) updateCloudData('displayItems', data.displayItems);
                            showToast('還原成功！雲端已同步。');
                        }
                    } catch (error) { showToast('匯入失敗：檔案無法解析'); }
                };
                reader.readAsText(file); e.target.value = null;
            };

            const [barcodeItems, setBarcodeItems] = useState([]);
            const [barcodeSearch, setBarcodeSearch] = useState('');

            // ==========================================
            // ✨ 以下為防呆加固版邏輯
            // ==========================================

            // ✨ 輔助 1：將字典轉為物件陣列 (防呆：確保全部強制當作字串處理)
            const allDictEntries = useMemo(() => {
                const map = { ...settings.barcodeMap, ...settings.customNameMap };
                const uniqueMap = new Map();
                Object.entries(map).forEach(([bc, name]) => {
                    const safeName = String(name || ''); // 強制轉字串，防止數字當機
                    if (safeName && !safeName.includes('未知商品')) {
                        uniqueMap.set(bc, safeName);
                    }
                });
                return Array.from(uniqueMap.entries()).map(([barcode, name]) => ({ barcode: String(barcode), name }));
            }, [settings.customNameMap, settings.barcodeMap]);

            // 控制 +1 / -1 按鈕的函數
            const updateBarcodeItemQuantity = (id, delta) => {
                setBarcodeItems(prev => prev.map(item => item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item));
            };

            // 控制直接手動輸入數量的函數
            const setBarcodeQuantity = (id, newQty) => {
                const qty = Math.max(1, parseInt(newQty) || 1);
                setBarcodeItems(prev => prev.map(item => item.id === id ? { ...item, quantity: qty } : item));
            };

            const removeBarcodeItem = (id) => {
                setBarcodeItems(prev => {
                    const item = prev.find(i => i.id === id);
                    const newData = prev.filter(i => i.id !== id);
                    if (item) triggerUndo(`已從列印清單移除：${item.name}`, () => {
                        setBarcodeItems(current => [item, ...current]);
                    });
                    return newData;
                });
            };
            const clearAllBarcodeItems = () => {
                const backup = [...barcodeItems];
                setBarcodeItems([]);
                triggerUndo('已清空待印清單', () => setBarcodeItems(backup));
            };

            const filteredBarcodeItems = useMemo(() => {
                if (!barcodeSearch.trim()) return barcodeItems; const q = barcodeSearch.toLowerCase();
                return barcodeItems.filter(item => item.name.toLowerCase().includes(q) || item.barcode.includes(q));
            }, [barcodeItems, barcodeSearch]);

            const [newCatName, setNewCatName] = useState('');
            const [newCatKeys, setNewCatKeys] = useState('');
            const handleAddCategory = () => {
                if (!newCatName.trim() || !newCatKeys.trim()) return showToast('請填寫完整');
                updateCloudData('settings', { ...settings, customCategories: [...settings.customCategories, { id: Date.now(), name: newCatName, keywords: newCatKeys }] });
                setNewCatName(''); setNewCatKeys('');
            };
            const handleRemoveCategory = (id) => updateCloudData('settings', { ...settings, customCategories: settings.customCategories.filter(c => c.id !== id) });

            const [story, setStory] = useState('');
            const [selectedKeywords, setSelectedKeywords] = useState(new Set());
            const [currentStore, setCurrentStore] = useState('未知店鋪');
            const [todayStats, setTodayStats] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [selectedMonth, setSelectedMonth] = useState('');
            const [isBulkImportOpen, setIsBulkImportOpen] = useState(false);
            const [bulkInput, setBulkInput] = useState('');
            const [isHistoryExpanded, setIsHistoryExpanded] = useState(false);
            const [newBarcodeStr, setNewBarcodeStr] = useState('');
            const [newBoxSize, setNewBoxSize] = useState(6);
            const [dictInput, setDictInput] = useState('');

            const toggleKeyword = (kw) => {
                setSelectedKeywords(prev => {
                    const next = new Set(prev);
                    if (next.has(kw)) next.delete(kw);
                    else next.add(kw);
                    return next;
                });
            };

            const availableMonths = useMemo(() => {
                let months = dailyRecords.map(r => r.date.split('/')[0]);
                if (todayStats) months.push(formatDateStr(todayStats.dateStr).split('/')[0]);
                return [...new Set(months)].sort((a, b) => b.localeCompare(a));
            }, [dailyRecords, todayStats]);

            useEffect(() => { if (availableMonths.length > 0 && !availableMonths.includes(selectedMonth)) setSelectedMonth(availableMonths[0]); }, [availableMonths]);

            const processData = (rows) => {
                if (rows.length < 2) return showToast('檔案格式錯誤');
                const headers = rows[0];
                const idxDate = headers.indexOf('CREATED_DATE');
                const idxType = headers.indexOf('TYPE');
                const idxStore = headers.indexOf('STORE');
                const idxBarcode = headers.indexOf('BARCODE');
                const idxDesc = headers.indexOf('DESCRIPTION_CN');
                const idxQty = headers.indexOf('SOLD_QTY');

                const idxDocNo = headers.indexOf('DOC_NO'); // ✨ 新增：抓取單號欄位

                let pointsRedeemed = 0; // 維持原本的變數，只算金額
                let mega1000 = { amt: 0, qty: 0, giftQty: 0 }, mega400 = { amt: 0, qty: 0, giftQty: 0 };
                let itemStats = {}, updatedBarcodeMap = { ...settings.barcodeMap };
                let docDiscountMap = {}; // ✨ 新增：用來記錄每張單號的總折扣

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i]; if (row.length < 5) continue;
                    if (idxType !== -1 && !['sale', 'return', 'refund', 'exchange'].includes(String(row[idxType] || '').trim().toLowerCase())) continue;
                    const barcode = String(row[idxBarcode] || '').trim();
                    const rawDesc = idxDesc !== -1 ? String(row[idxDesc] || '').trim() : '';
                    if (!barcode && !rawDesc) continue;
                    if (!firstDate && row[idxDate]) firstDate = row[idxDate].toString().split(' ')[0];
                    if (storeName === '未知店鋪' && row[idxStore]) storeName = row[idxStore].toString().replace(/\[.*?\]/, '').trim();
                    let dictName = findNameInDict(barcode, settings.customNameMap);
                    const desc = dictName || rawDesc || `未知商品 (${barcode})`;
                    const qty = parseFloat(row[idxQty]) || 0;

                    const disc = parseFloat(row[idxDisc]) || 0;
                    const docNo = idxDocNo !== -1 ? String(row[idxDocNo] || '').trim() : '';
                    const originalAmt = amt + disc;

                    if (barcode && desc && !dictName && barcode !== desc) updatedBarcodeMap[barcode] = desc;
                    todaySales += amt;

                    // 將每一列的折扣金額依據 DOC_NO 進行累加
                    if (docNo) {
                        if (!docDiscountMap[docNo]) docDiscountMap[docNo] = 0;
                        docDiscountMap[docNo] += disc;
                    }

                    // ✨ 修改：將原本加總的 amt 替換為 originalAmt (原價)
                    if (rawDesc.includes('1000%') || desc.includes('1000%')) {
                        amt === 0 ? (mega1000.giftQty += qty) : (mega1000.qty += qty, mega1000.amt += originalAmt);
                    }
                    if (rawDesc.includes('400%') || desc.includes('400%')) {
                        amt === 0 ? (mega400.giftQty += qty) : (mega400.qty += qty, mega400.amt += originalAmt);
                    }
                    if (barcode) {
                        if (!itemStats[barcode]) itemStats[barcode] = { barcode, desc, top5Qty: 0, top5Amt: 0, singles: 0, boxes: 0 };
                        if (amt > 0) { itemStats[barcode].top5Qty += qty; itemStats[barcode].top5Amt += amt; }

                            // 狀況 A：單純使用 N 張點數券 (如 330, 660, 990)
                            pointsRedeemed += absDisc;

                            // 狀況 B：混合使用 生日券(300) + N 張點數券(330)

                        }
