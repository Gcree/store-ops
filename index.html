                    { tags: ['補貨熱銷'], text: `今天週${weekdayStr}補進了「${top1.name}」，一上架就迎來一波搶購，今日售出 ${top1.quantity} 件，佔業績 ${top1Percent}%，補到最後又快見底，後面陸續有客人來詢問還有沒有，可見這款商品的需求還是相當旺盛。\n\n「${top2.name}」今天反應同樣不錯，佔比 ${top2Percent}%，今天補貨節奏很順，能看到客人滿載而歸真的很有成就感。` },
                    { tags: ['補貨熱銷', '上架秒殺'], text: `近幾日許多客人都在詢問「${top1.name}」的補貨時間，今天一到貨就馬上有消息靈通的客人出現，一上架就幾乎被掃光，售出 ${top1.quantity} 件，業績佔比直衝 ${top1Percent}%，補一次清一次，熱度真的非常驚人。\n\n「${top2.name}」跟著受惠，今日同樣有 ${top2Percent}% 的好表現，整天店內不斷傳來抽到喜歡款的歡呼聲，氛圍超棒！` },
                    { tags: ['假日人潮', '天氣不佳'], text: `今天週${weekdayStr}天氣稍涼，但家長帶著小朋友來台茂逛街的人潮一點都不少，很多客人都詢問現場沒貨的商品，得知沒有庫存後還問陳列品能不能賣，看來客人對心儀的商品真的不善罷甘休。\n\n今天銷售第一名是「${top1.name}」，佔了整體業績 ${top1Percent}%，「${top2.name}」緊接其後，佔比 ${top2Percent}%，今天業績整體表現相當穩健。` },
                    { tags: ['假日人潮', '補貨熱銷'], text: `今天是週${weekdayStr}，許多家長帶著小朋友來台茂逛街。今天補進了「${top1.name}」，一上架馬上就吸引到親子客群搶購，大人小孩都圍在一起，現場歡樂的氣氛非常熱烈，這款今日佔業績 ${top1Percent}%。\n\n「${top2.name}」也在今天的假日氣氛帶動下有 ${top2Percent}% 的好表現，整體業績相當不錯！` },
                    { tags: ['上架秒殺', 'MEGA熱銷'], text: `今天週${weekdayStr}真的是雙喜臨門，「${top1.name}」一上架就直接秒殺，售出 ${top1.quantity} 件、佔比 ${top1Percent}%，根本沒有留給人猶豫的空間；同時 MEGA 400% 系列今日共賣出 ${mega400qty} 隻，很多客人買完大隻的還順手帶走一堆盲盒，消費力超強。\n\n「${top2.name}」在今天的強勢氛圍帶動下同樣有 ${top2Percent}% 的亮眼表現，整天買氣高漲，今天算是本月數一數二的好日子！` },
                    { tags: ['客人端盒', '假日人潮', '大單出現'], text: `今天是週${weekdayStr}，假日家庭客群特別多，現場不時傳來一家人一起開盒、抽到喜歡款的歡呼聲，氣氛非常熱鬧。其中還出現一位剛加入會員就消費了相當驚人金額的新客人，真的很開心我們的商品能吸引到他，成為今天的大客戶。\n\n今日銷售冠軍是「${top1.name}」，佔業績 ${top1Percent}%；第二名「${top2.name}」佔比 ${top2Percent}%，今天業績非常漂亮。` },
                    { tags: ['天氣不佳', '補貨熱銷', '客人端盒'], text: `今天週${weekdayStr}外面下著雨，不過完全擋不住大家衝來購物的熱情！「${top1.name}」一補進來馬上就有消息靈通的顧客出現，不少客人直接以中盒為單位下手，售出 ${top1.quantity} 件，業績佔比 ${top1Percent}%，雨天照樣搶購，讓人感動。\n\n「${top2.name}」今天也有不錯的表現，佔比 ${top2Percent}%，雖然天氣差讓客流少了一點，但今天進來的客人買氣都超強，帶來不俗的表現。` }
                ];
                const activeKeywords = Array.from(selectedKeywords);
                let availableTemplates;

                if (activeKeywords.length === 0) {
                    availableTemplates = templates;
                } else {
                    const exactMatch = templates.filter(t => activeKeywords.every(kw => t.tags.includes(kw)));
                    if (exactMatch.length > 0) {
                        availableTemplates = exactMatch;
                    } else {
                        availableTemplates = templates.filter(t => activeKeywords.some(kw => t.tags.includes(kw)));
                    }
                }

                if (availableTemplates.length === 0) { showToast('⚠️ 找不到符合此組合的範本，請換個關鍵字試試！'); return; }

                const randomIndex = Math.floor(Math.random() * availableTemplates.length);
                setStory(availableTemplates[randomIndex].text);
                showToast('✨ 小作文已生成！可再依現場情況微調。');
            };

            const reportContent = useMemo(() => {
                if (!selectedMonth) return '請先上傳檔案或建立紀錄...';
                let recordsToPrint = dailyRecords.filter(r => r.date.split('/')[0] === selectedMonth);
                if (todayStats && formatDateStr(todayStats.dateStr).split('/')[0] === selectedMonth && !recordsToPrint.find(r => r.date === formatDateStr(todayStats.dateStr))) {
                    recordsToPrint.push({ date: formatDateStr(todayStats.dateStr), weekday: getWeekday(todayStats.dateStr), sales: todayStats.sales, points: todayStats.points, bigToys: todayStats.bigToys });
                }
                if (recordsToPrint.length === 0 && !todayStats) return '此月份尚無紀錄...';
                recordsToPrint.sort((a, b) => a.date.localeCompare(b.date));
                const totalSales = recordsToPrint.reduce((sum, r) => sum + r.sales, 0);
                const totalPoints = recordsToPrint.reduce((sum, r) => sum + (r.points || 0), 0);
                const sumBigToy = (type, key) => recordsToPrint.reduce((sum, r) => sum + (r.bigToys?.[type]?.[key] || 0), 0);
                const achievement = settings.targetAmount > 0 ? ((totalSales / (settings.targetAmount * 10000)) * 100).toFixed(2) : '0.00';

                let report = `桃園台茂店 銷售日報（TWD）\n`;
                recordsToPrint.forEach(r => report += `${r.date}（${r.weekday}）$${formatMoney(r.sales)}\n`);
                report += `\nTotal: $${formatMoney(totalSales)}\n\n（點數兌換: $${formatMoney(totalPoints)})\n`;
                report += `（1000%：$${formatMoney(sumBigToy('1000', 'amt'))}， ${sumBigToy('1000', 'qty')}隻${sumBigToy('1000', 'giftQty') > 0 ? `，贈品 ${sumBigToy('1000', 'giftQty')}隻` : ''}）\n`;
                report += `（400%：$${formatMoney(sumBigToy('400', 'amt'))}， ${sumBigToy('400', 'qty')}隻${sumBigToy('400', 'giftQty') > 0 ? `，贈品 ${sumBigToy('400', 'giftQty')}隻` : ''}）\n\n`;
                report += `目標：${settings.targetAmount}萬\n達成率：${achievement}%\n\n銷售狀況分享：\n`;

                const isTodaySelected = todayStats && (formatDateStr(todayStats.dateStr).split('/')[0] === selectedMonth);
                if (isTodaySelected && todayStats.itemStats) {
                    const top5 = Object.values(todayStats.itemStats)
                        .filter(item => item.desc && item.desc.trim() !== '' && item.top5Amt > 0)
                        .sort((a, b) => b.top5Qty - a.top5Qty || b.top5Amt - a.top5Amt)
                        .slice(0, 5);
                    if (top5.length > 0) { top5.forEach((item, idx) => { report += `${idx + 1}. ${item.desc}\n`; }); }
                    else { report += `(今日無銷售商品可產生 Top 5)\n`; }
                } else { report += `(請上傳該日資料以產生 Top 5)\n`; }

                report += `\n（2）新品分享\n`;
                if (settings.newBarcodes.length > 0) {
                    settings.newBarcodes.forEach(barcode => {
                        const itemData = isTodaySelected ? todayStats?.itemStats?.[barcode] : null;
                        let dictName = findNameInDict(barcode, settings.customNameMap);
                        const desc = dictName || settings.barcodeMap?.[barcode] || barcode;
                        const boxSize = settings.boxSizeMap[barcode] || 6;
                        if (itemData && (itemData.singles > 0 || itemData.boxes > 0)) {
                            let qtyStr = boxSize === 1 ? `${(itemData.boxes * boxSize) + itemData.singles}` : (itemData.singles > 0 && itemData.boxes > 0 ? `散盒 ${itemData.singles} 端盒 ${itemData.boxes}` : (itemData.boxes > 0 ? `端盒 ${itemData.boxes}` : `散盒 ${itemData.singles}`));
                            report += `${desc}➡️${qtyStr}\n`;
                        } else report += `${desc}➡️0\n`;
                    });
                } else report += `(尚未設定任何新品條碼)\n`;
                report += `\n(3）${story || '請輸入今日的小作文...'}`;
                return report;
            }, [dailyRecords, todayStats, settings, story, currentStore, selectedMonth]);

            const currentMonthRecords = useMemo(() => dailyRecords.filter(r => r.date.split('/')[0] === selectedMonth).sort((a, b) => b.date.localeCompare(a.date)), [dailyRecords, selectedMonth]);
            const visibleRecords = isHistoryExpanded ? currentMonthRecords : currentMonthRecords.slice(0, 3);

            useEffect(() => {
                if (!isQRCodeModalOpen || !reportContent) return;
                setQrDataUrl(''); setQrError('');
                if (typeof window.QRious === 'undefined') { setQrError('⚠️ 條碼模組載入失敗，請檢查網路狀態。'); return; }
                try {
                    const utf8Content = unescape(encodeURIComponent(reportContent));
                    const qr = new window.QRious({ value: utf8Content, size: 350, level: 'L', background: 'white', foreground: '#000000' });
                    const dataUrl = qr.toDataURL();
                    if (dataUrl && dataUrl.length > 100) setQrDataUrl(dataUrl); else throw new Error("圖片異常");
                } catch (err) { setQrError('⚠️ 條碼轉換失敗，報表文字可能包含無法解析的特殊字元，建議改用「複製」按鈕。'); }
            }, [reportContent, isQRCodeModalOpen]);

            const [scannerOpen, setScannerOpen] = useState(false);
            const [scannerTarget, setScannerTarget] = useState('');
            const [dictSearch, setDictSearch] = useState('');
            const [isDictExpanded, setIsDictExpanded] = useState(true);
            const [isCategoryExpanded, setIsCategoryExpanded] = useState(false);
            const [dictCurrentPage, setDictCurrentPage] = useState(1);

            const scanLockRef = useRef(false);
            const latestStateRef = useRef({});
            latestStateRef.current = { settings, displayFilter };

            useEffect(() => {
                if (!scannerOpen) { scanLockRef.current = false; return; }
                const html5QrCode = new window.Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 120 } },
                    (decodedText) => {
                        if (scanLockRef.current) return;
                        scanLockRef.current = true;
                        if (typeof navigator.vibrate === 'function') navigator.vibrate(100);
                        html5QrCode.stop().then(() => {
                            setScannerOpen(false);
                            const barcode = decodedText.replace(/[^a-zA-Z0-9-]/g, '').trim();
                            const currentSettings = latestStateRef.current.settings;
                            let dictName = findNameInDict(barcode, currentSettings.customNameMap);
                            const productName = dictName || currentSettings.barcodeMap[barcode] || `未知商品 (${barcode})`;

                            handleUnifiedSubmit(scannerTarget, [{ barcode, name: productName }]);
                        }).catch(() => { setScannerOpen(false); });
                    },
                    (error) => { }
                ).catch(err => { showToast('⚠️ 無法啟動相機，請確認瀏覽器權限'); setScannerOpen(false); });
                return () => { if (html5QrCode.isScanning) html5QrCode.stop().catch(console.error); };
            }, [scannerOpen, scannerTarget]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!emailInput || !passwordInput) return showToast('請填寫帳號與密碼');
                setAuthError('');
                auth.signInWithEmailAndPassword(emailInput, passwordInput)
                    .then(() => showToast('✅ 登入成功！'))
                    .catch(() => { setAuthError('帳號或密碼錯誤'); setPasscodeError(true); setTimeout(() => setPasscodeError(false), 500); });
            };

            const handleLogout = () => { auth.signOut().then(() => showToast('👋 已登出系統')); };

            if (authLoading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white"><i className="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-6 transition-colors duration-300 no-print">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="absolute top-6 right-6 w-12 h-12 rounded-full flex items-center justify-center bg-white dark:bg-slate-800 text-amber-500 shadow-sm hover:scale-110 transition-transform"><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'} text-xl`}></i></button>
                        <div className={`w-full max-w-sm bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col items-center ${passcodeError ? 'animate-shake' : 'animate-scale-in'}`}>
                            <div className="w-20 h-20 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-3xl flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-shield-halved text-4xl"></i></div>
                            <h1 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">P-ops 懶人系統</h1>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-8 text-center">請輸入帳號密碼登入</p>
                            <form onSubmit={handleLogin} className="w-full flex flex-col gap-4">
                                <div className="relative"><i className="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="email" value={emailInput} onChange={(e) => setEmailInput(e.target.value)} placeholder="員工 Email" className="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white font-medium transition-colors" /></div>
                                <div className="relative"><i className="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="密碼" className={`w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white font-medium transition-colors ${authError ? 'border-red-500 focus:ring-red-500' : 'border-slate-200 dark:border-slate-700'}`} /></div>
                                {authError && <p className="text-red-500 text-sm font-bold text-center">{authError}</p>}
                                <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/30 transition-all active:scale-95 mt-2">安全登入</button>
                            </form>
                        </div>
                        {toast && <div className="fixed top-12 left-1/2 -translate-x-1/2 z-[60] bg-rose-500 text-white px-6 py-2 rounded-full shadow-lg font-bold animate-slide-up-fade">{toast}</div>}
                    </div>
                );
            }

            return (
                <div className="flex flex-col min-h-screen w-full font-sans overflow-x-hidden">

                    {user && !isDataReady && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center transition-all">
                            <div className="bg-white dark:bg-slate-800 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-scale-in border border-slate-200 dark:border-slate-700">
                                <i className="fa-solid fa-circle-notch fa-spin text-2xl text-blue-500"></i>
                                <div>
                                    <div className="font-bold text-slate-800 dark:text-slate-100 text-sm">正在安全同步雲端資料...</div>
                                    <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">為避免資料覆寫，請稍候</div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="pt-8 pb-24 px-6 md:px-8 lg:px-12 max-w-[1440px] mx-auto min-h-screen w-full no-print">
                        <div className="space-y-6 md:space-y-8">

                            {/* 分頁 1: 銷售日報表 */}
                            {activeTab === 'daily-report' && (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 xl:gap-8 pb-10 animate-scale-in">

                                    <div className="space-y-6">
                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                                            <h2 className="text-xl font-semibold mb-4 flex items-center dark:text-slate-100"><i className="fa-solid fa-cloud-arrow-up text-blue-500 mr-2"></i>上傳今日報表</h2>
                                            <div className="flex items-center justify-center w-full">
                                                <label className={`flex flex-col items-center justify-center w-full h-32 border-2 ${isProcessing ? 'border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800' : 'border-blue-200 dark:border-blue-500/30 border-dashed bg-blue-50 dark:bg-blue-500/5 hover:bg-blue-100 dark:hover:bg-blue-500/10 cursor-pointer'} rounded-xl transition-colors`}>
                                                    <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                                        <i className={`fa-solid fa-cloud-arrow-up text-3xl ${isProcessing ? 'text-slate-400' : 'text-blue-500'} mb-2`}></i>
                                                        <p className="mb-2 text-sm text-slate-600 dark:text-slate-300">{isProcessing ? '處理檔案中...' : <><span className="font-semibold">點擊上傳</span> 或拖曳 Excel 檔案至此</>}</p>
                                                    </div>
                                                    <input type="file" className="hidden" accept=".csv, .xlsx, .xls" onChange={handleFileUpload} disabled={isProcessing} />
                                                </label>
                                            </div>
                                            {todayStats && (
                                                <div className="mt-4 p-5 bg-emerald-50 dark:bg-emerald-500/10 rounded-2xl flex justify-between items-center transition-colors border border-emerald-200 dark:border-emerald-500/30 shadow-sm">
                                                    <div>
                                                        <span className="block text-sm text-emerald-600 dark:text-emerald-400 font-bold mb-1">
                                                            <i className="fa-solid fa-check-circle mr-1.5"></i>今日報表已自動同步 ({todayStats.dateStr})
                                                        </span>
                                                        <span className="block text-3xl font-black text-emerald-700 dark:text-emerald-100">${formatMoney(todayStats.sales)}</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">
                                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                                                <div className="flex items-center">
                                                    <h2 className="text-xl font-semibold flex items-center whitespace-nowrap dark:text-slate-100"><i className="fa-solid fa-cloud text-blue-500 mr-2"></i> 歷史業績</h2>
                                                    {availableMonths.length > 0 && (
                                                        <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="ml-3 px-2 py-1 text-sm bg-blue-50 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 font-medium border border-blue-100 dark:border-blue-500/30 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                                                            {availableMonths.map(m => <option key={m} value={m}>{parseInt(m, 10)} 月份</option>)}
                                                        </select>
                                                    )}
                                                </div>
                                                <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                                                    {currentMonthRecords.length > 3 && (
                                                        <button onClick={() => setIsHistoryExpanded(!isHistoryExpanded)} className={`flex-1 sm:flex-none justify-center text-sm px-3 py-1.5 rounded-lg flex items-center transition-colors ${isHistoryExpanded ? 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300' : 'bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300'}`}><i className={`fa-solid ${isHistoryExpanded ? 'fa-compress' : 'fa-expand'} mr-1`}></i> {isHistoryExpanded ? '收起' : `展開全部(${currentMonthRecords.length})`}</button>
                                                    )}
                                                    <button onClick={() => { setIsBulkImportOpen(!isBulkImportOpen); }} className={`flex-1 sm:flex-none justify-center text-sm px-3 py-1.5 rounded-lg flex items-center transition-colors ${isBulkImportOpen ? 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300' : 'bg-emerald-50 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-300 hover:bg-emerald-100 dark:hover:bg-emerald-500/30'}`}><i className={`fa-solid ${isBulkImportOpen ? 'fa-xmark' : 'fa-table'} mr-1`}></i> {isBulkImportOpen ? '取消' : '批量匯入'}</button>
                                                </div>
                                            </div>
                                            {isBulkImportOpen && (
                                                <div className="mb-6 p-4 bg-emerald-50/50 dark:bg-emerald-500/10 rounded-xl border border-emerald-100 dark:border-emerald-500/20">
                                                    <p className="text-xs text-slate-600 dark:text-slate-400 mb-3 leading-relaxed">請在 Excel 總表中依序選取並複製以下欄位：<br />日期、總業績、點數兌換、1000%數量、1000%金額、400%數量、400%金額</p>
                                                    <textarea className="w-full px-4 py-3 border border-emerald-200 dark:border-emerald-500/30 rounded-lg outline-none h-32 text-sm font-mono whitespace-pre dark:bg-slate-800 dark:text-slate-200" placeholder="貼上 Excel 內容..." value={bulkInput} onChange={(e) => setBulkInput(e.target.value)}></textarea>
                                                    <div className="flex justify-end mt-3"><button onClick={handleBulkImport} className="px-4 py-1.5 bg-emerald-500 text-white text-sm font-medium rounded-lg hover:bg-emerald-600"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> 同步至雲端</button></div>
                                                </div>
                                            )}
                                            {visibleRecords.length === 0 ? (
                                                <p className="text-slate-400 dark:text-slate-500 text-sm">雲端無此月份紀錄，請上傳檔案或匯入。</p>
                                            ) : (
                                                <div className="space-y-3">
                                                    {visibleRecords.map(record => (

                                                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm text-slate-500 dark:text-slate-400 mt-3">

                                                                        <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">點數兌換</span>
                                                                        <span className="font-medium text-slate-700 dark:text-slate-200">${formatMoney(record.points || 0)}</span>
                                                                    </div>
                                                                    <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                                                        <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">400% MEGA</span>
                                                                        <span className="font-medium text-slate-700 dark:text-slate-200">{record.bigToys?.['400']?.qty || 0}隻 / ${formatMoney(record.bigToys?.['400']?.amt || 0)}</span>
                                                                    </div>
                                                                    <div className="bg-white dark:bg-slate-700 px-3 py-2 rounded-lg border border-slate-100 dark:border-slate-600">
                                                                        <span className="block text-xs text-slate-400 dark:text-slate-400 mb-1">1000% MEGA</span>
                                                                        <span className="font-medium text-slate-700 dark:text-slate-200">{record.bigToys?.['1000']?.qty || 0}隻 / ${formatMoney(record.bigToys?.['1000']?.amt || 0)}</span>

                                                                </div>
                                                            </div>
                                                            <button onClick={() => deleteRecord(record.date)} className="p-2 ml-4 mt-1 text-slate-400 hover:text-red-500 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/20"><i className="fa-solid fa-trash-can"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 transition-colors">

                                                <label className="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">選定月份業績目標 (萬)</label>

                                                    <input type="number" className="w-full pl-4 pr-10 py-2 border border-slate-200 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none dark:bg-slate-900 dark:text-white" value={settings.targetAmount} onChange={(e) => updateCloudData('settings', { ...settings, targetAmount: Number(e.target.value) })} />

                                                </div>
                                            </div>
                                            <div className="mb-6 pt-6 border-t border-slate-100 dark:border-slate-700/50">

                                                    <input type="text" className="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-lg outline-none dark:bg-slate-900 dark:text-white" placeholder="輸入條碼..." value={newBarcodeStr} onChange={(e) => setNewBarcodeStr(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addNewBarcode()} />

                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {settings.newBarcodes.map(code => (
                                                        <span key={code} className="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 text-sm font-medium">{code} <span className="text-xs ml-1 opacity-60 font-normal">({settings.boxSizeMap[code] || 6}入)</span><button onClick={() => removeBarcode(code)} className="ml-2 hover:text-red-500"><i className="fa-solid fa-xmark"></i></button></span>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="pt-6 border-t border-slate-100 dark:border-slate-700/50">
                                                <div className="flex justify-between items-center mb-3">
                                                    <label className="block text-sm font-medium text-slate-600 dark:text-slate-300">賣場狀況分享（小作文）</label>
                                                    <button
                                                        type="button"
                                                        onClick={handleAutoGenerateStory}
                                                        className="px-3 py-1.5 bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400 hover:bg-amber-200 dark:hover:bg-amber-500/40 rounded-lg text-xs font-bold transition-colors flex items-center shadow-sm active:scale-95"
                                                    >
                                                        <i className="fa-solid fa-wand-magic-sparkles mr-1.5"></i> 一鍵生成
                                                    </button>
                                                </div>

                                                <div className="mb-3">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <p className="text-xs text-slate-400 dark:text-slate-500 font-medium">
                                                            <i className="fa-solid fa-filter mr-1"></i>
                                                            情境關鍵字（可複選，組合出更精準的範本）
                                                        </p>
                                                        {selectedKeywords.size > 0 && (
                                                            <button
                                                                type="button"
                                                                onClick={() => setSelectedKeywords(new Set())}
                                                                className="text-xs text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1"
                                                            >
                                                                <i className="fa-solid fa-xmark"></i> 清除選擇
                                                            </button>
                                                        )}
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {['上架秒殺', '突襲商品', '客人端盒', '大排長龍', 'MEGA熱銷', '大單出現', '天氣不佳', '補貨熱銷', '假日人潮'].map(kw => (
                                                            <button
                                                                key={kw}
                                                                type="button"
                                                                onClick={() => toggleKeyword(kw)}
                                                                className={`px-3 py-1.5 text-xs font-bold rounded-full transition-all duration-200 border ${selectedKeywords.has(kw)
                                                                    ? 'bg-amber-500 text-white border-amber-500 shadow-md shadow-amber-500/20 scale-105'
                                                                    : 'bg-slate-100 text-slate-500 border-transparent dark:bg-slate-800 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 hover:border-slate-300'
                                                                    }`}
                                                            >
                                                                {selectedKeywords.has(kw) && <i className="fa-solid fa-check mr-1 text-xs"></i>}
                                                                {kw}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    {selectedKeywords.size > 0 && (
                                                        <p className="text-xs text-amber-600 dark:text-amber-400 mt-2 font-medium">
                                                            <i className="fa-solid fa-wand-magic-sparkles mr-1"></i>

                                                            {selectedKeywords.size >= 2 && ' — 將優先尋找同時包含這些情境的範本！'}

                                                    )}

                                                <textarea
                                                    className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl outline-none h-28 resize-none dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition-shadow text-sm leading-relaxed"

                                                    value={story}
                                                    onChange={(e) => setStory(e.target.value)}
                                                ></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-6">

                                        {todayStats && todayStats.itemStats && (() => {
                                            const rawArray = Object.values(todayStats.itemStats).filter(item => item.top5Amt > 0);
                                            const statsArray = rawArray.map(item => ({
                                                name: item.desc,
                                                quantity: item.top5Qty || 0,
                                                sales: item.top5Amt || 0
                                            }));
                                            const top5Items = statsArray.sort((a, b) => b.quantity - a.quantity || b.sales - a.sales).slice(0, 5);
                                            if (top5Items.length === 0) return null;
                                            return (
                                                <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 transition-colors animate-scale-in">
                                                    <h3 className="text-base font-bold text-slate-800 dark:text-slate-100 mb-4 flex items-center">
                                                        <i className="fa-solid fa-trophy text-amber-500 mr-2.5"></i> 今日熱銷 Top 5
                                                        <span className="ml-auto text-xs text-slate-400 font-normal">今日總業績 ${formatMoney(todayStats.sales)}</span>
                                                    </h3>
                                                    <div className="flex flex-col gap-2">
                                                        {top5Items.map((item, index) => {
                                                            const percent = todayStats.sales > 0 ? ((item.sales / todayStats.sales) * 100).toFixed(1) : 0;
                                                            const barWidth = todayStats.sales > 0 ? Math.max(4, Math.round((item.sales / todayStats.sales) * 100)) : 0;
                                                            const rankColors = [
                                                                'bg-amber-50 border-amber-200 dark:bg-amber-500/10 dark:border-amber-500/30',
                                                                'bg-slate-50 border-slate-200 dark:bg-slate-700/50 dark:border-slate-600',
                                                                'bg-orange-50 border-orange-200 dark:bg-orange-500/10 dark:border-orange-500/30'
                                                            ];
                                                            const badgeColors = [
                                                                'bg-amber-400 text-white',
                                                                'bg-slate-400 text-white',
                                                                'bg-orange-400 text-white'
                                                            ];
                                                            const barColors = ['bg-amber-400', 'bg-slate-400', 'bg-orange-400', 'bg-blue-300', 'bg-blue-200'];
                                                            const cardColor = index < 3 ? rankColors[index] : 'bg-slate-50 border-slate-100 dark:bg-slate-800/50 dark:border-slate-700';
                                                            const badgeColor = index < 3 ? badgeColors[index] : 'bg-slate-200 text-slate-500 dark:bg-slate-700 dark:text-slate-400';
                                                            const barColor = barColors[index] || 'bg-blue-200';
                                                            return (
                                                                <div key={`top-${index}`} className={`flex items-center gap-3 p-3 rounded-xl border ${cardColor} transition-colors`}>
                                                                    <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-black shrink-0 ${badgeColor}`}>{index + 1}</span>
                                                                    <div className="flex-1 min-w-0">
                                                                        <div className="text-xs font-bold text-slate-700 dark:text-slate-200 leading-snug truncate mb-1.5" title={item.name}>{item.name}</div>
                                                                        <div className="flex items-center gap-2">
                                                                            <div className="flex-1 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                                                                                <div className={`h-full ${barColor} rounded-full`} style={{ width: `${barWidth}%` }}></div>
                                                                            </div>
                                                                            <span className="text-xs font-bold text-blue-600 dark:text-blue-400 shrink-0 w-9 text-right">{percent}%</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="text-right shrink-0">
                                                                        <div className="text-sm font-black text-slate-800 dark:text-slate-100">${item.sales.toLocaleString()}</div>
                                                                        <div className="text-xs text-slate-400 mt-0.5">{item.quantity} 件</div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })()}

                                        <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 sticky top-8 flex flex-col transition-colors z-10" style={{ height: 'calc(100vh - 10rem)', minHeight: '400px' }}>
                                            <div className="flex justify-between items-center mb-4 shrink-0">
                                                <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center"><i className="fa-solid fa-file-lines text-slate-400 mr-2"></i> 報表預覽</h2>
                                                <div className="flex gap-1.5 sm:gap-2">
                                                    <button onClick={() => setIsQRCodeModalOpen(true)} className="px-3 py-2 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-500/30 transition-colors flex items-center text-sm font-medium shadow-sm border border-blue-100 dark:border-blue-500/20">
                                                        <i className="fa-solid fa-qrcode sm:mr-1.5"></i> <span className="hidden sm:inline">產生條碼</span>
                                                    </button>
                                                    <button onClick={() => navigator.clipboard.writeText(reportContent).then(() => showToast('報表已複製！'))} className="px-3 py-2 bg-slate-800 dark:bg-slate-700 text-white rounded-lg hover:bg-slate-900 dark:hover:bg-slate-600 transition-colors flex items-center text-sm font-medium shadow-sm">
                                                        <i className="fa-solid fa-copy sm:mr-1.5"></i> <span className="hidden sm:inline">複製</span>
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="flex-1 bg-slate-50 dark:bg-slate-900 p-5 rounded-xl text-sm font-mono text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed overflow-y-auto border border-slate-200 dark:border-slate-700">{reportContent}</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* =========================================
                                分頁 2: 盒損登記器
                            ========================================= */}
                            {activeTab === 'damaged-box' && (
                                <div className="w-full space-y-6 pb-10 animate-scale-in">

                                    {/* 頂部：條碼掃描區塊 */}
                                    <div className="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 relative transition-colors z-10">
                                        <div className="absolute top-0 right-0 bg-emerald-500 text-white text-xs px-4 py-1.5 font-bold rounded-bl-xl rounded-tr-2xl flex items-center shadow-sm">
                                            <i className="fa-solid fa-cloud-arrow-up mr-2"></i> 雲端同步開啟
                                        </div>
                                        <div className="mb-5 mt-2">
                                            <h3 className="text-lg md:text-xl font-bold flex items-center dark:text-slate-100 tracking-tight">
                                                <i className="fa-solid fa-barcode text-slate-400 mr-2.5"></i> 盒損條碼登錄
                                            </h3>
                                        </div>
                                        <BarcodeScannerInput
                                            target="damaged"
                                            placeholder="請輸入或掃描條碼..."
                                            iconClass="fa-barcode"
                                            onSubmit={(items) => handleUnifiedSubmit('damaged', items)}
                                            onOpenCamera={handleOpenCamera}
                                            allDictEntries={allDictEntries}
                                            settings={settings}
                                        />
                                    </div>

                                    {/* 內容區塊 */}
                                    {damagedItems.length === 0 ? (
                                        <div className="text-center py-20 bg-white/50 dark:bg-slate-800/30 rounded-2xl border border-slate-200 dark:border-slate-700 border-dashed transition-colors">
                                            <i className="fa-solid fa-box-open text-5xl text-slate-300 dark:text-slate-600 mb-4 block"></i>
                                            <p className="text-slate-500 font-medium">雲端資料庫尚未登記任何盒損商品</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start mt-2">

                                            {/* 左側：盤點總覽 (lg:col-span-4) */}
                                            <div className="lg:col-span-4 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700/50 flex flex-col h-auto lg:h-[calc(100vh-16rem)] lg:sticky top-28 transition-colors">
                                                <div className="bg-slate-50 dark:bg-slate-800/80 px-5 py-4 border-b border-slate-200 dark:border-slate-700 rounded-t-2xl shrink-0 cursor-pointer lg:cursor-auto" onClick={() => { if (window.innerWidth < 1024) setIsDamagedOverviewExpanded(!isDamagedOverviewExpanded); }}>
                                                    <div className="flex items-center justify-between lg:mb-3">
                                                        <div className="flex items-center">
                                                            <div className="w-9 h-9 rounded-lg bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 flex items-center justify-center mr-3 shadow-inner"><i className="fa-solid fa-list-check text-base"></i></div>
                                                            <div>
                                                                <h4 className="font-bold text-slate-800 dark:text-slate-100 text-base leading-tight">盤點總覽</h4>
                                                                <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">總計 {damagedItems.reduce((sum, item) => sum + item.quantity, 0)} 件</p>
                                                            </div>
                                                        </div>
                                                        <div className="lg:hidden text-slate-400 p-2"><i className={`fa-solid fa-chevron-${isDamagedOverviewExpanded ? 'up' : 'down'} transition-transform duration-300`}></i></div>
                                                    </div>
                                                    <div className={`items-center gap-2 mt-3 lg:mt-0 ${isDamagedOverviewExpanded ? 'flex' : 'hidden lg:flex'}`}>
                                                        <button onClick={(e) => { e.stopPropagation(); executePrint('damaged'); }} className="flex-1 text-xs px-2 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 dark:bg-blue-500/20 dark:text-blue-400 rounded-lg transition-colors font-bold border border-blue-200 dark:border-blue-500/30 shadow-sm flex justify-center items-center"><i className="fa-solid fa-print mr-1.5"></i>列印</button>
                                                        <button onClick={(e) => { e.stopPropagation(); exportToExcel(damagedItems, '盒損盤點清單'); }} className="flex-1 text-xs px-2 py-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 dark:bg-emerald-500/20 dark:text-emerald-400 rounded-lg transition-colors font-bold border border-emerald-200 dark:border-emerald-500/30 shadow-sm flex justify-center items-center"><i className="fa-solid fa-file-excel mr-1.5"></i>匯出 Excel</button>
                                                        <button onClick={(e) => { e.stopPropagation(); clearAllDamagedItems(); }} className="flex-1 text-xs px-2 py-2 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-500/20 rounded-lg transition-colors font-bold border border-red-100 dark:border-red-500/20 shadow-sm flex justify-center items-center"><i className="fa-solid fa-trash-can mr-1.5"></i>季末清空</button>
                                                    </div>
                                                </div>
                                                <div className={`flex-1 overflow-y-auto p-4 custom-scrollbar bg-slate-50/50 dark:bg-transparent rounded-b-2xl ${isDamagedOverviewExpanded ? 'block' : 'hidden lg:block'}`}>
                                                    <div className="flex flex-col gap-3">
                                                        {groupedDamagedItems.length === 0 ? (
                                                            <p className="text-center text-sm text-slate-400 py-4">無符合的資料</p>
                                                        ) : (
                                                            groupedDamagedItems.map(([category, items]) => (
                                                                <div key={`overview-${category}`} className="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm animate-scale-in">
                                                                    <h5 className="font-bold text-slate-700 dark:text-slate-300 mb-3 border-b border-slate-100 dark:border-slate-700 pb-2 flex justify-between items-end">
                                                                        <span className="text-sm">{category}</span>
                                                                        <span className="text-blue-600 dark:text-blue-400 font-black text-sm">{items.reduce((s, i) => s + i.quantity, 0)} 件</span>
                                                                    </h5>
                                                                    <ul className="space-y-2">
                                                                        {items.map(item => (
                                                                            // ✨ 加入了 gap-2, min-w-0 break-words, 以及 shrink-0 解決文字過長破版問題
                                                                            <li key={`overview-item-${item.id}`} className="flex justify-between items-start text-sm gap-2">
                                                                                <span className="text-slate-600 dark:text-slate-400 leading-snug flex-1 min-w-0 break-words text-sm">{item.name}</span>
                                                                                <span className="font-bold text-slate-800 dark:text-slate-200 whitespace-nowrap bg-slate-50 dark:bg-slate-800 px-2 py-0.5 rounded border border-slate-200 dark:border-slate-600 shadow-sm text-xs shrink-0 mt-0.5">x {item.quantity}</span>
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                </div>
                                                            ))
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 右側：詳細列表 (lg:col-span-8) */}
                                            {/* ✨ 修改了外層高度，加入 mb-24 防止手機版被 Nav 擋住 */}
                                            <div className="lg:col-span-8 flex flex-col h-[calc(100vh-14rem)] min-h-[450px] lg:h-[calc(100vh-16rem)] lg:mb-0">

                                                {/* 分類與搜尋過濾列 */}
                                                <div className="flex flex-col gap-3 mb-5 shrink-0">
                                                    <div className="flex overflow-x-auto gap-3 w-full py-2 px-1 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] select-none cursor-grab active:cursor-grabbing"
                                                        onMouseDown={(e) => { e.currentTarget.dataset.isDown = "true"; e.currentTarget.dataset.startX = e.pageX - e.currentTarget.offsetLeft; e.currentTarget.dataset.scrollLeft = e.currentTarget.scrollLeft; }}
                                                        onMouseLeave={(e) => e.currentTarget.dataset.isDown = "false"}
                                                        onMouseUp={(e) => e.currentTarget.dataset.isDown = "false"}
                                                        onMouseMove={(e) => { if (e.currentTarget.dataset.isDown !== "true") return; e.preventDefault(); const x = e.pageX - e.currentTarget.offsetLeft; const walk = (x - parseFloat(e.currentTarget.dataset.startX)) * 2; e.currentTarget.scrollLeft = parseFloat(e.currentTarget.dataset.scrollLeft) - walk; }}

                                                            <i className="fa-solid fa-trash-can mr-1.5"></i>全部刪除

                                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">

                                                                </div>
                                                            </div>

                                                <div className="w-12 h-12 bg-blue-50 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform">
                                                    <i className="fa-solid fa-layer-group text-xl"></i>
                                                </div>

                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 md:gap-3 self-end sm:self-auto">
                                                <span className="bg-blue-100 text-blue-700 dark:bg-blue-500/20 dark:text-blue-400 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm whitespace-nowrap">
                                                    共 {settings.customCategories.length} 筆

                                                <div className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 dark:bg-slate-700 text-slate-400 group-hover:bg-slate-200 dark:group-hover:bg-slate-600 transition-colors">
                                                    <i className={`fa-solid fa-chevron-${isCategoryExpanded ? 'up' : 'down'} transition-transform duration-300`}></i>
                                                </div>
                                            </div>
                                        </div>

                                            <div className="animate-scale-in origin-top">

                                                            onSave={(id, newName, newKeywords) => { const updatedCategories = settings.customCategories.map(c => c.id === id ? { ...c, name: newName, keywords: newKeywords } : c); updateCloudData('settings', { ...settings, customCategories: updatedCategories }, `已更新分類：${newName}`); }}
                                                            onDelete={(id) => { const catToDelete = settings.customCategories.find(c => c.id === id); const newCategories = settings.customCategories.filter(c => c.id !== id); updateCloudData('settings', { ...settings, customCategories: newCategories }); if (catToDelete) triggerUndo(`已刪除分類規則：${catToDelete.name}`, () => { updateCloudData('settings', { ...settings, customCategories: [...newCategories, catToDelete] }); }); }}

                                            </div>

                                                        <span className="sm:hidden ml-1">收編 </span>
                                                        ({Object.keys(settings.barcodeMap || {}).length})
                                                    </button>
                                                )}

                                        {isDictExpanded && (() => {
                                            const filteredDict = Object.entries(settings.customNameMap).filter(([bc, name]) => bc.includes(dictSearch) || name.toLowerCase().includes(dictSearch.toLowerCase()));
                                            const ITEMS_PER_PAGE = 5;
                                            const dictTotalPages = Math.max(1, Math.ceil(filteredDict.length / ITEMS_PER_PAGE));
                                            const paginatedDict = filteredDict.slice((dictCurrentPage - 1) * ITEMS_PER_PAGE, dictCurrentPage * ITEMS_PER_PAGE);
                                            return (
                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-scale-in origin-top">

                                                        <div className="mb-4 relative group">
                                                            <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-teal-500 transition-colors"></i>
                                                            <input type="text" placeholder="搜尋已建檔之條碼或品名..." value={dictSearch} onChange={e => { setDictSearch(e.target.value); setDictCurrentPage(1); }} className="w-full pl-11 pr-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-teal-500/50 transition-shadow text-sm font-medium" />
                                                        </div>
                                                        <div className="flex-1 flex flex-col border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900/50 overflow-hidden">
                                                            <div className="flex-1 divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto">
                                                                {paginatedDict.map(([bc, name]) => (
                                                                    <div key={bc} className="p-3 px-5 flex justify-between items-center hover:bg-white dark:hover:bg-slate-800 transition-colors group">
                                                                        <div className="pr-4">
                                                                            <div className="font-bold text-slate-700 dark:text-slate-200 text-sm mb-1 leading-tight">{name}</div>
                                                                            <div className="text-xs font-mono text-slate-400 bg-slate-100 dark:bg-slate-800 inline-block px-1.5 py-0.5 rounded">{bc}</div>

                                                                            const backupMap = { ...settings.customNameMap };
                                                                            const newMap = { ...settings.customNameMap };
                                                                            delete newMap[bc];
                                                                            updateCloudData('settings', { ...settings, customNameMap: newMap });
                                                                            if (paginatedDict.length === 1 && dictCurrentPage > 1) setDictCurrentPage(p => p - 1);
                                                                            triggerUndo(`已刪除字典：${name}`, () => { updateCloudData('settings', { ...settings, customNameMap: backupMap }); });

                                                                    </div>
                                                                ))}
                                                                {filteredDict.length === 0 && (
                                                                    <div className="flex flex-col items-center justify-center text-slate-400 text-sm font-medium p-8 h-full min-h-[200px]">
                                                                        <i className={`fa-solid ${dictSearch ? 'fa-magnifying-glass-minus' : 'fa-box-open'} text-4xl text-slate-200 dark:text-slate-700 mb-3`}></i>
                                                                        {dictSearch ? '找不到相符的字典資料' : '字典庫目前是空的\n請由右側匯入資料'}
                                                                    </div>
                                                                )}
                                                            </div>

                                                                    <span className="text-sm font-bold text-slate-500 dark:text-slate-400">第 {dictCurrentPage} / {dictTotalPages} 頁</span>
